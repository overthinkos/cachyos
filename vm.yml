#  CachyOS VM. Bootstrap-from-scratch via cachyos-pacstrap-builder (local to
#  this repo). The cachyos distro config (pacstrap base packages, keyring,
#  mirrors, repos) lives in the main repo's build.yml, remote-included in
#  overthink.yml.
version: 2026.141.1600
vm:
    cachyos-vm:
        source:
            kind: bootstrap
            builder: pacstrap
            builder_image: cachyos-pacstrap-builder
            distro: cachyos
            package:
                - sudo
                - openssh
                - qemu-guest-agent
                - cloud-init
                - grub
                - efibootmgr
            rootfs: btrfs
            kernel_args: console=tty0 console=ttyS0,115200
        disk_size: 25G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: uefi-insecure
        network:
            mode: user
        ssh:
            user: cachy
            port: 12226
            key_source: generate
        cloud_init:
            # The cachy account (sudo NOPASSWD + /bin/bash + ssh key + wheel) is
            # provisioned from ssh.user via the cloud-init create-pattern
            # (composeUsers), so no explicit users: block is needed here.
            runcmd:
                - systemctl enable --now sshd
                - systemctl enable --now qemu-guest-agent
