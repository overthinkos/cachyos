#  Per-kind file for vm entries. Sibling of overthink.yml — included via
#  overthink.yml's `includes:` list. The schema kind discriminator is
#  `kind: vm` for kind-keyed entries; root-shape map is `vm:` (this file).
#  2026-05 kind-files cutover.
version: 2026.144.1443
vm:
    cachyos-vm:
        # Bootstrap-from-scratch via cachyos-pacstrap-builder (local). The cachyos
        # distro config (pacstrap base packages, keyring, mirrors, repos) lives in
        # the main repo's build.yml, imported above.
        source:
            kind: bootstrap
            builder: pacstrap
            builder_image: cachyos-pacstrap-builder
            distro: cachyos
            package:
                - sudo
                - openssh
                - qemu-guest-agent
                - cloud-init
                - grub
                - efibootmgr
            rootfs: btrfs
            kernel_args: console=tty0 console=ttyS0,115200
        disk_size: 25G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: uefi-insecure
        network:
            mode: user
        ssh:
            user: cachy
            port: 12226
            key_source: generate
        cloud_init:
            # The cachy account (sudo NOPASSWD + /bin/bash + ssh key + wheel) is
            # provisioned from ssh.user via the cloud-init create-pattern
            # (composeUsers), so no explicit users: block is needed here.
            runcmd:
                - systemctl enable --now sshd
                - systemctl enable --now qemu-guest-agent
                # Disable nvidia-container-toolkit's install-time CDI-generate
                # alpm hook. On a VM the passed-through GPU's driver only loads
                # AFTER the nvidia-driver layer's reboot, so `nvidia-ctk cdi
                # generate` at toolkit-install time fails ("NVML: Driver Not
                # Loaded"), pacman exits non-zero, and the deploy aborts at the
                # nvidia layer. CDI is (re)generated post-reboot by the
                # nvidia-driver layer's ov-nvidia-cdi oneshot once the driver is
                # up. Symlinking a hook to /dev/null is pacman's canonical
                # "disable this hook". Runs at first boot, before any deploy.
                - sh -c 'mkdir -p /etc/pacman.d/hooks && ln -sf /dev/null /etc/pacman.d/hooks/nvidia-ctk-cdi.hook'
    cachyos-gpu-vm:
        # GPU-passthrough VM guest that receives a physical NVIDIA GPU via a VFIO
        # <hostdev> and runs a CUDA container (the cuda-eval image) inside it.
        # Driven by the eval-cachyos-gpu-vm bed.
        #
        # SUBSTRATE = CachyOS bootstrap (pacstrap) under UEFI/OVMF. UEFI is
        # MANDATORY for a modern GPU: the RTX 4080's 16 GB VRAM sits behind a
        # 64-bit large BAR that SeaBIOS cannot map, so under BIOS the guest nvidia
        # driver fails GSP boot ("bad register read 0xbadf…"). The Arch cloud image
        # can't boot under UEFI (stale BOOTX64.EFI; see /ov-vm:arch), so a fresh
        # pacstrap install with its own EFI bootloader is used — it boots the
        # passed-through GPU cleanly under OVMF. pacstrap needs the rootful builder
        # (`ov settings set engine.rootful sudo`).
        #
        # PORTABLE BY DESIGN — this committed entity carries NO `libvirt.devices.
        # hostdevs:` block (a PCI address is host-specific). Generate it with
        # `ov vm gpu list` and add it locally (uncommitted) for a live GPU run;
        # without it the bed still exercises build/deploy and the GPU/CUDA checks
        # report N/A.
        #
        # backend: libvirt is mandatory — <hostdev> PCI passthrough only renders
        # on the libvirt backend. Rootless passthrough also needs a raised memlock
        # limit + /dev/vfio access — see `ov vm gpu status`.
        source:
            kind: bootstrap
            builder: pacstrap
            builder_image: cachyos-pacstrap-builder
            distro: cachyos
            package:
                # Bootstrap essentials ONLY — enough to boot + reach the guest
                # over SSH so layers apply. App packages arrive via add_layer.
                - sudo
                - openssh
                - qemu-guest-agent
                - cloud-init
                - grub
                - efibootmgr
            rootfs: btrfs
            # modprobe.blacklist=nouveau: blacklist the in-tree driver at early
            # boot so the open NVIDIA module binds the passed-through GPU (no
            # initramfs regen needed — see the nvidia-driver layer).
            kernel_args: console=tty0 console=ttyS0,115200 modprobe.blacklist=nouveau nvidia-drm.modeset=1
        backend: libvirt
        disk_size: 50G
        ram: 8G
        cpu: 4
        machine: q35
        firmware: uefi-insecure
        # Exercises the autostart code path (DomainSetAutostart + linger +
        # virtqemud.socket) on a disposable target — the bed is torn down, so
        # nothing persistently autostarts. This is the R10 vehicle for the
        # generic autostart machinery the cachyos-gpu operator VM relies on.
        autostart: true
        network:
            mode: user
        ssh:
            user: cachy
            port: 12227
            key_source: generate
        cloud_init:
            write_files:
                # pacstrap leaves no runtime /etc/pacman.conf; install one so
                # add_layer package installs work in the guest. SigLevel Never
                # matches the bootstrap (no keyring on this disposable eval guest).
                - path: /etc/pacman.conf
                  perms: "0644"
                  content: |
                    [options]
                    Architecture = x86_64 x86_64_v3
                    SigLevel = Never
                    ParallelDownloads = 5
                    # cachyos-v3 + cachyos-core-v3 (x86_64_v3) + cachyos ($arch)
                    # + Arch core/extra. Deliberately NO cachyos-extra-v3 AND NO
                    # cachyos-extra: neither publishes a usable DB on
                    # mirror.cachyos.org — the v3 overlay 404s a malformed libyuv
                    # (filed as plain x86_64 under the v3 path), and cachyos-extra
                    # at $arch returns an HTML listing, not a .db ("unrecognized
                    # archive format"). libyuv/gcc and other "extra" packages
                    # resolve from Arch `extra`; cachyos-v3/core-v3 supply the
                    # v3-optimized core set. (Verified in-guest: libyuv → extra.)
                    [cachyos-v3]
                    Server = https://mirror.cachyos.org/repo/x86_64_v3/$repo
                    [cachyos-core-v3]
                    Server = https://mirror.cachyos.org/repo/x86_64_v3/$repo
                    [cachyos]
                    Server = https://mirror.cachyos.org/repo/$arch/$repo
                    [core]
                    Include = /etc/pacman.d/mirrorlist
                    [extra]
                    Include = /etc/pacman.d/mirrorlist
            runcmd:
                - systemctl enable --now sshd
                - systemctl enable --now qemu-guest-agent
                # Disable nvidia-container-toolkit's install-time CDI-generate
                # alpm hook. On a VM the passed-through GPU's driver only loads
                # AFTER the nvidia-driver layer's reboot, so `nvidia-ctk cdi
                # generate` at toolkit-install time fails ("NVML: Driver Not
                # Loaded"), pacman exits non-zero, and the deploy aborts at the
                # nvidia layer. CDI is (re)generated post-reboot by the
                # nvidia-driver layer's ov-nvidia-cdi oneshot once the driver is
                # up. Symlinking a hook to /dev/null is pacman's canonical
                # "disable this hook". Runs at first boot, before any deploy.
                - sh -c 'mkdir -p /etc/pacman.d/hooks && ln -sf /dev/null /etc/pacman.d/hooks/nvidia-ctk-cdi.hook'
        libvirt:
            # memfd/shared backing is auto-paired by the renderer for the virtiofs
            # share; declared here too so the bed asserts the explicit path works.
            memory_backing:
                source: memfd
                access: shared
            devices:
                # Looking Glass IVSHMEM + dummy scanout — exercises the same
                # shmem/video render path the cachyos-gpu operator VM uses, so
                # the bed R10 proves the Looking-Glass wiring (libvirt <shmem> +
                # <video> + the looking-glass-host guest layer) on a disposable
                # target.
                shmem:
                    - name: looking-glass
                      model:
                          type: ivshmem-plain
                      size: "128"
                # SPICE virtual monitor: the headless display the GPU-passthrough
                # KDE session renders to, so `ov eval spice screenshot` captures the
                # live desktop (the bed asserts a non-uniform frame = it rendered).
                # The virtio-gpu head is the seat-0 primary scanout — the passed-
                # through NVIDIA GPU has no connected output; looking-glass-host
                # captures whichever head the compositor drives, so LG is unaffected.
                graphics:
                    - type: spice
                      listen:
                          - type: socket
                video:
                    - model: virtio
                      vram: 65536
                      heads: 1
                      accel3d: false
                      primary: true
                # Guest-agent control channel + the SPICE agent channel (spicevmc) —
                # exercises the structured unix channel render + qemu-guest-agent.
                channels:
                    - type: unix
                      name: org.qemu.guest_agent.0
                    - type: spicevmc
                      name: com.redhat.spice.0
                # Throwaway virtiofs share (host /tmp → guest /workspace) — proves
                # the virtiofs auto-shared-mem pairing + the workspace-mount layer
                # end-to-end on a disposable target. NOT a real home dir (unlike
                # the cachyos-gpu operator VM, which shares /home/atrawog).
                # Source is an operator-provisioned, mode-0700 scratch dir (NOT
                # world-writable /tmp) so the guest-user idmap is actually
                # exercised: the guest user owns + can write it ONLY when the
                # auto-injected idmap maps guest-uid-1000 → the host operator
                # (libvirt's default maps guest-ROOT → operator, leaving it
                # root-owned + unreadable to the guest user). The operator creates
                # the dir once (like the host-specific GPU hostdevs below).
                filesystems:
                    - driver: virtiofs
                      accessmode: passthrough
                      source: /home/atrawog/.cache/ov/eval-workspace
                      target: workspace
                # PORTABLE — NO committed hostdevs (a PCI address is host-specific).
                # For a live GPU R10 on a host with an NVIDIA card, generate the
                # block with `ov vm gpu list` and add a `hostdevs:` block here
                # LOCALLY before the run (do NOT commit it). The GPU-gated eval
                # checks (monitor / nvenc / cuda-smoke) are N/A — they pass with a
                # note — on a portable bed with no card passed through, so the bed
                # builds + verifies on any host; the GPU path is proven by a local
                # hostdev run (the 2026.150 R10 ran 29/29 with the card attached).
    cachyos-gpu:
        # PERSISTENT operator GPU workstation VM — the full ov-cachyos dev stack
        # PLUS a complete KDE Plasma desktop synced to the host, inside a
        # GPU-passthrough VM that auto-starts with the host. The VM analog of the
        # `ov-cachyos` local workstation profile, evolved into a full graphical
        # `<distro>-coder` workstation; provisioned once via the `cachyos-gpu`
        # kind:deploy (full layer stack over SSH, persisted on the guest disk),
        # then it just boots. Supersedes the earlier headless ov-cachyos-gpu.
        #
        # Three ways to use the SAME GPU: a physical monitor on the RTX 4080
        # (SDDM/Plasma on DRM), Looking Glass locally (IVSHMEM + dummy scanout
        # below, looking-glass-host layer in guest, client on host), and a remote
        # KDE-selkies WebRTC browser stream (port 3000, NVENC) of a nested Plasma.
        #
        # OPERATOR/HOST-SPECIFIC BY DESIGN (like local.ov-cachyos): this committed
        # entity carries this host's NVIDIA PCI address and the operator's
        # /home/atrawog share. `ov vm gpu list` regenerates the hostdevs block if
        # the host changes. NOT a disposable test bed — there is no disposable
        # deploy for it; the full machinery is R10-proven on the disposable
        # eval-cachyos-gpu-vm bed instead.
        #
        # SUBSTRATE = CachyOS pacstrap under UEFI/OVMF (same rationale as
        # cachyos-gpu-vm: the RTX 4080's 64-bit large BAR needs UEFI). The NVIDIA
        # card (01:00.0 + .1) is already vfio-pci-bound on this host; the host
        # drives display from the AMD GPU, so autostarting this VM costs the host
        # no display.
        source:
            kind: bootstrap
            builder: pacstrap
            builder_image: cachyos-pacstrap-builder
            distro: cachyos
            package:
                - sudo
                - openssh
                - qemu-guest-agent
                - cloud-init
                - grub
                - efibootmgr
            rootfs: btrfs
            kernel_args: console=tty0 console=ttyS0,115200 modprobe.blacklist=nouveau nvidia-drm.modeset=1
        backend: libvirt
        # 1 TB VIRTUAL — the qcow2 is sparse (truncate + qemu-img convert with no
        # preallocation), so it grows on demand and the operator's data lives on
        # the /workspace virtiofs share (host passthrough), not on this disk.
        disk_size: 1T
        ram: 64G
        cpu: 12
        machine: q35
        firmware: uefi-insecure
        # Start with the host. Sets libvirt's domain autostart flag AND wires the
        # qemu:///session boot trigger (loginctl enable-linger + virtqemud.socket).
        autostart: true
        network:
            mode: user
        ssh:
            user: cachy
            port: 12228
            key_source: generate
        cloud_init:
            write_files:
                # Same bootstrap pacman.conf as cachyos-gpu-vm so in-guest layer
                # installs work on the keyring-less pacstrap base. (A persistent
                # workstation can later harden SigLevel after pacman-key init.)
                - path: /etc/pacman.conf
                  perms: "0644"
                  content: |
                    [options]
                    Architecture = x86_64 x86_64_v3
                    SigLevel = Never
                    ParallelDownloads = 5
                    # cachyos-v3 + cachyos-core-v3 (x86_64_v3) + cachyos ($arch)
                    # + Arch core/extra. Deliberately NO cachyos-extra-v3 AND NO
                    # cachyos-extra: neither publishes a usable DB on
                    # mirror.cachyos.org — the v3 overlay 404s a malformed libyuv
                    # (filed as plain x86_64 under the v3 path), and cachyos-extra
                    # at $arch returns an HTML listing, not a .db ("unrecognized
                    # archive format"). libyuv/gcc and other "extra" packages
                    # resolve from Arch `extra`; cachyos-v3/core-v3 supply the
                    # v3-optimized core set. (Verified in-guest: libyuv → extra.)
                    [cachyos-v3]
                    Server = https://mirror.cachyos.org/repo/x86_64_v3/$repo
                    [cachyos-core-v3]
                    Server = https://mirror.cachyos.org/repo/x86_64_v3/$repo
                    [cachyos]
                    Server = https://mirror.cachyos.org/repo/$arch/$repo
                    [core]
                    Include = /etc/pacman.d/mirrorlist
                    [extra]
                    Include = /etc/pacman.d/mirrorlist
            runcmd:
                - systemctl enable --now sshd
                - systemctl enable --now qemu-guest-agent
                # Disable nvidia-container-toolkit's install-time CDI-generate
                # alpm hook. On a VM the passed-through GPU's driver only loads
                # AFTER the nvidia-driver layer's reboot, so `nvidia-ctk cdi
                # generate` at toolkit-install time fails ("NVML: Driver Not
                # Loaded"), pacman exits non-zero, and the deploy aborts at the
                # nvidia layer. CDI is (re)generated post-reboot by the
                # nvidia-driver layer's ov-nvidia-cdi oneshot once the driver is
                # up. Symlinking a hook to /dev/null is pacman's canonical
                # "disable this hook". Runs at first boot, before any deploy.
                - sh -c 'mkdir -p /etc/pacman.d/hooks && ln -sf /dev/null /etc/pacman.d/hooks/nvidia-ctk-cdi.hook'
        libvirt:
            # memfd/shared is auto-paired for the virtiofs share by the renderer;
            # declared explicitly here for clarity on a persistent operator entity.
            memory_backing:
                source: memfd
                access: shared
            devices:
                # Looking Glass IVSHMEM region (guest looking-glass-host pushes
                # frames here; host looking-glass-client reads them). 64 MiB fits
                # up to 4K. Paired with memory_backing shared above.
                shmem:
                    - name: looking-glass
                      model:
                          type: ivshmem-plain
                      size: "128"
                # SPICE virtual monitor + virtio-gpu scanout. The passed-through
                # NVIDIA GPU has no connected output, so the virtio-gpu head is the
                # seat-0 primary the SDDM/Plasma session renders to headless; SPICE
                # serves it as a 4th access path + headless recovery console (and the
                # disposable bed screenshots it to prove the desktop rendered).
                # looking-glass-host captures whichever head the compositor drives.
                graphics:
                    - type: spice
                      listen:
                          - type: socket
                video:
                    - model: virtio
                      vram: 65536
                      heads: 1
                      accel3d: false
                      primary: true
                # qemu-guest-agent control channel (host↔guest) + the SPICE agent
                # channel (spicevmc, clipboard/resize); the qemu-guest-agent layer
                # enables the service + full RPC surface + fsfreeze hook.
                channels:
                    - type: unix
                      name: org.qemu.guest_agent.0
                    - type: spicevmc
                      name: com.redhat.spice.0
                # Operator's home shared into the guest at /workspace (mounted by
                # the workspace-mount layer). passthrough preserves uid/gid.
                filesystems:
                    - driver: virtiofs
                      accessmode: passthrough
                      source: /home/atrawog
                      target: workspace
                # This host's NVIDIA RTX 4080 SUPER (10de:2702, IOMMU group 13 =
                # 01:00.0 + 01:00.1). From `ov vm gpu list`.
                hostdevs:
                    - type: pci
                      managed: "yes"
                      source:
                          domain: "0x0000"
                          bus: "0x01"
                          slot: "0x00"
                          function: "0x0"
                    - type: pci
                      managed: "yes"
                      source:
                          domain: "0x0000"
                          bus: "0x01"
                          slot: "0x00"
                          function: "0x1"
