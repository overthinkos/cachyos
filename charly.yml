        lifecycle: dev
        description: Sole proof of the all-in-one openclaw-desktop image fusing the selkies streaming desktop + openclaw-full gateway/AI-CLI stack + CPU ollama + full nested charly toolchain on one CachyOS image. Builds (AUR chrome + npm openclaw + go + ollama tarball multistage) and deploys the openclaw-desktop pod, then runs baked checks (nested-rootless posture, nested podman, libvirt-session, charly version/doctor, three services) plus deploy-scope probes — AUR chrome, the selkies HTTPS UI, the AI CLIs (claude-code/codex/gemini), the ollama binary, chrome-devtools-mcp.
# charly-cachyos — the operator CachyOS workstation profile (target: local +
# host: local). NOT a zero-side-effect test bed (it mutates the operator's
# real machine), so it stays a kind:deploy operator entry, not an check bed.
# disposable: operator has authorized this host as a test system, so
# `charly update charly-cachyos` (full destroy + reinstall via the install ledger)
# is allowed for strict R10 verification. Shares the name `charly-cachyos` with
# the kind:local template it applies (cross-kind name reuse).
charly-cachyos:
    bundle:
        local: charly-cachyos-app
        host: local
        disposable: true
        description: Apply charly-cachyos to this workstation
