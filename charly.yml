# the three services' liveness; this bed's deploy-scope probes assert the
# cross-stack headline artifacts (AUR chrome, selkies HTTPS UI, the AI CLIs,
# the ollama binary) actually landed on the running combined container.
check-openclaw-desktop-pod:
    bundle:
        box: openclaw-desktop
