deploy:
    # charly-cachyos — the operator CachyOS workstation profile (target: local +
    # host: local). NOT a zero-side-effect test bed (it mutates the operator's
    # real machine), so it stays a kind:deploy operator entry, not an eval bed.
    # disposable: operator has authorized this host as a test system, so
    # `charly update charly-cachyos` (full destroy + reinstall via the install ledger)
    # is allowed for strict R10 verification. Shares the name `charly-cachyos` with
    # the kind:local template it applies (cross-kind name reuse).
    charly-cachyos:
        target: local
        local: charly-cachyos
        host: local
        disposable: true
        install_opts:
            with_service: true
            allow_repo_changes: true
            allow_root_tasks: true
        env:
            - EDITOR=nvim
        description:
            feature: Apply charly-cachyos to this workstation
            tag: [testing]
    # cachyos-gpu — the PERSISTENT operator GPU workstation VM (target: vm,
    # vm: cachyos-gpu). The VM analog of the charly-cachyos local profile, evolved
    # into a full graphical <distro>-coder workstation: the full charly-cachyos dev
    # stack PLUS a complete KDE Plasma desktop synced to the host, provisioned
    # ONCE over SSH into the GPU-passthrough VM (persisted on the guest disk,
    # survives the autostart reboot), plus the VM-only layers — nvidia-driver
    # (kernel module + KDE/Wayland userspace + reboot), qemu-guest-agent (full
    # RPC surface), workspace-mount (/workspace), and kde-selkies (remote WebRTC
    # KDE stream, NVENC). Supersedes the earlier headless charly-cachyos-gpu.
    #
    # NOT disposable: this is a real workstation, not a rebuildable test bed. The
    # full machinery is R10-proven on the disposable eval-cachyos-gpu-vm bed;
    # this entry just composes it. builder_image is the cuda-arch-builder so the
    # cross-host pixi build of pixelflux links the real NVENC encoder.
    #
    # The @github layer pins are aligned to the newest main tag by
    # `charly box reconcile` (the new main-repo desktop/stream layers — kde-desktop,
    # fonts-extended, desktop-media, cachyos-extras, kde-selkies — resolve only at
    # the post-landing tag).
    cachyos-gpu:
        target: vm
        vm: cachyos-gpu
        add_candy:
            - wheel-nopasswd
            - '@github.com/overthinkos/overthink/candy/yay:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/dev-tools:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/gh:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/pre-commit:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/tmux:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/direnv:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/gnupg:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/keepassxc:v2026.160.1105'
            - keepassxc-keyring
            - '@github.com/overthinkos/overthink/candy/tailscale:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/tailscale-up:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/build-toolchain:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/golang:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/rust:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/nodejs:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/uv:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/claude-code:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/codex:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/gemini:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/oracle:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/forgecode:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/devops-tools:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/docker-ce:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/kubernetes:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/vscode:v2026.160.1105'
            - ghostty
            - '@github.com/overthinkos/overthink/candy/chrome:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/nvidia:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/charly:v2026.160.1105'
            # Full KDE Plasma desktop synced to the host + GPU display/stream
            # stack. kde-desktop pulls the whole Plasma/KF6/Qt stack via
            # plasma-desktop (deps) + SDDM + graphical.target; cachyos-kde-settings
            # (vendored) adds the CachyOS theming; fonts-extended + desktop-media
            # sync the host font/codec set; cachyos-extras fills the dev/CLI gap.
            # The WebRTC streaming desktop is the nested selkies-kde-nvidia pod
            # (real NVENC, :3000) deployed as a persistent in-guest quadlet — see
            # `nested:` below, NOT an in-guest layer. The bare-metal SDDM Plasma
            # seat (kde-desktop) drives the physical RTX monitors.
            - '@github.com/overthinkos/overthink/candy/kde-desktop:v2026.160.1105'
            - cachyos-kde-settings
            # Shared desktop/monitor/SPICE/selkies + mouse/keyboard/screenshot
            # checks (+ ydotool test tool). charly eval live collects this layer's
            # deploy-scope checks for BOTH the bed and the operator VM (R3).
            - cachyos-gpu-desktop-eval
            - '@github.com/overthinkos/overthink/candy/fonts-extended:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/desktop-media:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/cachyos-extras:v2026.160.1105'
            # (in-guest kde-selkies layer REMOVED — the WebRTC streaming desktop is
            # the nested selkies-kde-nvidia pod below; podman is its in-guest substrate.)
            # VM-only additions. podman for GPU/CUDA containers; the guest agent +
            # workspace mount; nvidia-driver LAST — its reboot: true emits a
            # trailing RebootStep, so the guest reboots ONCE after everything is in
            # place, and the enabled workspace.mount + guest agent come back clean.
            - podman
            - '@github.com/overthinkos/overthink/candy/qemu-guest-agent:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/workspace-mount:v2026.160.1105'
            - nvidia-driver
        install_opts:
            with_service: true
            allow_repo_changes: true
            allow_root_tasks: true
            skip_incompatible: true
            verify: true
            # CUDA builder so the cross-host pixi build of pixelflux links the real
            # NVENC encoder (the stock arch-builder has no CUDA → NVENC stub).
            builder_image: charly.cuda-arch-builder
        env:
            - EDITOR=nvim
            - PAGER=less
        nested:
            # The KDE-selkies WebRTC streaming desktop runs as a headless nested pod
            # (real NVENC on the passed-through RTX GPU), deployed as a PERSISTENT
            # in-guest quadlet by deployNestedPodsInGuest — the exact config the
            # eval-cachyos-gpu-vm mirror bed proves (R10 9/9, fresh rebuild). The
            # bare-metal SDDM Plasma seat (kde-desktop) drives the physical monitors
            # independently of the stream pod.
            selkies-kde:
                target: pod
                box: selkies-kde-nvidia
        description:
            feature: Persistent GPU CachyOS KDE coder workstation VM (bare-metal SDDM Plasma seat on the monitors + nested selkies-kde-nvidia stream pod (real NVENC, :3000) + /workspace + autostart)
            tag: [working]
local:
    #  charly-cachyos — the operator CachyOS workstation profile (kind:local
    #  template). Shared layers are pulled by GITHUB REFERENCE from the main
    #  opencharly repo; the cachyos-exclusive layers (ghostty, keepassxc-keyring,
    #  wheel-nopasswd) are vendored locally under candy/. The builder_image is a
    #  published OCI ref (arch-builder), not a layer.
    charly-cachyos:
        candy:
            - wheel-nopasswd
            - '@github.com/overthinkos/overthink/candy/yay:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/dev-tools:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/gh:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/pre-commit:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/tmux:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/direnv:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/gnupg:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/keepassxc:v2026.160.1105'
            - keepassxc-keyring
            - '@github.com/overthinkos/overthink/candy/tailscale:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/tailscale-up:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/build-toolchain:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/golang:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/rust:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/nodejs:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/uv:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/claude-code:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/codex:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/gemini:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/oracle:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/forgecode:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/devops-tools:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/docker-ce:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/kubernetes:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/vscode:v2026.160.1105'
            - ghostty
            - '@github.com/overthinkos/overthink/candy/chrome:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/nvidia:v2026.160.1105'
            - '@github.com/overthinkos/overthink/candy/charly:v2026.160.1105'
        install_opts:
            with_service: true
            allow_repo_changes: true
            allow_root_tasks: true
            builder_image: ghcr.io/overthinkos/arch-builder:2026.122.2252
        env:
            - EDITOR=nvim
            - PAGER=less
        description:
            feature: CachyOS Developer Experience profile
            narrative: |
                Kitchen-sink dev workstation: core CLI tools, full Arch build
                toolchain, Go/Rust/Node/Python runtimes, the full AI-coding-agent
                fleet (Claude Code, Codex, Gemini, Oracle, ForgeCode), and
                DevOps/container tooling (docker, kubectl, helm, AWS CLI, jq).
                Targets the operator's CachyOS host via direct local exec.
            tag: [working]
        eval:
            - id: passwordless-sudo-host
              scope: deploy
              command: sudo -n true
              exit_status: 0
              in_container: false
            # The nvidia toolkit + CDI checks are gated on an ACTIVE host NVIDIA
            # driver (/dev/nvidiactl present, or nvidia-smi answers). On a host
            # that binds the GPU to vfio-pci for VM passthrough — or has no NVIDIA
            # GPU at all — the host driver never loads, /dev/nvidia* never appears,
            # and `nvidia-ctk cdi generate` cannot enumerate a device, so
            # /etc/cdi/nvidia.yaml is structurally impossible. In that case these
            # checks are N/A and pass with an explanatory message rather than
            # failing on a correctly-configured passthrough host.
            - id: nvidia-ctk-present
              scope: deploy
              command: |
                if [ -e /dev/nvidiactl ] || nvidia-smi >/dev/null 2>&1; then
                  command -v nvidia-ctk
                else
                  echo "host NVIDIA driver not active (vfio passthrough or no GPU) — toolkit check N/A"
                fi
              exit_status: 0
              in_container: false
            - id: nvidia-cdi-spec
              scope: deploy
              command: |
                if [ -e /dev/nvidiactl ] || nvidia-smi >/dev/null 2>&1; then
                  test -f /etc/cdi/nvidia.yaml
                else
                  echo "host NVIDIA driver not active (vfio passthrough or no GPU) — CDI spec N/A"
                fi
              exit_status: 0
              in_container: false
vm:
    cachyos-vm:
        # Bootstrap-from-scratch via cachyos-pacstrap-builder (local). The cachyos
        # distro config (pacstrap base packages, keyring, mirrors, repos) lives in
        # the main repo's build.yml, imported above.
        source:
            kind: bootstrap
            builder: pacstrap
            builder_image: cachyos-pacstrap-builder
            distro: cachyos
            package:
                - sudo
                - openssh
                - qemu-guest-agent
                - cloud-init
                - grub
                - efibootmgr
            rootfs: btrfs
            kernel_args: console=tty0 console=ttyS0,115200
        disk_size: 25G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: uefi-insecure
        network:
            mode: user
        ssh:
            user: cachy
            port: 12226
            key_source: generate
        cloud_init:
            # The cachy account (sudo NOPASSWD + /bin/bash + ssh key + wheel) is
            # provisioned from ssh.user via the cloud-init create-pattern
            # (composeUsers), so no explicit users: block is needed here.
            runcmd:
                - systemctl enable --now sshd
                - systemctl enable --now qemu-guest-agent
                # Disable nvidia-container-toolkit's install-time CDI-generate
                # alpm hook. On a VM the passed-through GPU's driver only loads
                # AFTER the nvidia-driver layer's reboot, so `nvidia-ctk cdi
                # generate` at toolkit-install time fails ("NVML: Driver Not
                # Loaded"), pacman exits non-zero, and the deploy aborts at the
                # nvidia layer. CDI is (re)generated post-reboot by the
                # nvidia-driver layer's charly-nvidia-cdi oneshot once the driver is
                # up. Symlinking a hook to /dev/null is pacman's canonical
                # "disable this hook". Runs at first boot, before any deploy.
                - sh -c 'mkdir -p /etc/pacman.d/hooks && ln -sf /dev/null /etc/pacman.d/hooks/nvidia-ctk-cdi.hook'
    cachyos-gpu-vm:
        # GPU-passthrough VM guest that receives a physical NVIDIA GPU via a VFIO
        # <hostdev>. Driven by the eval-cachyos-gpu-vm bed, which mirrors the
        # operator workstation: a bare-metal KDE Plasma seat in-guest plus a nested
        # selkies-kde-nvidia streaming pod (real NVENC) deployed as a persistent
        # in-guest quadlet.
        #
        # SUBSTRATE = CachyOS bootstrap (pacstrap) under UEFI/OVMF. UEFI is
        # MANDATORY for a modern GPU: the RTX 4080's 16 GB VRAM sits behind a
        # 64-bit large BAR that SeaBIOS cannot map, so under BIOS the guest nvidia
        # driver fails GSP boot ("bad register read 0xbadf…"). The Arch cloud image
        # can't boot under UEFI (stale BOOTX64.EFI; see /charly-vm:arch), so a fresh
        # pacstrap install with its own EFI bootloader is used — it boots the
        # passed-through GPU cleanly under OVMF. pacstrap needs the rootful builder
        # (`charly settings set engine.rootful sudo`).
        #
        # PORTABLE — this committed entity carries NO host-specific devices: no
        # `libvirt.devices.hostdevs:` (a PCI bus/slot address is host-specific) and
        # no host-path `filesystems:` (a virtiofs share rooted at an absolute host
        # path). The GPU hostdev is AUTO-ALLOCATED: the bed declares
        # `requires_exclusive: [nvidia-gpu]`, the main repo's build.yml maps that
        # token to a `resource: {nvidia-gpu: {gpu: {vendor: "0x10de"}}}` selector, and
        # `charly vm create` (autoAllocateExclusiveGPUs) detects the matching NVIDIA
        # card, writes its whole-IOMMU-group `<hostdev>` block into THIS host's
        # instance overlay (~/.local/share/charly/vm/charly-cachyos-gpu-vm/
        # instance.yml), and injects it via VmInstanceOverride.ApplyToVmSpec — so the
        # bed attaches this host's real RTX 4080 (real GPU passthrough + NVENC) with
        # NO manual `charly vm gpu list` step and no PCI address in version control.
        # An operator-authored hostdev (committed here or in instance.yml) ALWAYS
        # wins — auto-allocation defers to it. If the resource is required but no
        # matching card is present, `charly vm create` FAILS HARD (operator directive:
        # auto-allocate or fail hard). The host-path `filesystems:` overlay (if any)
        # is still operator-authored in instance.yml. See /charly-vm:vm "GPU
        # passthrough", /charly-internals:disposable "resource-arbitration axis".
        #
        # backend: libvirt is mandatory — <hostdev> PCI passthrough only renders
        # on the libvirt backend. Rootless passthrough also needs a raised memlock
        # limit + /dev/vfio access — see `charly vm gpu status`.
        source:
            kind: bootstrap
            builder: pacstrap
            builder_image: cachyos-pacstrap-builder
            distro: cachyos
            package:
                # Bootstrap essentials ONLY — enough to boot + reach the guest
                # over SSH so layers apply. App packages arrive via add_layer.
                - sudo
                - openssh
                - qemu-guest-agent
                - cloud-init
                - grub
                - efibootmgr
            rootfs: btrfs
            # modprobe.blacklist=nouveau: blacklist the in-tree driver at early
            # boot so the open NVIDIA module binds the passed-through GPU (no
            # initramfs regen needed — see the nvidia-driver layer).
            kernel_args: console=tty0 console=ttyS0,115200 modprobe.blacklist=nouveau nvidia-drm.modeset=1
        backend: libvirt
        # 100G (sparse qcow2): the full KDE+GPU+dev rootfs PLUS the nested
        # selkies-kde-nvidia pod image (~15 GB) loaded into the guest user's
        # rootless podman storage (/home/cachy/.local/share/containers) — 50G
        # ran out of space mid-load. The disk grows on demand, so the larger
        # ceiling costs nothing until used.
        disk_size: 100G
        ram: 8G
        cpu: 4
        machine: q35
        firmware: uefi-insecure
        # Exercises the autostart code path (DomainSetAutostart + linger +
        # virtqemud.socket) on a disposable target — the bed is torn down, so
        # nothing persistently autostarts. This is the R10 vehicle for the
        # generic autostart machinery the cachyos-gpu operator VM relies on.
        autostart: true
        network:
            mode: user
        ssh:
            user: cachy
            port: 12227
            key_source: generate
        cloud_init:
            # /etc/pacman.conf is written into the rootfs by the cachyos pacstrap
            # bootstrap (build.yml distro.cachyos.pacstrap.runtime_pacman_conf) —
            # the single source for every cachyos pacstrap VM, so no per-VM
            # write_files block is needed here.
            runcmd:
                - systemctl enable --now sshd
                - systemctl enable --now qemu-guest-agent
                # Disable nvidia-container-toolkit's install-time CDI-generate
                # alpm hook. On a VM the passed-through GPU's driver only loads
                # AFTER the nvidia-driver layer's reboot, so `nvidia-ctk cdi
                # generate` at toolkit-install time fails ("NVML: Driver Not
                # Loaded"), pacman exits non-zero, and the deploy aborts at the
                # nvidia layer. CDI is (re)generated post-reboot by the
                # nvidia-driver layer's charly-nvidia-cdi oneshot once the driver is
                # up. Symlinking a hook to /dev/null is pacman's canonical
                # "disable this hook". Runs at first boot, before any deploy.
                - sh -c 'mkdir -p /etc/pacman.d/hooks && ln -sf /dev/null /etc/pacman.d/hooks/nvidia-ctk-cdi.hook'
        libvirt:
            # memfd/shared backing is auto-paired by the renderer for the virtiofs
            # share; declared here too so the bed asserts the explicit path works.
            memory_backing:
                source: memfd
                access: shared
            devices:
                # SPICE virtual monitor: the headless display the GPU-passthrough
                # KDE session renders to, so `charly eval spice screenshot` captures the
                # live desktop (the bed asserts a non-uniform frame = it rendered).
                # The virtio-gpu head is the seat-0 primary scanout — the passed-
                # through NVIDIA GPU has no connected output.
                graphics:
                    - type: spice
                      listen:
                        - type: socket
                video:
                    - model: virtio
                      vram: 65536
                      heads: 1
                      accel3d: false
                      primary: true
                # Guest-agent control channel + the SPICE agent channel (spicevmc) —
                # exercises the structured unix channel render + qemu-guest-agent.
                channels:
                    - type: unix
                      name: org.qemu.guest_agent.0
                    - type: spicevmc
                      name: com.redhat.spice.0
                      # NO host-path `filesystems:` and NO `hostdevs:` committed here —
                      # both are host-specific and live in THIS host's instance overlay
                      # (~/.local/share/charly/vm/charly-cachyos-gpu-vm/instance.yml), merged at
                      # `charly vm create` by VmInstanceOverride.ApplyToVmSpec:
                      #   - the GPU <hostdev> (RTX 4080, IOMMU group = 01:00.0 + 01:00.1);
                      #   - a virtiofs `workspace` share rooted at an operator-provisioned
                      #     mode-0700 scratch dir (NOT world-writable /tmp) so the
                      #     guest-user idmap is actually exercised: the guest user owns +
                      #     writes it ONLY when the auto-injected idmap maps guest-uid-1000
                      #     → the host operator (libvirt's default maps guest-ROOT →
                      #     operator, leaving it root-owned + unreadable to the guest user).
    cachyos-gpu:
        # PERSISTENT operator GPU workstation VM — the full charly-cachyos dev stack
        # PLUS a complete KDE Plasma desktop synced to the host, inside a
        # GPU-passthrough VM that auto-starts with the host. The VM analog of the
        # `charly-cachyos` local workstation profile, evolved into a full graphical
        # `<distro>-coder` workstation; provisioned once via the `cachyos-gpu`
        # kind:deploy (full layer stack over SSH, persisted on the guest disk),
        # then it just boots. Supersedes the earlier headless charly-cachyos-gpu.
        #
        # Two ways to use the SAME GPU: a physical monitor on the RTX 4080
        # (SDDM/Plasma on DRM), and a remote KDE-selkies WebRTC browser stream
        # (port 3000, NVENC) of a nested Plasma.
        #
        # PORTABLE (like local.charly-cachyos): this committed entity carries NO
        # host-specific config — the NVIDIA PCI <hostdev> and the operator's
        # /home/<operator> share both live in THIS host's instance overlay
        # (~/.local/share/charly/vm/charly-cachyos-gpu/instance.yml), merged at
        # `charly vm create` by VmInstanceOverride.ApplyToVmSpec. Generate the hostdev
        # block with `charly vm gpu list`. (Unlike the disposable bed, this
        # persistent workstation deploy declares no `requires_exclusive:` resource,
        # so its hostdev is operator-authored here — auto-allocation
        # (gpu_allocate.go) fires for a `requires_exclusive: [nvidia-gpu]` CLAIMANT
        # like the eval-cachyos-gpu-vm bed; an operator-authored hostdev always
        # wins regardless.) NOT a disposable test bed — there is no disposable
        # deploy for it; the full machinery is R10-proven on the disposable
        # eval-cachyos-gpu-vm bed instead.
        #
        # SUBSTRATE = CachyOS pacstrap under UEFI/OVMF (same rationale as
        # cachyos-gpu-vm: the RTX 4080's 64-bit large BAR needs UEFI). On this host
        # the passed-through card is vfio-pci-bound and the host drives display
        # from the AMD GPU, so autostarting this VM costs the host no display.
        source:
            kind: bootstrap
            builder: pacstrap
            builder_image: cachyos-pacstrap-builder
            distro: cachyos
            package:
                - sudo
                - openssh
                - qemu-guest-agent
                - cloud-init
                - grub
                - efibootmgr
            rootfs: btrfs
            kernel_args: console=tty0 console=ttyS0,115200 modprobe.blacklist=nouveau nvidia-drm.modeset=1
        backend: libvirt
        # 1 TB VIRTUAL — the qcow2 is sparse (truncate + qemu-img convert with no
        # preallocation), so it grows on demand and the operator's data lives on
        # the /workspace virtiofs share (host passthrough), not on this disk.
        disk_size: 1T
        ram: 64G
        cpu: 12
        machine: q35
        firmware: uefi-insecure
        # Start with the host. Sets libvirt's domain autostart flag AND wires the
        # qemu:///session boot trigger (loginctl enable-linger + virtqemud.socket).
        autostart: true
        network:
            mode: user
        ssh:
            user: cachy
            port: 12228
            key_source: generate
        cloud_init:
            # /etc/pacman.conf is written into the rootfs by the cachyos pacstrap
            # bootstrap (build.yml distro.cachyos.pacstrap.runtime_pacman_conf) —
            # the single source for every cachyos pacstrap VM. (A persistent
            # workstation can later harden SigLevel after pacman-key init.)
            runcmd:
                - systemctl enable --now sshd
                - systemctl enable --now qemu-guest-agent
                # Disable nvidia-container-toolkit's install-time CDI-generate
                # alpm hook. On a VM the passed-through GPU's driver only loads
                # AFTER the nvidia-driver layer's reboot, so `nvidia-ctk cdi
                # generate` at toolkit-install time fails ("NVML: Driver Not
                # Loaded"), pacman exits non-zero, and the deploy aborts at the
                # nvidia layer. CDI is (re)generated post-reboot by the
                # nvidia-driver layer's charly-nvidia-cdi oneshot once the driver is
                # up. Symlinking a hook to /dev/null is pacman's canonical
                # "disable this hook". Runs at first boot, before any deploy.
                - sh -c 'mkdir -p /etc/pacman.d/hooks && ln -sf /dev/null /etc/pacman.d/hooks/nvidia-ctk-cdi.hook'
        libvirt:
            # memfd/shared is auto-paired for the virtiofs share by the renderer;
            # declared explicitly here for clarity on a persistent operator entity.
            memory_backing:
                source: memfd
                access: shared
            devices:
                # NO SPICE, no emulated display head. The passed-through RTX 4080
                # drives the operator's PHYSICAL monitors directly over DRM — the
                # KDE desktop lives there, and (via the ScreenCast-portal browser
                # mirror) is streamed to the browser as the SAME desktop. SPICE + a
                # virtio-gpu head are intentionally BED-ONLY: the portable eval bed
                # (cachyos-gpu-vm) has no physical GPU, so it needs a virtual head to
                # screenshot. On this operator the GPU IS the display; early-boot
                # output is the serial console (console=ttyS0 in kernel_args above).
                # Dropping the virtio head also removes the spurious "Virtual-1"
                # output that otherwise becomes the Plasma primary at 0,0.
                video:
                    - model: none
                # qemu-guest-agent control channel (host↔guest). No spicevmc — the
                # operator runs no SPICE server.
                channels:
                    - type: unix
                      name: org.qemu.guest_agent.0
                # NO host-path `filesystems:` and NO `hostdevs:` committed here —
                # both are host-specific and live in THIS host's instance overlay
                # (~/.local/share/charly/vm/charly-cachyos-gpu/instance.yml), merged at
                # `charly vm create` by VmInstanceOverride.ApplyToVmSpec:
                #   - the GPU <hostdev> (RTX 4080, IOMMU group = 01:00.0 + 01:00.1);
                #   - the operator's home (/home/<operator>) shared into the guest at
                #     /workspace via virtiofs passthrough (mounted by the
                #     workspace-mount layer; passthrough preserves uid/gid).
pod: {}
k8s: {}
