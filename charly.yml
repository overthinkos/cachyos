# Cross-deployment probing (pod→pod): a Chrome DRIVER pod (sibling member)
# CDP-probes this web-server SUBJECT pod over the shared `charly` network.
# Proves cross-member addressing via ${HOST:<subject>} plus tree-position
# placement end-to-end — the canonical "a different kind of deployment tests
# another" case. The chrome member is brought up ALONGSIDE the root by
# bringUpMembers (the shared deploy+check lifecycle, R3); it is an instrument,
# never check-live'd itself.
check-versa-pod:
    bundle:
        box: versa
        disposable: true
        lifecycle: dev
        description: Sole proof the full OSM analytics + vector-tile pipeline (quackosm/tippecanoe/martin/maputnik + GPU geospatial extensions) plus the marimo MCP notebook surface composes and runs end-to-end on CachyOS. Builds (pixi/npm/cargo source builds — tippecanoe-from-source, martin Rust musl multistage) and deploys the versa pod, then runs notebook-render byte checks, martin /monaco tilejson HTTP probes, pipeline-artifact byte checks, GPU-extension import checks, and the marimo MCP read-only notebook-inspection tools.
    check-versa-pod-requires_shared:
        requires_shared: [nvidia-gpu]
check-githubrunner-pod:
    bundle:
        box: githubrunner
        disposable: true
        lifecycle: dev
        # No port: — the runner has no listening service (host net, outbound only).
        # No RUNNER_TOKEN/RUNNER_ORG → the guarded post_enable no-ops, so the bed
        # proves the rootless CachyOS composition WITHOUT GitHub registration.
        # Inherits the github-runner + container-nesting baked check: checks
        # (functional binary runs + the rootless nested-podman proof).
        description: Sole proof of the rootless CachyOS GitHub Actions runner composition — actions-runner config.sh + cosign/skopeo/buildah/go + rootless nested podman at uid 1000 — WITHOUT GitHub registration. Builds and deploys the githubrunner pod (no token → guarded hooks no-op) and runs the inherited github-runner + container-nesting + charly + dbus baked checks — functional binary runs plus the rootless nested-podman proof (unmask=/proc/*, zero caps, newuidmap file-caps).
check-android-emulator-pod:
    bundle:
        box: android-emulator
        disposable: true
        lifecycle: dev
        description: 'Sole proof Android is a first-class deploy substrate — an Android 16 (API 36) emulator pod with /dev/kvm passthrough plus two nested kind:android devices installing apps via the apk: package format over BOTH in-pod adb and a remote adb endpoint; the only adb+appium probe bed and the status-shows-android/nested witness. Builds and deploys the android-emulator pod (base selkies-labwc), deploys two nested kind:android devices (in-pod pixel9a-36 installing F-Droid via apkeep; remote-endpoint pixel9a-endpoint installing ApiDemos via goadb), and runs charly status --json (kind:android + nested array) plus the android-emulator-layer adb probes plus appium-server status plus selkies-inherited stream/mcp.'
    device:
        bundle:
            android: pixel9a-36
        device-add_candy:
            add_candy:
                - '@github.com/overthinkos/overthink/candy/android-test-apps:v2026.170.1105'
    device-net:
        bundle:
            android: pixel9a-endpoint
        device-net-add_candy:
            add_candy:
                - '@github.com/overthinkos/overthink/candy/android-apidemos:v2026.170.1105'
    status-shows-android:
        check: command=charly status --json
        id: status-shows-android
        command: charly status --json
        in_container: false
        stdout:
            - contains: '"kind": "android"'
        context:
            - runtime
    status-shows-nested:
        check: command=charly status --json
        id: status-shows-nested
        command: charly status --json
        in_container: false
        stdout:
            # The pod→android nested tree renders as a JSON `nested:[…]`
            # array under the emulator pod (children bare-keyed device/
            # device-net; the parent context comes from the nesting, so
            # there is no flattened dotted path). Assert the overlay
            # structure. Fails if status_nested stops nesting the
            # AndroidCollector rows under their parent pod.
            - contains: '"nested"'
        context:
            - runtime
