cachyos-vm:
    vm:
        # Bootstrap-from-scratch via cachyos-pacstrap-builder (local). The cachyos
        # distro config (pacstrap base packages, keyring, mirrors, repos) lives in
        # the embedded build vocabulary (`charly/charly.yml`).
        source:
            kind: bootstrap
            builder: pacstrap
            builder_image: cachyos-pacstrap-builder
            distro: cachyos
            package:
                - sudo
                - openssh
                - qemu-guest-agent
                - cloud-init
                - grub
                - efibootmgr
            rootfs: btrfs
            kernel_args: console=tty0 console=ttyS0,115200
        disk_size: 25G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: uefi-insecure
        network:
            mode: user
        ssh:
            user: cachy
            port: 12226
            key_source: generate
        cloud_init:
            # The cachy account (sudo NOPASSWD + /bin/bash + ssh key + wheel) is
            # provisioned from ssh.user via the cloud-init create-pattern
            # (composeUsers), so no explicit users: block is needed here.
            runcmd:
                - systemctl enable --now sshd
                - systemctl enable --now qemu-guest-agent
                # Disable nvidia-container-toolkit's install-time CDI-generate
                # alpm hook. On a VM the passed-through GPU's driver only loads
                # AFTER the nvidia-driver layer's reboot, so `nvidia-ctk cdi
                # generate` at toolkit-install time fails ("NVML: Driver Not
                # Loaded"), pacman exits non-zero, and the deploy aborts at the
                # nvidia layer. CDI is (re)generated post-reboot by the
                # nvidia-driver layer's charly-nvidia-cdi oneshot once the driver is
                # up. Symlinking a hook to /dev/null is pacman's canonical
                # "disable this hook". Runs at first boot, before any deploy.
                - sh -c 'mkdir -p /etc/pacman.d/hooks && ln -sf /dev/null /etc/pacman.d/hooks/nvidia-ctk-cdi.hook'
cachyos-gpu-vm:
    vm:
        # GPU-passthrough VM guest that receives a physical NVIDIA GPU via a VFIO
        # <hostdev>. Driven by the check-cachyos-gpu-vm bed, which mirrors the
        # operator workstation: a bare-metal KDE Plasma seat in-guest plus a nested
        # selkies-kde-nvidia streaming pod (real NVENC) deployed as a persistent
        # in-guest quadlet.
        #
        # SUBSTRATE = CachyOS bootstrap (pacstrap) under UEFI/OVMF. UEFI is
        # MANDATORY for a modern GPU: the RTX 4080's 16 GB VRAM sits behind a
        # 64-bit large BAR that SeaBIOS cannot map, so under BIOS the guest nvidia
        # driver fails GSP boot ("bad register read 0xbadf…"). The Arch cloud image
        # can't boot under UEFI (stale BOOTX64.EFI; see /charly-vm:arch), so a fresh
        # pacstrap install with its own EFI bootloader is used — it boots the
        # passed-through GPU cleanly under OVMF. pacstrap needs the rootful builder
        # (`charly settings set engine.rootful sudo`).
        #
        # PORTABLE — this committed entity carries NO host-specific devices: no
        # `libvirt.devices.hostdevs:` (a PCI bus/slot address is host-specific) and
        # no host-path `filesystems:` (a virtiofs share rooted at an absolute host
        # path). The GPU hostdev is AUTO-ALLOCATED: the bed declares
        # `requires_exclusive: [nvidia-gpu]`, the embedded resource: vocabulary maps that
        # token to a `resource: {nvidia-gpu: {gpu: {vendor: "0x10de"}}}` selector, and
        # `charly vm create` (autoAllocateExclusiveGPUs) detects the matching NVIDIA
        # card, writes its whole-IOMMU-group `<hostdev>` block into THIS host's
        # instance overlay (~/.local/share/charly/vm/charly-cachyos-gpu-vm/
        # instance.yml), and injects it via VmInstanceOverride.ApplyToVmSpec — so the
        # bed attaches this host's real RTX 4080 (real GPU passthrough + NVENC) with
        # NO manual `charly vm gpu list` step and no PCI address in version control.
        # An operator-authored hostdev (committed here or in instance.yml) ALWAYS
        # wins — auto-allocation defers to it. If the resource is required but no
        # matching card is present, `charly vm create` FAILS HARD (operator directive:
        # auto-allocate or fail hard). The host-path `filesystems:` overlay (if any)
        # is still operator-authored in instance.yml. See /charly-vm:vm "GPU
        # passthrough", /charly-internals:disposable "resource-arbitration axis".
        #
        # backend: libvirt is mandatory — <hostdev> PCI passthrough only renders
        # on the libvirt backend. Rootless passthrough also needs a raised memlock
        # limit + /dev/vfio access — see `charly vm gpu status`.
        source:
            kind: bootstrap
            builder: pacstrap
            builder_image: cachyos-pacstrap-builder
            distro: cachyos
            package:
                # Bootstrap essentials ONLY — enough to boot + reach the guest
                # over SSH so layers apply. App packages arrive via add_layer.
                - sudo
                - openssh
                - qemu-guest-agent
                - cloud-init
                - grub
                - efibootmgr
            rootfs: btrfs
            # modprobe.blacklist=nouveau: blacklist the in-tree driver at early
            # boot so the open NVIDIA module binds the passed-through GPU (no
            # initramfs regen needed — see the nvidia-driver layer).
            kernel_args: console=tty0 console=ttyS0,115200 modprobe.blacklist=nouveau nvidia-drm.modeset=1
        backend: libvirt
        # 100G (sparse qcow2): the full KDE+GPU+dev rootfs PLUS the nested
        # selkies-kde-nvidia pod image (~15 GB) loaded into the guest user's
        # rootless podman storage (/home/cachy/.local/share/containers) — 50G
        # ran out of space mid-load. The disk grows on demand, so the larger
        # ceiling costs nothing until used.
        disk_size: 100G
        ram: 8G
        cpu: 4
        machine: q35
        firmware: uefi-insecure
        # Exercises the autostart code path (DomainSetAutostart + linger +
        # virtqemud.socket) on a disposable target — the bed is torn down, so
        # nothing persistently autostarts. This is the R10 vehicle for the
        # generic autostart machinery the cachyos-gpu operator VM relies on.
        autostart: true
        network:
            mode: user
        ssh:
            user: cachy
            port: 12227
            key_source: generate
        cloud_init:
            # /etc/pacman.conf is written into the rootfs by the cachyos pacstrap
            # bootstrap (the embedded distro.cachyos.pacstrap.runtime_pacman_conf vocabulary) —
            # the single source for every cachyos pacstrap VM, so no per-VM
            # write_files block is needed here.
            runcmd:
                - systemctl enable --now sshd
                - systemctl enable --now qemu-guest-agent
                # Disable nvidia-container-toolkit's install-time CDI-generate
                # alpm hook. On a VM the passed-through GPU's driver only loads
                # AFTER the nvidia-driver layer's reboot, so `nvidia-ctk cdi
                # generate` at toolkit-install time fails ("NVML: Driver Not
                # Loaded"), pacman exits non-zero, and the deploy aborts at the
                # nvidia layer. CDI is (re)generated post-reboot by the
                # nvidia-driver layer's charly-nvidia-cdi oneshot once the driver is
                # up. Symlinking a hook to /dev/null is pacman's canonical
                # "disable this hook". Runs at first boot, before any deploy.
                - sh -c 'mkdir -p /etc/pacman.d/hooks && ln -sf /dev/null /etc/pacman.d/hooks/nvidia-ctk-cdi.hook'
    cachyos-gpu-vm-libvirt:
        libvirt:
            # memfd/shared backing is auto-paired by the renderer for the virtiofs
            # share; declared here too so the bed asserts the explicit path works.
            memory_backing:
                source: memfd
                access: shared
            devices:
                # SPICE virtual monitor: the headless display the GPU-passthrough
                # KDE session renders to, so `charly check spice screenshot` captures the
                # live desktop (the bed asserts a non-uniform frame = it rendered).
                # The virtio-gpu head is the seat-0 primary scanout — the passed-
                # through NVIDIA GPU has no connected output.
                graphics:
                    - type: spice
                      listen:
                        - type: socket
                video:
                    - model: virtio
                      vram: 65536
                      heads: 1
                      accel3d: false
                      primary: true
                # Guest-agent control channel + the SPICE agent channel (spicevmc) —
                # exercises the structured unix channel render + qemu-guest-agent.
                channels:
                    - type: unix
                      name: org.qemu.guest_agent.0
                    - type: spicevmc
                      name: com.redhat.spice.0
                      # NO host-path `filesystems:` and NO `hostdevs:` committed here —
                      # both are host-specific and live in THIS host's instance overlay
                      # (~/.local/share/charly/vm/charly-cachyos-gpu-vm/instance.yml), merged at
                      # `charly vm create` by VmInstanceOverride.ApplyToVmSpec:
                      #   - the GPU <hostdev> (RTX 4080, IOMMU group = 01:00.0 + 01:00.1);
                      #   - a virtiofs `workspace` share rooted at an operator-provisioned
                      #     mode-0700 scratch dir (NOT world-writable /tmp) so the
                      #     guest-user idmap is actually exercised: the guest user owns +
                      #     writes it ONLY when the auto-injected idmap maps guest-uid-1000
                      #     → the host operator (libvirt's default maps guest-ROOT →
                      #     operator, leaving it root-owned + unreadable to the guest user).
cachyos-gpu-workstation-vm:
    vm:
        # PERSISTENT operator GPU workstation VM — the full charly-cachyos dev stack
        # PLUS a complete KDE Plasma desktop synced to the host, inside a
        # GPU-passthrough VM that auto-starts with the host. The VM analog of the
        # `charly-cachyos` local workstation profile, evolved into a full graphical
        # `<distro>-coder` workstation; provisioned once via the `cachyos-gpu`
        # kind:deploy (full layer stack over SSH, persisted on the guest disk),
        # then it just boots. Supersedes the earlier headless charly-cachyos-gpu.
        #
        # Two ways to use the SAME GPU: a physical monitor on the RTX 4080
        # (SDDM/Plasma on DRM), and a remote KDE-selkies WebRTC browser stream
        # (port 3000, NVENC) of a nested Plasma.
        #
        # PORTABLE (like local.charly-cachyos): this committed entity carries NO
        # host-specific config — the NVIDIA PCI <hostdev> and the operator's
        # /home/<operator> share both live in THIS host's instance overlay
        # (~/.local/share/charly/vm/charly-cachyos-gpu/instance.yml), merged at
        # `charly vm create` by VmInstanceOverride.ApplyToVmSpec. Generate the hostdev
        # block with `charly vm gpu list`. (Unlike the disposable bed, this
        # persistent workstation deploy declares no `requires_exclusive:` resource,
        # so its hostdev is operator-authored here — auto-allocation
        # (gpu_allocate.go) fires for a `requires_exclusive: [nvidia-gpu]` CLAIMANT
        # like the check-cachyos-gpu-vm bed; an operator-authored hostdev always
        # wins regardless.) NOT a disposable test bed — there is no disposable
        # deploy for it; the full machinery is R10-proven on the disposable
        # check-cachyos-gpu-vm bed instead.
        #
        # SUBSTRATE = CachyOS pacstrap under UEFI/OVMF (same rationale as
        # cachyos-gpu-vm: the RTX 4080's 64-bit large BAR needs UEFI). On this host
        # the passed-through card is vfio-pci-bound and the host drives display
        # from the AMD GPU, so autostarting this VM costs the host no display.
        source:
            kind: bootstrap
            builder: pacstrap
            builder_image: cachyos-pacstrap-builder
            distro: cachyos
            package:
                - sudo
                - openssh
                - qemu-guest-agent
                - cloud-init
                - grub
                - efibootmgr
            rootfs: btrfs
            kernel_args: console=tty0 console=ttyS0,115200 modprobe.blacklist=nouveau nvidia-drm.modeset=1
        backend: libvirt
        # 1 TB VIRTUAL — the qcow2 is sparse (truncate + qemu-img convert with no
        # preallocation), so it grows on demand and the operator's data lives on
        # the /workspace virtiofs share (host passthrough), not on this disk.
        disk_size: 1T
        ram: 64G
        cpu: 12
        machine: q35
        firmware: uefi-insecure
        # Start with the host. Sets libvirt's domain autostart flag AND wires the
        # qemu:///session boot trigger (loginctl enable-linger + virtqemud.socket).
        autostart: true
        network:
            mode: user
        ssh:
            user: cachy
            port: 12228
            key_source: generate
        cloud_init:
            # /etc/pacman.conf is written into the rootfs by the cachyos pacstrap
            # bootstrap (the embedded distro.cachyos.pacstrap.runtime_pacman_conf vocabulary) —
            # the single source for every cachyos pacstrap VM. (A persistent
            # workstation can later harden SigLevel after pacman-key init.)
            runcmd:
                - systemctl enable --now sshd
                - systemctl enable --now qemu-guest-agent
                # Disable nvidia-container-toolkit's install-time CDI-generate
                # alpm hook. On a VM the passed-through GPU's driver only loads
                # AFTER the nvidia-driver layer's reboot, so `nvidia-ctk cdi
                # generate` at toolkit-install time fails ("NVML: Driver Not
                # Loaded"), pacman exits non-zero, and the deploy aborts at the
                # nvidia layer. CDI is (re)generated post-reboot by the
                # nvidia-driver layer's charly-nvidia-cdi oneshot once the driver is
                # up. Symlinking a hook to /dev/null is pacman's canonical
                # "disable this hook". Runs at first boot, before any deploy.
                - sh -c 'mkdir -p /etc/pacman.d/hooks && ln -sf /dev/null /etc/pacman.d/hooks/nvidia-ctk-cdi.hook'
    cachyos-gpu-workstation-vm-libvirt:
        libvirt:
            # memfd/shared is auto-paired for the virtiofs share by the renderer;
            # declared explicitly here for clarity on a persistent operator entity.
            memory_backing:
                source: memfd
                access: shared
            devices:
                # NO SPICE, no emulated display head. The passed-through RTX 4080
                # drives the operator's PHYSICAL monitors directly over DRM — the
                # KDE desktop lives there, and (via the ScreenCast-portal browser
                # mirror) is streamed to the browser as the SAME desktop. SPICE + a
                # virtio-gpu head are intentionally BED-ONLY: the portable check bed
                # (cachyos-gpu-vm) has no physical GPU, so it needs a virtual head to
                # screenshot. On this operator the GPU IS the display; early-boot
                # output is the serial console (console=ttyS0 in kernel_args above).
                # Dropping the virtio head also removes the spurious "Virtual-1"
                # output that otherwise becomes the Plasma primary at 0,0.
                video:
                    - model: none
                # qemu-guest-agent control channel (host↔guest). No spicevmc — the
                # operator runs no SPICE server.
                channels:
                    - type: unix
                      name: org.qemu.guest_agent.0
                      # NO host-path `filesystems:` and NO `hostdevs:` committed here —
                      # both are host-specific and live in THIS host's instance overlay
                      # (~/.local/share/charly/vm/charly-cachyos-gpu/instance.yml), merged at
                      # `charly vm create` by VmInstanceOverride.ApplyToVmSpec:
                      #   - the GPU <hostdev> (RTX 4080, IOMMU group = 01:00.0 + 01:00.1);
                      #   - the operator's home (/home/<operator>) shared into the guest at
                      #     /workspace via virtiofs passthrough (mounted by the
                      #     workspace-mount layer; passthrough preserves uid/gid).
# In-pod emulator device — the android-emulator image bakes the Android 16
# (API 36, google_apis_playstore x86_64) system image + the pixel_9a AVD;
# this device REFERENCES it (the API level / system image are build-time
# properties, not driven from here). apkeep runs in-pod; adb reaches the
# emulator via the pod. google_account names the credential-store secret
# keys the apkeep google-play source reads (an AAS token, NOT a password).
pixel9a-36:
    android:
        box: android-emulator
        device: pixel_9a
        api_level: 36
        google_account:
            email_secret: GOOGLE_ACCOUNT_EMAIL
            token_secret: GOOGLE_AAS_TOKEN
# Remote/physical device example — addresses an adb SERVER over the network
# (a host running `adb connect` to a phone, OR an emulator pod's published
# 5037). apkeep runs on the HOST and the APK is pushed via goadb to the
# endpoint; the host needs apkeep + android-tools (adb) for the `package:`
# download path (PKGBUILD optdepends). The `apk: <committed-file>` path
# needs neither (pure goadb push). The 127.0.0.1:35002 value here matches
# the check-android-emulator-pod bed's published ADB port — it lets the
# remote/endpoint code path be exercised against the bed's own emulator
# with no physical hardware.
pixel9a-endpoint:
    android:
        adb:
            # ${HOST_PORT:5037} resolves at deploy time to the PARENT emulator
            # pod's host-mapped adb-server port (container 5037), so the endpoint
            # follows the pod's published port instead of hard-coding it. Used
            # nested under check-android-emulator-pod (which publishes …:5037).
            host: 127.0.0.1:${HOST_PORT:5037}
        serial: emulator-5554
        device: pixel_9a
