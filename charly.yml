        description: Sole proof the in-development charly toolchain (--dev-local-pkg) exposes and runs every command group correctly in-container on the full CachyOS toolchain image, plus the charly-mcp Kong MCP surface. Builds and deploys the charly-selftest pod (charly-mcp + container-nesting + claude-code) and runs ~13 in-container command checks across every charly command group (version/doctor/settings/secrets/vm/status/box/deploy/check/clean/migrate/feature/config) plus charly-mcp's mcp list-tools/call (box.build/box.list live).
