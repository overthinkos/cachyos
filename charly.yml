#  overthinkos/cachyos — the CachyOS image family, split out of the main
#  opencharly repo (2026-05). Mounted as a git submodule at box/cachyos.
#
#  SINGLE-FILE config: every entity (the cachyos base + pacstrap family + the 7
#  relocated app/fixture boxes under box/, the cachyos VMs, the disposable check
#  beds, the charly-cachyos operator profile + its kind:local template) is inlined
#  here or discovered under box/. This repo VENDORS its cachyos-exclusive layers
#  locally under candy/ (resolved via the discover: block); every shared layer is
#  an `@github.com/overthinkos/overthink/candy/...` ref into the main repo. The
#  Arch base/builder stack lives in the overthinkos/arch submodule (2026-06 box
#  inversion).
#
#  import: a single namespaced entry — `arch: <ref>` mounts overthinkos/arch under
#  the `arch` namespace, so `arch.arch` (cachyos-pacstrap-builder's base),
#  `arch.arch-builder` (the cachyos base's builder), and `arch.cuda-arch-builder`
#  (the selkies-*-nvidia GPU builder) resolve. One-directional — arch imports
#  nothing back; the former main↔cachyos mutual cycle is dissolved.
#
#  Directly buildable: `charly box build cachyos` (from the parent repo:
#  `charly -C box/cachyos box build cachyos`; anywhere:
#  `charly --repo overthinkos/cachyos box build cachyos`).
version: 2026.169.0004
defaults:
    platform:
        - linux/amd64
    tag: auto
    registry: ghcr.io/overthinkos
    build:
        - pac
    merge:
        auto: false
        max_mb: 128
import:
    # The Arch base/builder stack lives in the overthinkos/arch submodule (2026-06
    # box inversion). cachyos-pacstrap-builder bases on arch.arch; the cachyos base
    # + selkies images route their pixi/npm/cargo/aur builders to arch.arch-builder
    # / arch.cuda-arch-builder. Candy layers resolve via @github refs (not this
    # namespace). One-directional import — arch imports nothing back.
    - arch: '@github.com/overthinkos/arch:v2026.170.1539'
discover:
    - path: box
      recursive: true
    - path: candy
      recursive: true
# Disposable R10 test bed for the cachyos bootstrap VM (kind:check — the
# 2026-05 deploy→check unification moved repo-shipped disposable beds out of
# deploy.yml). disposable: true is the sole authorization for the unattended
# destroy+rebuild driven by `charly check run check-cachyos-vm`.
check-cachyos-vm:
    bundle:
        vm: cachyos-vm
        disposable: true
        lifecycle: dev
        description: Sole proof of the CachyOS pacstrap-from-scratch bootstrap VM booting AND the charly toolchain installing as a native pac package (opencharly-git via makepkg + pacman -U), distinct from the Arch cloud-VM pac witness. Pacstrap-builds a CachyOS rootfs, boots it under UEFI, deploys the charly + dev-tools layers over SSH (the charly localpkg builds opencharly-git from the superproject pkg/arch), then runs the baked charly-binary/version + dev-tools command/file/package checks.
    check-cachyos-vm-add_candy:
        # The cachyos bootstrap-VM R10 canary: pacstrap builds the cachyos rootfs
        # from scratch, the guest boots, the charly candy deploys onto it (its
        # localpkg: builds opencharly-git from the superproject pkg/arch via makepkg
        # and `pacman -U`s it in — a failed install fails THIS bed at the deploy
        # step), and the baked charly-binary/charly-version checks run on the guest.
        # The explicit pac localpkg AUTO-RESOLVE assertion (pacman -U pulling the
        # mandatory repo deps podman/libvirt/tailscale/gocryptfs) lives ONCE, on
        # main's purpose-built `check-charly-vm` pac witness — the dedicated home for
        # that assertion, so it is not duplicated across beds.
        # dev-tools is composed here so this canary also validates the cachyos
        # workstation's core dev toolkit installs (golangci-lint / gopls / etc.).
        add_candy:
            - '@github.com/overthinkos/overthink/candy/charly:v2026.170.1105'
            - '@github.com/overthinkos/overthink/candy/dev-tools:v2026.170.1105'
    check-cachyos-vm-install_opts:
        install_opts:
            allow_repo_changes: true
            allow_root_tasks: true
# Disposable R10 bed mirroring the cachyos-gpu WORKSTATION's exact dual-desktop
# config — the acceptance gate for the live Part C migration:
#   host (IOMMU on) → cachyos-gpu-vm (VFIO GPU passthrough, nvidia-open kernel
#   module) running BOTH (a) the full in-guest KDE Plasma SDDM seat (the
#   bare-metal desktop on the virtual head) AND (b) a nested selkies-kde-nvidia
#   POD (the headless WebRTC streaming desktop, real NVENC).
# The bed applies the nvidia toolkit + nvidia-driver kernel layer to the guest
# (the driver layer reboots the guest, via the RebootStep), then runVM deploys
# the nested `selkies-kde` pod as a PERSISTENT in-guest quadlet
# (deployNestedPodsInGuest: host-build selkies-kde-nvidia → cp-box into the
# guest → the guest's own project-free `charly bundle from-box`, lingering on so
# it survives a guest reboot). This is the nested-pod-in-VM capability under
# test. The deploy-scope checks below run inside the guest over SSH.
#
# PORTABLE: every GPU/NVENC check gates on an active in-guest NVIDIA driver and
# passes with an explanatory N/A when none is present — so the bed runs
# anywhere. On a host with the cachyos-gpu-vm hostdev block added locally, the
# same checks assert real GPU encode. See cachyos-gpu-vm in vm.yml.
check-cachyos-gpu-vm:
    bundle:
        vm: cachyos-gpu-vm
        disposable: true
        lifecycle: dev
        description: Sole proof of the operator's dual-desktop GPU workstation config — a VFIO GPU-passthrough VM running BOTH a bare-metal KDE/SDDM seat AND a nested selkies-kde-nvidia streaming pod with real NVENC; the only bed exercising spice+wl+mcp + gpu-passthrough + preempt + nested + localpkg + multistage together. Pacstrap GPU-passthrough VM (preempts the preemptible nvidia-gpu holder) installs the KDE seat + nvidia driver/CDI + charly localpkg + npm AI CLIs, deploys a nested selkies-kde-nvidia quadlet, then over SSH runs ~14 command checks plus the inherited cachyos-gpu-desktop-check spice probes; GPU/NVENC checks N/A cleanly without a VFIO host.
    selkies-kde:
        bundle:
            box: selkies-kde-nvidia
    check-cachyos-gpu-vm-requires_exclusive:
        # Claims the single physical NVIDIA GPU. The resource arbiter
        # (charly/preempt.go) gracefully preempts any RUNNING preemptible holder of
        # the `nvidia-gpu` token — e.g. the operator's vm:cachyos-gpu workstation
        # when its PER-HOST `~/.config/charly/deploy.yml` overlay marks it
        # `preemptible: {holds: [nvidia-gpu]}` — before this bed brings up its VM,
        # and restores it after teardown. The
        # token is portable (a name); on a host with no preemptible nvidia-gpu
        # holder the arbiter finds nothing to preempt (no-op), so the bed still
        # runs anywhere. See /charly-internals:disposable "The resource-arbitration
        # axis", /charly-core:deploy.
        requires_exclusive: [nvidia-gpu]
    check-cachyos-gpu-vm-add_candy:
        add_candy:
            # Order matters: everything before nvidia-driver, whose reboot: true
            # emits a trailing RebootStep — so the guest reboots ONCE after the
            # whole stack is installed and the enabled workspace.mount + guest
            # agent come back clean on the fresh boot. All packages arrive via
            # these layers (never the VM bootstrap package list).
            - podman
            - '@github.com/overthinkos/overthink/candy/qemu-guest-agent:v2026.170.1105'
            - '@github.com/overthinkos/overthink/candy/workspace-mount:v2026.170.1105'
            # nodejs + claude-code exercise the cross-host npm builder on a VM:
            # the npm builder runs on the host and the ~/.npm-global artifacts are
            # tarred into the guest home. Proves the AI-CLI stack installs on a VM
            # (the bug that made claude/codex/etc. silently absent) plus the
            # deploy-time {{.Home}} env.d resolution + env.d-sourcing managed block.
            - '@github.com/overthinkos/overthink/candy/nodejs:v2026.170.1105'
            - '@github.com/overthinkos/overthink/candy/claude-code:v2026.170.1105'
            # Full bare-metal KDE Plasma SEAT — the in-guest half of the workstation
            # (Plasma + SDDM + graphical .target on the virtual head), CachyOS
            # theming, fonts/codecs/dev-gap. The WebRTC STREAMING desktop is NOT an
            # in-guest layer here — it runs as the nested selkies-kde pod below
            # (kde-selkies moved into the selkies-kde-nvidia image). This mirrors the
            # workstation's dual-desktop split: bare-metal seat + headless stream.
            - '@github.com/overthinkos/overthink/candy/kde-desktop:v2026.170.1105'
            - cachyos-kde-settings
            # Shared desktop/monitor/SPICE/selkies + mouse/keyboard/screenshot
            # checks (+ ydotool test tool). charly check live collects this layer's
            # deploy-scope checks for BOTH the bed and the operator VM (R3).
            - cachyos-gpu-desktop-check
            - '@github.com/overthinkos/overthink/candy/fonts-extended:v2026.170.1105'
            - '@github.com/overthinkos/overthink/candy/desktop-media:v2026.170.1105'
            - '@github.com/overthinkos/overthink/candy/cachyos-extras:v2026.170.1105'
            # charly (→ charly layer) exercises the charly-layer-on-VM-deploy path: on
            # this Arch/CachyOS guest the charly layer's localpkg: builds opencharly-git
            # from the repo's pkg/arch PKGBUILD on the host (makepkg) + pacman -U's
            # it into the guest at /usr/bin/charly — proving the proper-package install
            # (not the stale curl-a-binary fallback). Matches the operator
            # cachyos-gpu workstation, which lists charly. Placed before
            # nvidia-driver so nvidia-driver's reboot: still trails the whole stack.
            - '@github.com/overthinkos/overthink/candy/charly:v2026.170.1105'
            - '@github.com/overthinkos/overthink/candy/nvidia:v2026.170.1105'
            - nvidia-driver
    check-cachyos-gpu-vm-install_opts:
        install_opts:
            # with_service gates the systemd unit enable for sddm (the bare-metal
            # KDE seat). The persistent cachyos-gpu deploy sets it; the bed must
            # too, or the desktop services install but never enable (the R10
            # failure). The selkies STREAM is now in the nested pod, not these
            # in-guest layers.
            with_service: true
            allow_repo_changes: true
            allow_root_tasks: true
            skip_incompatible: true
            verify: true
            # The guest add_layers' only builder need is the npm builder for
            # nodejs/claude-code; cuda-arch-builder is a node-capable superset (the
            # NVENC pixi build of pixelflux now lives in the selkies-kde-nvidia image
            # built on the host, not these guest layers).
            builder_image: arch.cuda-arch-builder
    gpu-guest-cachyos-kernel:
        check: command=pacman -Q linux-cachyos 2>/dev/null && echo CACHYOS-KERNEL
        id: gpu-guest-cachyos-kernel
        command: pacman -Q linux-cachyos 2>/dev/null && echo CACHYOS-KERNEL
        stdout:
            contains: CACHYOS-KERNEL
        context:
            - runtime
    gpu-podman-present:
        check: command=command -v podman
        id: gpu-podman-present
        command: command -v podman
        exit_status: 0
        context:
            - runtime
    gpu-nvidia-ctk-present:
        check: command=command -v nvidia-ctk
        id: gpu-nvidia-ctk-present
        command: command -v nvidia-ctk
        exit_status: 0
        context:
            - runtime
    gpu-nouveau-blacklisted:
        check: |
            command=if lsmod | grep -q nouveau; then echo NOUVEAU-LOADED; else echo nouveau-blacklisted; fi
        id: gpu-nouveau-blacklisted
        command: |
            if lsmod | grep -q nouveau; then echo NOUVEAU-LOADED; else echo nouveau-blacklisted; fi
        stdout:
            contains: nouveau-blacklisted
        context:
            - runtime
    gpu-driver-active:
        check: |
            command=if ! grep -ql 0x10de /sys/bus/pci/devices/*/vendor 2>/dev/null; then
              echo "GPU driver N/A: no NVIDIA GPU passed through to this guest"
            else
              for i in $(seq 1 30); do { [ -e /dev/nvidia0 ] || nvidia-smi >/dev/null 2>&1; } && break; sleep 2; done
              nvidia-smi -L
            fi
        id: gpu-driver-active
        command: |
            if ! grep -ql 0x10de /sys/bus/pci/devices/*/vendor 2>/dev/null; then
              echo "GPU driver N/A: no NVIDIA GPU passed through to this guest"
            else
              for i in $(seq 1 30); do { [ -e /dev/nvidia0 ] || nvidia-smi >/dev/null 2>&1; } && break; sleep 2; done
              nvidia-smi -L
            fi
        exit_status: 0
        context:
            - runtime
    gpu-charly-proper-package:
        check: |
            command=pacman -Q opencharly-git >/dev/null 2>&1 &&
            test "$(command -v charly)" -ef /usr/bin/charly &&
            charly bundle from-box --help >/dev/null 2>&1 &&
            echo CHARLY-PROPER-PACKAGE
        id: gpu-charly-proper-package
        command: |
            pacman -Q opencharly-git >/dev/null 2>&1 &&
            test "$(command -v charly)" -ef /usr/bin/charly &&
            charly bundle from-box --help >/dev/null 2>&1 &&
            echo CHARLY-PROPER-PACKAGE
        stdout:
            - contains: CHARLY-PROPER-PACKAGE
        exit_status: 0
        context:
            - runtime
    nested-selkies-kde-quadlet:
        check: |
            command=export XDG_RUNTIME_DIR=/run/user/$(id -u)
            for i in $(seq 1 30); do systemctl --user is-active charly-selkies-kde >/dev/null 2>&1 && break; sleep 2; done
            printf 'active=%s linger=%s\n' \
              "$(systemctl --user is-active charly-selkies-kde 2>/dev/null)" \
              "$(loginctl show-user "$(id -un)" -p Linger --value 2>/dev/null)"
        id: nested-selkies-kde-quadlet
        command: |
            export XDG_RUNTIME_DIR=/run/user/$(id -u)
            for i in $(seq 1 30); do systemctl --user is-active charly-selkies-kde >/dev/null 2>&1 && break; sleep 2; done
            printf 'active=%s linger=%s\n' \
              "$(systemctl --user is-active charly-selkies-kde 2>/dev/null)" \
              "$(loginctl show-user "$(id -un)" -p Linger --value 2>/dev/null)"
        stdout:
            - contains: active=active
            - contains: linger=yes
        exit_status: 0
        context:
            - runtime
    nested-selkies-kde-stream:
        check: |
            command=for i in $(seq 1 60); do
              code=$(curl -kso /dev/null -w '%{http_code}' https://localhost:3000/ 2>/dev/null)
              [ "$code" = "200" ] && { echo "STREAM-UP ($code)"; exit 0; }
              sleep 2
            done
            echo "STREAM-DOWN (last=${code:-none})"; exit 1
        id: nested-selkies-kde-stream
        command: |
            for i in $(seq 1 60); do
              code=$(curl -kso /dev/null -w '%{http_code}' https://localhost:3000/ 2>/dev/null)
              [ "$code" = "200" ] && { echo "STREAM-UP ($code)"; exit 0; }
              sleep 2
            done
            echo "STREAM-DOWN (last=${code:-none})"; exit 1
        stdout:
            contains: STREAM-UP
        exit_status: 0
        context:
            - runtime
    workspace-virtiofs-idmap-rw:
        check: |
            command=# The virtiofs /workspace share is OPERATOR-PROVISIONED (a host-path
            # filesystems: block the operator adds locally), exactly like the GPU
            # hostdevs: above — NOT committed on the disposable bed. So this check
            # N/As (like gpu-driver-active) when no virtiofs /workspace is present,
            # and exercises the guest-user idmap (D4) only on an operator host that
            # mounted the share. Never a silent pass where the share WAS provisioned:
            # there fstype IS virtiofs and the full idmap + RW assertion runs.
            fstype=$(findmnt -n -o FSTYPE /workspace 2>/dev/null || echo MISSING)
            if [ "$fstype" != "virtiofs" ]; then
              echo "WORKSPACE-IDMAP-RW (N/A: no operator-provisioned virtiofs /workspace share on this bed, fstype=$fstype)"
            else
              owner=$(stat -c %U /workspace 2>/dev/null)
              [ "$owner" = "$(id -un)" ] || { echo "FAIL: /workspace owned by '$owner', not the guest user '$(id -un)' — guest-user idmap not applied (libvirt default maps guest-root)"; exit 1; }
              touch /workspace/.charly-probe 2>/dev/null && rm -f /workspace/.charly-probe && echo WORKSPACE-IDMAP-RW
            fi
        id: workspace-virtiofs-idmap-rw
        command: |
            # The virtiofs /workspace share is OPERATOR-PROVISIONED (a host-path
            # filesystems: block the operator adds locally), exactly like the GPU
            # hostdevs: above — NOT committed on the disposable bed. So this check
            # N/As (like gpu-driver-active) when no virtiofs /workspace is present,
            # and exercises the guest-user idmap (D4) only on an operator host that
            # mounted the share. Never a silent pass where the share WAS provisioned:
            # there fstype IS virtiofs and the full idmap + RW assertion runs.
            fstype=$(findmnt -n -o FSTYPE /workspace 2>/dev/null || echo MISSING)
            if [ "$fstype" != "virtiofs" ]; then
              echo "WORKSPACE-IDMAP-RW (N/A: no operator-provisioned virtiofs /workspace share on this bed, fstype=$fstype)"
            else
              owner=$(stat -c %U /workspace 2>/dev/null)
              [ "$owner" = "$(id -un)" ] || { echo "FAIL: /workspace owned by '$owner', not the guest user '$(id -un)' — guest-user idmap not applied (libvirt default maps guest-root)"; exit 1; }
              touch /workspace/.charly-probe 2>/dev/null && rm -f /workspace/.charly-probe && echo WORKSPACE-IDMAP-RW
            fi
        exit_status: 0
        stdout:
            contains: WORKSPACE-IDMAP-RW
        context:
            - runtime
    ai-cli-claude-installed:
        check: |
            command=test -x "$HOME/.npm-global/bin/claude" || { echo "FAIL: ~/.npm-global/bin/claude missing — cross-host npm builder did not install it"; exit 1; }
            "$HOME/.npm-global/bin/claude" --version >/dev/null 2>&1 && echo CLAUDE-INSTALLED
        id: ai-cli-claude-installed
        command: |
            test -x "$HOME/.npm-global/bin/claude" || { echo "FAIL: ~/.npm-global/bin/claude missing — cross-host npm builder did not install it"; exit 1; }
            "$HOME/.npm-global/bin/claude" --version >/dev/null 2>&1 && echo CLAUDE-INSTALLED
        stdout:
            contains: CLAUDE-INSTALLED
        context:
            - runtime
    envd-guest-home:
        check: |
            command=f="$HOME/.config/opencharly/env.d/nodejs.env"
            test -f "$f" || { echo "FAIL: $f missing"; exit 1; }
            grep -q "$HOME/.npm-global" "$f" || { echo "FAIL: env.d NPM prefix not the guest home"; cat "$f"; exit 1; }
            grep -q "/home/atrawog" "$f" && { echo "FAIL: env.d baked the HOST operator home (the \$HOME bug)"; cat "$f"; exit 1; }
            echo ENVD-GUEST-HOME
        id: envd-guest-home
        command: |
            f="$HOME/.config/opencharly/env.d/nodejs.env"
            test -f "$f" || { echo "FAIL: $f missing"; exit 1; }
            grep -q "$HOME/.npm-global" "$f" || { echo "FAIL: env.d NPM prefix not the guest home"; cat "$f"; exit 1; }
            grep -q "/home/atrawog" "$f" && { echo "FAIL: env.d baked the HOST operator home (the \$HOME bug)"; cat "$f"; exit 1; }
            echo ENVD-GUEST-HOME
        stdout:
            contains: ENVD-GUEST-HOME
        context:
            - runtime
    envd-on-login-path:
        check: |
            command=bash -lic 'command -v claude >/dev/null 2>&1' && echo CLAUDE-ON-LOGIN-PATH || { echo "FAIL: claude not on the interactive-login PATH — env.d aggregator not sourced by the login shell"; exit 1; }
        id: envd-on-login-path
        command: |
            bash -lic 'command -v claude >/dev/null 2>&1' && echo CLAUDE-ON-LOGIN-PATH || { echo "FAIL: claude not on the interactive-login PATH — env.d aggregator not sourced by the login shell"; exit 1; }
        stdout:
            contains: CLAUDE-ON-LOGIN-PATH
        context:
            - runtime
    qemu-ga-active:
        check: |
            command=test -f /etc/qemu/qemu-ga.conf && systemctl is-active --quiet qemu-guest-agent && echo QGA-ACTIVE
        id: qemu-ga-active
        command: |
            test -f /etc/qemu/qemu-ga.conf && systemctl is-active --quiet qemu-guest-agent && echo QGA-ACTIVE
        stdout:
            contains: QGA-ACTIVE
            # Shared desktop / monitor / SPICE / selkies checks now
            # live in the cachyos-gpu-desktop-check layer (added via add_layer above);
            # charly check live collects an applied layer's deploy-scope checks, so the SAME
            # set runs on BOTH this bed and the persistent cachyos-gpu deploy (R3).
        context:
            - runtime
# Disposable R10 pod beds for the CachyOS GPU image family. Each drives the
# full `charly check run` sequence (build → check box → deploy → check live →
# fresh update → tear down) on the cachyos-namespace image of the same name.
# Host ports are remapped into a dedicated 45xxx range so the beds never
# collide with an operator's production services on the canonical ports.
# Deploy- and build-scope check coverage is inherited from the composed
# layers (the "lowest level" principle) — the beds carry no check: of their
# own. The GPU base (nvidia) and python-ml carry no service, so they are
# proved by `charly check box` alone and need no pod bed.
check-cachyos-jupyter-ml-pod:
    bundle:
        box: jupyter-ml
        disposable: true
        lifecycle: dev
        description: Sole proof the CachyOS GPU jupyter-ml image (JupyterLab + ML/spacy/quarto + jupyter MCP) composes on the Arch CUDA base — the cachyos-distro variant of the fedora jupyter-ml bed. Builds and deploys the jupyter-ml pod (cachyos.nvidia base) and runs the inherited jupyter-ml + notebook-templates + dbus baked checks — JupyterLab HTTP liveness, package/file/service probes, and jupyter MCP-server probes.
    check-cachyos-jupyter-ml-pod-requires_shared:
        requires_shared: [nvidia-gpu]
check-cachyos-ollama-pod:
    bundle:
        box: ollama
        disposable: true
        lifecycle: dev
        description: Sole proof the CachyOS GPU ollama LLM-server image composes and serves on the Arch CUDA base. Builds and deploys the ollama pod and runs the inherited ollama + dbus baked checks — server HTTP/API liveness plus binary/service/port/file probes; GPU via CDI when present, portable otherwise.
check-cachyos-comfyui-pod:
    bundle:
        box: comfyui
        disposable: true
        lifecycle: dev
        description: Sole proof the CachyOS GPU comfyui image-generation server composes and serves on the Arch CUDA base. Builds and deploys the comfyui pod and runs the inherited comfyui + dbus baked checks — ComfyUI HTTP UI liveness plus service/port/file/command probes.
    check-cachyos-comfyui-pod-requires_shared:
        requires_shared: [nvidia-gpu]
check-cachyos-unsloth-studio-pod:
    bundle:
        box: unsloth-studio
        disposable: true
        lifecycle: dev
        description: Sole proof the CachyOS GPU unsloth-studio fine-tuning notebook + API composes on the Arch CUDA base (no MCP candy, unlike jupyter-ml). Builds and deploys the unsloth-studio pod and runs the inherited unsloth-studio + notebook-finetuning + dbus baked checks — notebook/API HTTP liveness plus file/service/port/command probes.
    check-cachyos-unsloth-studio-pod-requires_shared:
        requires_shared: [nvidia-gpu]
check-cachyos-immich-ml-pod:
    bundle:
        box: immich-ml
        disposable: true
        lifecycle: dev
        description: Sole proof the full 9-candy Immich photo stack (Immich + PostgreSQL + VectorChord + Redis + CUDA ML) composes and reaches steady-state together on the Arch CUDA base — the heaviest multi-service pod bed. Builds and deploys the immich-ml pod (nodejs + python-ml + supervisord + postgresql + vectorchord + redis + immich + immich-ml) via the build [pac, aur] + npm multistage, then runs the inherited multi-service HTTP/port/service/command/file/package liveness checks.
    check-cachyos-immich-ml-pod-requires_shared:
        requires_shared: [nvidia-gpu]
check-selkies-kde-pod:
    bundle:
        box: selkies-kde
        disposable: true
        lifecycle: dev
        description: Sole proof of the full KDE Plasma selkies streaming desktop (de-SDDM startplasma-wayland nested in pixelflux, VAAPI/x264 HW-encode) on the plain CachyOS base — the wl-probe-bearing compositor variant. Builds (pixi pixelflux Rust + AUR chrome/wlrctl multistage) and deploys the selkies-kde pod, then runs the inherited kde-selkies wl probes (compositor=kwin, toplevel, clipboard, type), the selkies HTTPS :3000 stream check, chrome-devtools-mcp probes, and the VAAPI H264 encode probe (HW-encodes on the AMD iGPU host).
# check-selkies-labwc-pod deploys the CPU streaming desktop on the CachyOS
# (Arch) base. Exercises the cachyos→arch-builder pixi build of selkies
# (pixelflux Rust compile) AND the AUR build of google-chrome + wlrctl, plus
# the labwc/waybar/swaync/pipewire/traefik/sshd layer stack. Ports are
# remapped off the canonical 3000/9222/9224/2222 to avoid host clashes with a
# running selkies-labwc or the other desktop beds. The deploy-scope probes
# assert the AUR-built binaries actually landed on the running container; the
# baked layer/image checks (incl. the Selkies HTTPS 200 UI probe) cover the
# rest of the deploy surface. selkies-labwc's canonical home (relocated from
# the retired overthinkos/selkies submodule, alongside its GPU sibling).
check-selkies-labwc-pod:
    bundle:
        box: selkies-labwc
        disposable: true
        lifecycle: dev
        description: Sole proof of the CPU labwc selkies streaming desktop building from the cachyos→arch-builder pixi path — the labwc compositor variant (no wl probe) and the base box for android-emulator. Builds (pixi pixelflux + AUR chrome/wlrctl multistage) and deploys the selkies-labwc pod, then runs the inherited selkies-desktop baked checks — labwc/waybar/swaync/pavucontrol/chrome package+service probes, the selkies HTTPS :3000 UI probe, and chrome-devtools-mcp probes.
check-selkies-labwc-nvidia-vm:
    bundle:
        vm: cachyos-gpu-vm
        disposable: true
        lifecycle: dev
        description: Sole proof the labwc selkies desktop reaches REAL NVENC frame production inside an RTX-4080 VFIO-passthrough VM via a nested GPU pod (cuda-arch-builder NVENC pixelflux build). Pacstrap GPU-passthrough VM (preempts the nvidia-gpu holder) with podman + nvidia driver/CDI deploys a nested --device nvidia.com/gpu=all selkies-labwc-nvidia pod, then asserts the selkies HTTPS :3000 stream (200) plus the in-guest nvidia-smi NVENC session probe plus chrome-devtools-mcp; the NVENC check N/As without a GPU.
    selkies-labwc-nvidia-pod:
        bundle:
            box: selkies-labwc-nvidia
    check-selkies-labwc-nvidia-vm-requires_exclusive:
        requires_exclusive: [nvidia-gpu]
    check-selkies-labwc-nvidia-vm-add_candy:
        # Guest GPU stack so the passed-through RTX 4080 has a loaded driver +
        # nvidia-container-toolkit (CDI) + podman — the prerequisites for the nested
        # `--device nvidia.com/gpu=all` selkies pod to reach the GPU and for the
        # in-guest nvidia-smi NVENC probe to exist. Mirrors check-cachyos-gpu-vm's GPU
        # setup (the proven GPU-VM bed) minus its KDE-workstation extras; the
        # nvidia-driver layer's reboot: true reloads the open module on a clean boot.
        add_candy:
            - podman
            - '@github.com/overthinkos/overthink/candy/qemu-guest-agent:v2026.170.1105'
            - '@github.com/overthinkos/overthink/candy/workspace-mount:v2026.170.1105'
            - '@github.com/overthinkos/overthink/candy/nvidia:v2026.170.1105'
            - nvidia-driver
    check-selkies-labwc-nvidia-vm-install_opts:
        install_opts:
            with_service: true
            allow_repo_changes: true
            allow_root_tasks: true
            skip_incompatible: true
            verify: true
    selkies-nvidia-stream-https:
        check: http=https://127.0.0.1:3000/
        id: selkies-nvidia-stream-https
        http: https://127.0.0.1:3000/
        status: 200
        allow_insecure: true
        timeout: 30s
        context:
            - runtime
    selkies-nvidia-encoder:
        check: |
            command=if command -v nvidia-smi >/dev/null 2>&1 && nvidia-smi -q 2>/dev/null | grep -qiE "Encoder.*Session|Encoder Stats"; then echo "NVENC-SESSION-ACTIVE"; else echo "NVENC-N/A (no passthrough GPU / software path)"; fi
        id: selkies-nvidia-encoder
        command: |
            if command -v nvidia-smi >/dev/null 2>&1 && nvidia-smi -q 2>/dev/null | grep -qiE "Encoder.*Session|Encoder Stats"; then echo "NVENC-SESSION-ACTIVE"; else echo "NVENC-N/A (no passthrough GPU / software path)"; fi
        exit_status: 0
        stdout:
            - matches: "NVENC-SESSION-ACTIVE|NVENC-N/A"
        context:
            - runtime
