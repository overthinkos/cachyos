#  overthinkos/cachyos — the CachyOS image family, split out of the main
#  overthink repo (2026-05). Mounted as a git submodule at image/cachyos.
#
#  SINGLE-FILE config (2026-05 import-namespace cutover): every local entity
#  (the cachyos base + pacstrap family, the cachyos VM, the disposable eval bed,
#  the ov-cachyos operator profile + its kind:local template) is inlined here.
#  This repo VENDORS its cachyos-exclusive layers locally under layers/ (resolved
#  via the discover: block); every shared layer is an `@github.com/...` ref, and
#  the shared build-config + the main repo's base entities arrive via `import:`.
#
#  import: has two shapes —
#    * flat string  → build.yml (shared distro/builder/init vocabulary), merged
#      into this repo's root namespace.
#    * `ov: <ref>`  → the main overthink repo mounted under the `ov` namespace,
#      so `ov.arch` (cachyos-pacstrap-builder's base) + `ov.arch-builder` (the
#      cachyos base's builder) resolve. main imports THIS repo back under the
#      `cachyos` namespace (versa is `base: cachyos.cachyos`) — a mutual import,
#      cycle-broken at load.
#
#  Directly buildable: `ov image build cachyos` (from the parent repo:
#  `ov -C image/cachyos image build cachyos`; anywhere:
#  `ov --repo overthinkos/cachyos image build cachyos`).
version: 2026.157.311
defaults:
    platform:
        - linux/amd64
    tag: auto
    registry: ghcr.io/overthinkos
    build:
        - pac
    merge:
        auto: false
        max_mb: 128
import:
    # Shared build-config vocabulary (distro/builder/init) — flat root import.
    - '@github.com/overthinkos/overthink/build.yml:v2026.157.0650'
    # Main repo entities under the `ov` namespace — ov.arch (cachyos-pacstrap-
    # builder base) + ov.arch-builder (cachyos base builder). Mutual import with
    # main (main mounts this repo under `cachyos`); cycle-broken at load.
    - ov: '@github.com/overthinkos/overthink:v2026.157.0650'
    - box.yml
    - vm.yml
    - pod.yml
    - k8s.yml
discover:
    # Layers vendored locally by THIS repo — the cachyos-exclusive layers
    # (ghostty, keepassxc-keyring, wheel-nopasswd) relocated out of main's shared
    # layers/. Bare layer names resolve here; every shared layer (yay, chrome,
    # gnupg, keepassxc, nvidia, …) still arrives by @github ref into main.
    - path: candy
      recursive: true
      manifest: candy.yml
eval:
    # Disposable R10 test bed for the cachyos bootstrap VM (kind:eval — the
    # 2026-05 deploy→eval unification moved repo-shipped disposable beds out of
    # deploy.yml). disposable: true is the sole authorization for the unattended
    # destroy+rebuild driven by `ov eval run eval-cachyos-vm`.
    eval-cachyos-vm:
        target: vm
        vm: cachyos-vm
        disposable: true
        lifecycle: dev
        # pac localpkg AUTO-RESOLVE witness. ov on a BARE cachyos bootstrap VM
        # (NO cachyos-extras). The ov layer's localpkg: builds overthink-git from
        # the superproject pkg/arch via makepkg, then `pacman -U`'s it onto the
        # guest — and `pacman -U` AUTO-RESOLVES the package's MANDATORY repo deps
        # (podman, libvirt, tailscale, gocryptfs, …) from the cachyos/arch repos.
        # On this BARE VM none of those deps are pre-present, so they can ONLY be
        # there if the auto-resolving install pulled them. The optional AUR deps
        # (cloudflared-bin, gvisor-tap-vsock) are NOT installed — they are
        # optdepends, opt-in only. The check below FAILS if localpkg didn't install
        # overthink-git or pacman -U didn't auto-resolve the mandatory set.
        add_candy:
            - '@github.com/overthinkos/overthink/candy/ov:v2026.157.0650'
        install_opts:
            allow_repo_changes: true
            allow_root_tasks: true
        eval:
            - id: localpkg-pac-autoresolve
              scope: deploy
              description: ov installed as the overthink-git pacman package via localpkg, with its mandatory repo deps auto-resolved by `pacman -U` (no manual closure)
              command: |
                # pacman -Q on a foreign (source-built) package succeeds only if it
                # actually installed; the mandatory repo deps prove pacman -U
                # auto-resolved them on this bare VM (absent unless the install pulled them).
                pacman -Q overthink-git >/dev/null 2>&1 &&
                pacman -Q podman >/dev/null 2>&1 &&
                pacman -Q libvirt >/dev/null 2>&1 &&
                pacman -Q tailscale >/dev/null 2>&1 &&
                pacman -Q gocryptfs >/dev/null 2>&1 &&
                test "$(command -v ov)" = /usr/bin/ov &&
                ov version &&
                echo LOCALPKG-PAC-AUTORESOLVE-OK
              stdout:
                - contains: LOCALPKG-PAC-AUTORESOLVE-OK
              exit_status: 0
    # Disposable R10 bed mirroring the cachyos-gpu WORKSTATION's exact dual-desktop
    # config — the acceptance gate for the live Part C migration:
    #   host (IOMMU on) → cachyos-gpu-vm (VFIO GPU passthrough, nvidia-open kernel
    #   module) running BOTH (a) the full in-guest KDE Plasma SDDM seat (the
    #   bare-metal desktop on the virtual head) AND (b) a nested selkies-kde-nvidia
    #   POD (the headless WebRTC streaming desktop, real NVENC).
    # The bed applies the nvidia toolkit + nvidia-driver kernel layer to the guest
    # (the driver layer reboots the guest, via the RebootStep), then runVM deploys
    # the nested `selkies-kde` pod as a PERSISTENT in-guest quadlet
    # (deployNestedPodsInGuest: host-build selkies-kde-nvidia → cp-image into the
    # guest → the guest's own project-free `ov deploy from-image`, lingering on so
    # it survives a guest reboot). This is the nested-pod-in-VM capability under
    # test. The deploy-scope checks below run inside the guest over SSH.
    #
    # PORTABLE: every GPU/NVENC check gates on an active in-guest NVIDIA driver and
    # passes with an explanatory N/A when none is present — so the bed runs
    # anywhere. On a host with the cachyos-gpu-vm hostdev block added locally, the
    # same checks assert real GPU encode. See cachyos-gpu-vm in vm.yml.
    eval-cachyos-gpu-vm:
        target: vm
        vm: cachyos-gpu-vm
        disposable: true
        lifecycle: dev
        # Claims the single physical NVIDIA GPU. The resource arbiter
        # (ov/preempt.go) gracefully preempts any RUNNING preemptible holder of
        # the `nvidia-gpu` token — e.g. the operator's vm:cachyos-gpu workstation
        # when its PER-HOST `~/.config/ov/deploy.yml` overlay marks it
        # `preemptible: {holds: [nvidia-gpu]}` — before this bed brings up its VM,
        # and restores it after teardown. The
        # token is portable (a name); on a host with no preemptible nvidia-gpu
        # holder the arbiter finds nothing to preempt (no-op), so the bed still
        # runs anywhere. See /ov-internals:disposable "The resource-arbitration
        # axis", /ov-core:deploy.
        requires_exclusive: [nvidia-gpu]
        add_candy:
            # Order matters: everything before nvidia-driver, whose reboot: true
            # emits a trailing RebootStep — so the guest reboots ONCE after the
            # whole stack is installed and the enabled workspace.mount + guest
            # agent come back clean on the fresh boot. All packages arrive via
            # these layers (never the VM bootstrap package list).
            - podman
            - '@github.com/overthinkos/overthink/candy/qemu-guest-agent:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/workspace-mount:v2026.157.0650'
            # nodejs + claude-code exercise the cross-host npm builder on a VM:
            # the npm builder runs on the host and the ~/.npm-global artifacts are
            # tarred into the guest home. Proves the AI-CLI stack installs on a VM
            # (the bug that made claude/codex/etc. silently absent) plus the
            # deploy-time {{.Home}} env.d resolution + env.d-sourcing managed block.
            - '@github.com/overthinkos/overthink/candy/nodejs:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/claude-code:v2026.157.0650'
            # Full bare-metal KDE Plasma SEAT — the in-guest half of the workstation
            # (Plasma + SDDM + graphical .target on the virtual head), CachyOS
            # theming, fonts/codecs/dev-gap. The WebRTC STREAMING desktop is NOT an
            # in-guest layer here — it runs as the nested selkies-kde pod below
            # (kde-selkies moved into the selkies-kde-nvidia image). This mirrors the
            # workstation's dual-desktop split: bare-metal seat + headless stream.
            - '@github.com/overthinkos/overthink/candy/kde-desktop:v2026.157.0650'
            - cachyos-kde-settings
            # Shared desktop/monitor/SPICE/selkies + mouse/keyboard/screenshot
            # checks (+ ydotool test tool). ov eval live collects this layer's
            # deploy-scope checks for BOTH the bed and the operator VM (R3).
            - cachyos-gpu-desktop-eval
            - '@github.com/overthinkos/overthink/candy/fonts-extended:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/desktop-media:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/cachyos-extras:v2026.157.0650'
            # ov (→ ov layer) exercises the ov-layer-on-VM-deploy path: on
            # this Arch/CachyOS guest the ov layer's localpkg: builds overthink-git
            # from the repo's pkg/arch PKGBUILD on the host (makepkg) + pacman -U's
            # it into the guest at /usr/bin/ov — proving the proper-package install
            # (not the stale curl-a-binary fallback). Matches the operator
            # cachyos-gpu workstation, which lists ov. Placed before
            # nvidia-driver so nvidia-driver's reboot: still trails the whole stack.
            - '@github.com/overthinkos/overthink/candy/ov:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/nvidia:v2026.157.0650'
            - nvidia-driver
        install_opts:
            # with_service gates the systemd unit enable for sddm (the bare-metal
            # KDE seat). The persistent cachyos-gpu deploy sets it; the bed must
            # too, or the desktop services install but never enable (the R10
            # failure). The selkies STREAM is now in the nested pod, not these
            # in-guest layers.
            with_service: true
            allow_repo_changes: true
            allow_root_tasks: true
            skip_incompatible: true
            verify: true
            # The guest add_layers' only builder need is the npm builder for
            # nodejs/claude-code; cuda-arch-builder is a node-capable superset (the
            # NVENC pixi build of pixelflux now lives in the selkies-kde-nvidia image
            # built on the host, not these guest layers).
            builder_image: ghcr.io/overthinkos/cuda-arch-builder:2026.149.1401
        nested:
            # The headless WebRTC streaming desktop as a PERSISTENT in-guest quadlet.
            # runVM (deployNestedPodsInGuest) host-builds selkies-kde-nvidia,
            # cp-images it into the guest as localhost/ov-selkies-kde:latest, then
            # runs the guest's own `ov deploy from-image … selkies-kde` (GPU
            # auto-detect → CDI device; lingering on → survives a guest reboot). The
            # deploy name `selkies-kde` matches the workstation's nested child key.
            selkies-kde:
                target: pod
                box: selkies-kde-nvidia
        description:
            feature: R10 bed mirroring the cachyos-gpu workstation — VFIO GPU passthrough VM with a bare-metal KDE seat + a nested selkies-kde-nvidia streaming pod (real NVENC, persistent quadlet)
            tag: [testing]
        eval:
            - id: gpu-guest-cachyos-kernel
              scope: deploy
              command: pacman -Q linux-cachyos 2>/dev/null && echo CACHYOS-KERNEL
              stdout:
                contains: CACHYOS-KERNEL
            - id: gpu-podman-present
              scope: deploy
              command: command -v podman
              exit_status: 0
            - id: gpu-nvidia-ctk-present
              scope: deploy
              command: command -v nvidia-ctk
              exit_status: 0
            - id: gpu-nouveau-blacklisted
              scope: deploy
              command: |
                if lsmod | grep -q nouveau; then echo NOUVEAU-LOADED; else echo nouveau-blacklisted; fi
              stdout:
                contains: nouveau-blacklisted
            # GPU presence is decided by HARDWARE (sysfs PCI vendor 0x10de = a
            # passed-through NVIDIA device), NOT by whether the driver happens to
            # have initialised yet. When the GPU is present the check WAITS for
            # the driver (bounded readiness poll — the nvidia module loads a few
            # seconds into boot via `nvidia-drm.modeset=1`, and device nodes are
            # created on first `nvidia-smi`), THEN asserts for real. So a slow
            # driver can never make a GPU host silently take the N/A path (a false
            # green), and a no-GPU host returns N/A immediately (no poll penalty).
            # A DIFFERENT silent failure — a <hostdev> configured for the VM but
            # not actually passed through — is caught by the
            # `gpu-passthrough-intent-honored` gate (cachyos-gpu-desktop-eval
            # layer), which HARD-FAILS when VM_HOSTDEV_COUNT>0 yet no 0x10de
            # reaches the guest. So these checks' N/A branch is reachable ONLY on a
            # genuinely card-less host, never on a GPU host whose passthrough broke.
            - id: gpu-driver-active
              scope: deploy
              command: |
                if ! grep -ql 0x10de /sys/bus/pci/devices/*/vendor 2>/dev/null; then
                  echo "GPU driver N/A: no NVIDIA GPU passed through to this guest"
                else
                  for i in $(seq 1 30); do { [ -e /dev/nvidia0 ] || nvidia-smi >/dev/null 2>&1; } && break; sleep 2; done
                  nvidia-smi -L
                fi
              exit_status: 0
            # localpkg eval-coverage: on this Arch/CachyOS guest ov is the proper
            # overthink-git pacman package at /usr/bin/ov (the LocalPkgInstallStep
            # built it on the host via makepkg + pacman -U'd it before the ov layer's
            # pacman-aware cmd: ran), NOT a curl-stale /usr/local/bin/ov. FAILS
            # without the localpkg fix — the curl branch would put /usr/local/bin/ov
            # (shadowing on $PATH) and `pacman -Q overthink-git` would find nothing.
            - id: gpu-ov-proper-package
              scope: deploy
              command: |
                pacman -Q overthink-git >/dev/null 2>&1 &&
                test "$(command -v ov)" = /usr/bin/ov &&
                ov deploy from-image --help >/dev/null 2>&1 &&
                echo OV-PROPER-PACKAGE
              stdout:
                - contains: OV-PROPER-PACKAGE
              exit_status: 0
            # The Cutover 2 headline: the nested selkies-kde streaming desktop runs
            # as a PERSISTENT in-guest USER quadlet with lingering on, so it survives
            # the guest reboot the fresh-rebuild leg recreates. Runs in-guest over
            # SSH; XDG_RUNTIME_DIR is set explicitly so `systemctl --user` reaches
            # the lingering user bus over a non-login SSH session. A bounded
            # readiness poll waits for the service to come active (the pod image is
            # large; first start pulls nothing but unpacks layers).
            - id: nested-selkies-kde-quadlet
              scope: deploy
              command: |
                export XDG_RUNTIME_DIR=/run/user/$(id -u)
                for i in $(seq 1 30); do systemctl --user is-active ov-selkies-kde >/dev/null 2>&1 && break; sleep 2; done
                printf 'active=%s linger=%s\n' \
                  "$(systemctl --user is-active ov-selkies-kde 2>/dev/null)" \
                  "$(loginctl show-user "$(id -un)" -p Linger --value 2>/dev/null)"
              stdout:
                - contains: active=active
                - contains: linger=yes
              exit_status: 0
            # The streaming desktop functionally answers. The nested pod publishes
            # :3000 on the GUEST's localhost (NOT host-reachable — cachyos-gpu-vm
            # forwards only ssh, no :3000), so the probe is an in-guest curl, never a
            # host-side `http:` check (which under RunModeLive would hit the host).
            - id: nested-selkies-kde-stream
              scope: deploy
              command: |
                for i in $(seq 1 60); do
                  code=$(curl -kso /dev/null -w '%{http_code}' https://localhost:3000/ 2>/dev/null)
                  [ "$code" = "200" ] && { echo "STREAM-UP ($code)"; exit 0; }
                  sleep 2
                done
                echo "STREAM-DOWN (last=${code:-none})"; exit 1
              stdout:
                contains: STREAM-UP
              exit_status: 0
            # Real-NVENC + frame proof for the nested ov-selkies-kde pod now lives
            # ONCE on the selkies layer (R3) — encoder-active HARD-FAILS on a
            # silent CPU x264 fallback on an NVIDIA render node (the Cutover 2
            # real-NVENC headline; build.sh Patch 2d makes pixelflux's NVENC init
            # succeed), and frame-not-black proves real non-black pixels. Both run
            # against this nested pod via the nested-pod eval
            # `ov eval live eval-cachyos-gpu-vm.selkies-kde` (ov eval run now
            # evaluates nested children) — no guest-side podman-exec duplicate here.
            # virtiofs /workspace share + guest-user idmap. The host source is an
            # operator-owned mode-0700 dir, so the guest user can read the marker
            # AND write a probe ONLY when the auto-injected idmap maps
            # guest-uid-1000 → the host operator. The check runs over SSH as the
            # guest user (cachy); under libvirt's DEFAULT (guest-root) idmap this
            # FAILS (root-owned, mode 700) — so it strictly proves D4. Also asserts
            # the share is OWNED by the guest user in-guest (the ownership remap).
            - id: workspace-virtiofs-idmap-rw
              scope: deploy
              command: |
                fstype=$(findmnt -n -o FSTYPE /workspace 2>/dev/null || echo MISSING)
                [ "$fstype" = "virtiofs" ] || { echo "FAIL: /workspace fstype=$fstype (want virtiofs)"; exit 1; }
                owner=$(stat -c %U /workspace 2>/dev/null)
                [ "$owner" = "$(id -un)" ] || { echo "FAIL: /workspace owned by '$owner', not the guest user '$(id -un)' — guest-user idmap not applied (libvirt default maps guest-root)"; exit 1; }
                touch /workspace/.ov-probe 2>/dev/null && rm -f /workspace/.ov-probe && echo WORKSPACE-IDMAP-RW
              stdout:
                contains: WORKSPACE-IDMAP-RW
            # Cross-host npm builder (D3): claude-code installs into the GUEST home
            # via the host-side npm builder + tar transfer. Proves the AI-CLI stack
            # now installs on a VM at all.
            - id: ai-cli-claude-installed
              scope: deploy
              command: |
                test -x "$HOME/.npm-global/bin/claude" || { echo "FAIL: ~/.npm-global/bin/claude missing — cross-host npm builder did not install it"; exit 1; }
                "$HOME/.npm-global/bin/claude" --version >/dev/null 2>&1 && echo CLAUDE-INSTALLED
              stdout:
                contains: CLAUDE-INSTALLED
            # Deploy-time {{.Home}} env.d resolution (D1): the nodejs env.d points
            # at the GUEST home, NOT the host operator's /home/atrawog (the bug).
            - id: envd-guest-home
              scope: deploy
              command: |
                f="$HOME/.config/overthink/env.d/nodejs.env"
                test -f "$f" || { echo "FAIL: $f missing"; exit 1; }
                grep -q "$HOME/.npm-global" "$f" || { echo "FAIL: env.d NPM prefix not the guest home"; cat "$f"; exit 1; }
                grep -q "/home/atrawog" "$f" && { echo "FAIL: env.d baked the HOST operator home (the \$HOME bug)"; cat "$f"; exit 1; }
                echo ENVD-GUEST-HOME
              stdout:
                contains: ENVD-GUEST-HOME
            # env.d-sourcing managed block (D2) — verify it actually TAKES EFFECT
            # in the user's login shell, not merely that the block exists. The
            # env.d aggregator must land where the login shell sources it
            # (~/.bashrc for bash, since a bash login prefers ~/.bash_profile →
            # ~/.bashrc over ~/.profile); a block in ~/.profile silently never
            # loads. The authoritative check: claude (installed under
            # ~/.npm-global/bin via the npm builder) resolves on the PATH of an
            # interactive login shell.
            - id: envd-on-login-path
              scope: deploy
              command: |
                bash -lic 'command -v claude >/dev/null 2>&1' && echo CLAUDE-ON-LOGIN-PATH || { echo "FAIL: claude not on the interactive-login PATH — env.d aggregator not sourced by the login shell"; exit 1; }
              stdout:
                contains: CLAUDE-ON-LOGIN-PATH
            # qemu-guest-agent: full-RPC config present + the service running
            # (so the host can drive guest-exec / guest-fsfreeze over the channel).
            - id: qemu-ga-active
              scope: deploy
              command: |
                test -f /etc/qemu/qemu-ga.conf && systemctl is-active --quiet qemu-guest-agent && echo QGA-ACTIVE
              stdout:
                contains: QGA-ACTIVE
                # Shared desktop / monitor / SPICE / selkies checks now
                # live in the cachyos-gpu-desktop-eval layer (added via add_layer above);
                # ov eval live collects an applied layer's deploy-scope checks, so the SAME
                # set runs on BOTH this bed and the persistent cachyos-gpu deploy (R3).
    # Disposable R10 pod beds for the CachyOS GPU image family. Each drives the
    # full `ov eval run` sequence (build → eval image → deploy → eval live →
    # fresh update → tear down) on the cachyos-namespace image of the same name.
    # Host ports are remapped into a dedicated 45xxx range so the beds never
    # collide with an operator's production services on the canonical ports.
    # Deploy- and build-scope eval coverage is inherited from the composed
    # layers (the "lowest level" principle) — the beds carry no eval: of their
    # own. The GPU base (nvidia) and python-ml carry no service, so they are
    # proved by `ov eval image` alone and need no pod bed.
    eval-cachyos-jupyter-ml-pod:
        target: pod
        box: jupyter-ml
        disposable: true
        lifecycle: dev
        port: [auto] # auto-allocate free host ports (avoid fixed-port collisions)
        description:
            feature: R10 bed for the CachyOS GPU jupyter-ml image — JupyterLab + ML stack on the Arch CUDA base
            tag: [testing]
    eval-cachyos-ollama-pod:
        target: pod
        box: ollama
        disposable: true
        lifecycle: dev
        port: [auto] # auto-allocate free host ports (avoid fixed-port collisions)
        description:
            feature: R10 bed for the CachyOS GPU ollama image — ollama server on the Arch CUDA base
            tag: [testing]
    eval-cachyos-comfyui-pod:
        target: pod
        box: comfyui
        disposable: true
        lifecycle: dev
        port: [auto] # auto-allocate free host ports (avoid fixed-port collisions)
        description:
            feature: R10 bed for the CachyOS GPU comfyui image — ComfyUI server on the Arch CUDA base
            tag: [testing]
    eval-cachyos-unsloth-studio-pod:
        target: pod
        box: unsloth-studio
        disposable: true
        lifecycle: dev
        port: [auto] # auto-allocate free host ports (avoid fixed-port collisions)
        description:
            feature: R10 bed for the CachyOS GPU unsloth-studio image — fine-tuning notebook + API on the Arch CUDA base
            tag: [testing]
    eval-cachyos-immich-ml-pod:
        target: pod
        box: immich-ml
        disposable: true
        lifecycle: dev
        port: [auto] # auto-allocate free host ports (avoid fixed-port collisions)
        description:
            feature: R10 bed for the CachyOS GPU immich-ml image — full Immich + PostgreSQL + VectorChord + Redis + ML stack on the Arch CUDA base
            tag: [testing]
    eval-selkies-kde-pod:
        target: pod
        box: selkies-kde
        disposable: true
        lifecycle: dev
        port: [auto] # auto-allocate free host ports (avoid fixed-port collisions)
        description:
            feature: "R10 host-pod bed — full KDE Plasma selkies flavor (de-SDDM startplasma-wayland nested in pixelflux, headless, no seat) on the plain CachyOS base. Inherits the image's baked kde-selkies-stable + selkies stream (:3000 HTTPS) + chrome-cdp + the selkies-layer VAAPI H264 encode probe — streams + HW-encodes on the AMD iGPU host pod. selkies-kde's canonical home (relocated from main's test vehicle)."
            tag: [testing]
    eval-selkies-labwc-nvidia-vm:
        # NVENC passthrough-VM bed: builds selkies-labwc-nvidia (real NVENC via the
        # cuda-arch-builder pixi builder), cp-images it into the RTX-4080 passthrough
        # guest, runs it as a transient --device nvidia.com/gpu=all pod, and asserts
        # the selkies stream reaches NVENC frame production. requires_exclusive
        # preempts the operator's vm:cachyos-gpu (the designed arbiter workflow);
        # portable (passes N/A where no nvidia-gpu is present).
        target: vm
        vm: cachyos-gpu-vm
        disposable: true
        lifecycle: dev
        requires_exclusive: [nvidia-gpu]
        # Guest GPU stack so the passed-through RTX 4080 has a loaded driver +
        # nvidia-container-toolkit (CDI) + podman — the prerequisites for the nested
        # `--device nvidia.com/gpu=all` selkies pod to reach the GPU and for the
        # in-guest nvidia-smi NVENC probe to exist. Mirrors eval-cachyos-gpu-vm's GPU
        # setup (the proven GPU-VM bed) minus its KDE-workstation extras; the
        # nvidia-driver layer's reboot: true reloads the open module on a clean boot.
        add_candy:
            - podman
            - '@github.com/overthinkos/overthink/candy/qemu-guest-agent:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/workspace-mount:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/nvidia:v2026.157.0650'
            - nvidia-driver
        install_opts:
            with_service: true
            allow_repo_changes: true
            allow_root_tasks: true
            skip_incompatible: true
