        description:
            feature: R10 NVENC bed — full KDE Plasma selkies flavor in the RTX-4080 passthrough VM (real NVENC via cuda-arch-builder)
            tag: [testing]
        eval:
            - id: selkies-nvidia-stream-https
              scope: deploy
              http: https://127.0.0.1:3000/
              status: 200
              allow_insecure: true
              timeout: 30s
            - id: selkies-nvidia-encoder
              scope: deploy
              command: |
                if command -v nvidia-smi >/dev/null 2>&1 && nvidia-smi -q 2>/dev/null | grep -qiE "Encoder.*Session|Encoder Stats"; then echo "NVENC-SESSION-ACTIVE"; else echo "NVENC-N/A (no passthrough GPU / software path)"; fi
              exit_status: 0
              stdout:
                - matches: "NVENC-SESSION-ACTIVE|NVENC-N/A"
deploy:
    # ov-cachyos — the operator CachyOS workstation profile (target: local +
    # host: local). NOT a zero-side-effect test bed (it mutates the operator's
    # real machine), so it stays a kind:deploy operator entry, not an eval bed.
    # disposable: operator has authorized this host as a test system, so
    # `ov update ov-cachyos` (full destroy + reinstall via the install ledger)
    # is allowed for strict R10 verification. Shares the name `ov-cachyos` with
    # the kind:local template it applies (cross-kind name reuse).
    ov-cachyos:
        target: local
        local: ov-cachyos
        host: local
        disposable: true
        install_opts:
            with_service: true
            allow_repo_changes: true
            allow_root_tasks: true
        env:
            - EDITOR=nvim
        description:
            feature: Apply ov-cachyos to this workstation
            tag: [testing]
    # cachyos-gpu — the PERSISTENT operator GPU workstation VM (target: vm,
    # vm: cachyos-gpu). The VM analog of the ov-cachyos local profile, evolved
    # into a full graphical <distro>-coder workstation: the full ov-cachyos dev
    # stack PLUS a complete KDE Plasma desktop synced to the host, provisioned
    # ONCE over SSH into the GPU-passthrough VM (persisted on the guest disk,
    # survives the autostart reboot), plus the VM-only layers — nvidia-driver
    # (kernel module + KDE/Wayland userspace + reboot), qemu-guest-agent (full
    # RPC surface), workspace-mount (/workspace), and kde-selkies (remote WebRTC
    # KDE stream, NVENC). Supersedes the earlier headless ov-cachyos-gpu.
    #
    # NOT disposable: this is a real workstation, not a rebuildable test bed. The
    # full machinery is R10-proven on the disposable eval-cachyos-gpu-vm bed;
    # this entry just composes it. builder_image is the cuda-arch-builder so the
    # cross-host pixi build of pixelflux links the real NVENC encoder.
    #
    # The @github layer pins are aligned to the newest main tag by
    # `ov image reconcile` (the new main-repo desktop/stream layers — kde-desktop,
    # fonts-extended, desktop-media, cachyos-extras, kde-selkies — resolve only at
    # the post-landing tag).
    cachyos-gpu:
        target: vm
        vm: cachyos-gpu
        add_candy:
            - wheel-nopasswd
            - '@github.com/overthinkos/overthink/candy/yay:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/dev-tools:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/gh:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/pre-commit:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/tmux:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/direnv:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/gnupg:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/keepassxc:v2026.157.0650'
            - keepassxc-keyring
            - '@github.com/overthinkos/overthink/candy/tailscale:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/tailscale-up:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/build-toolchain:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/golang:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/rust:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/nodejs:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/uv:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/claude-code:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/codex:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/gemini:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/oracle:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/forgecode:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/devops-tools:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/docker-ce:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/kubernetes:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/vscode:v2026.157.0650'
            - ghostty
            - '@github.com/overthinkos/overthink/candy/chrome:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/nvidia:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/ov:v2026.157.0650'
            # Full KDE Plasma desktop synced to the host + GPU display/stream
            # stack. kde-desktop pulls the whole Plasma/KF6/Qt stack via
            # plasma-desktop (deps) + SDDM + graphical.target; cachyos-kde-settings
            # (vendored) adds the CachyOS theming; fonts-extended + desktop-media
            # sync the host font/codec set; cachyos-extras fills the dev/CLI gap.
            # The WebRTC streaming desktop is the nested selkies-kde-nvidia pod
            # (real NVENC, :3000) deployed as a persistent in-guest quadlet — see
            # `nested:` below, NOT an in-guest layer. The bare-metal SDDM Plasma
            # seat (kde-desktop) drives the physical RTX monitors.
            - '@github.com/overthinkos/overthink/candy/kde-desktop:v2026.157.0650'
            - cachyos-kde-settings
            # Shared desktop/monitor/SPICE/selkies + mouse/keyboard/screenshot
            # checks (+ ydotool test tool). ov eval live collects this layer's
            # deploy-scope checks for BOTH the bed and the operator VM (R3).
            - cachyos-gpu-desktop-eval
            - '@github.com/overthinkos/overthink/candy/fonts-extended:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/desktop-media:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/cachyos-extras:v2026.157.0650'
            # (in-guest kde-selkies layer REMOVED — the WebRTC streaming desktop is
            # the nested selkies-kde-nvidia pod below; podman is its in-guest substrate.)
            # VM-only additions. podman for GPU/CUDA containers; the guest agent +
            # workspace mount; nvidia-driver LAST — its reboot: true emits a
            # trailing RebootStep, so the guest reboots ONCE after everything is in
            # place, and the enabled workspace.mount + guest agent come back clean.
            - podman
            - '@github.com/overthinkos/overthink/candy/qemu-guest-agent:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/workspace-mount:v2026.157.0650'
            - nvidia-driver
        install_opts:
            with_service: true
            allow_repo_changes: true
            allow_root_tasks: true
            skip_incompatible: true
            verify: true
            # CUDA builder so the cross-host pixi build of pixelflux links the real
            # NVENC encoder (the stock arch-builder has no CUDA → NVENC stub).
            builder_image: ghcr.io/overthinkos/cuda-arch-builder:2026.149.1401
        env:
            - EDITOR=nvim
            - PAGER=less
        nested:
            # The KDE-selkies WebRTC streaming desktop runs as a headless nested pod
            # (real NVENC on the passed-through RTX GPU), deployed as a PERSISTENT
            # in-guest quadlet by deployNestedPodsInGuest — the exact config the
            # eval-cachyos-gpu-vm mirror bed proves (R10 9/9, fresh rebuild). The
            # bare-metal SDDM Plasma seat (kde-desktop) drives the physical monitors
            # independently of the stream pod.
            selkies-kde:
                target: pod
                box: selkies-kde-nvidia
        description:
            feature: Persistent GPU CachyOS KDE coder workstation VM (bare-metal SDDM Plasma seat on the monitors + nested selkies-kde-nvidia stream pod (real NVENC, :3000) + /workspace + autostart)
            tag: [working]
local:
    #  ov-cachyos — the operator CachyOS workstation profile (kind:local
    #  template). Shared layers are pulled by GITHUB REFERENCE from the main
    #  overthink repo; the cachyos-exclusive layers (ghostty, keepassxc-keyring,
    #  wheel-nopasswd) are vendored locally under layers/. The builder_image is a
    #  published OCI ref (arch-builder), not a layer.
    ov-cachyos:
        candy:
            - wheel-nopasswd
            - '@github.com/overthinkos/overthink/candy/yay:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/dev-tools:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/gh:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/pre-commit:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/tmux:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/direnv:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/gnupg:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/keepassxc:v2026.157.0650'
            - keepassxc-keyring
            - '@github.com/overthinkos/overthink/candy/tailscale:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/tailscale-up:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/build-toolchain:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/golang:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/rust:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/nodejs:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/uv:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/claude-code:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/codex:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/gemini:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/oracle:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/forgecode:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/devops-tools:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/docker-ce:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/kubernetes:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/vscode:v2026.157.0650'
            - ghostty
            - '@github.com/overthinkos/overthink/candy/chrome:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/nvidia:v2026.157.0650'
            - '@github.com/overthinkos/overthink/candy/ov:v2026.157.0650'
        install_opts:
            with_service: true
            allow_repo_changes: true
            allow_root_tasks: true
            builder_image: ghcr.io/overthinkos/arch-builder:2026.122.2252
        env:
            - EDITOR=nvim
            - PAGER=less
        description:
            feature: CachyOS Developer Experience profile
            narrative: |
                Kitchen-sink dev workstation: core CLI tools, full Arch build
                toolchain, Go/Rust/Node/Python runtimes, the full AI-coding-agent
                fleet (Claude Code, Codex, Gemini, Oracle, ForgeCode), and
                DevOps/container tooling (docker, kubectl, helm, AWS CLI, jq).
                Targets the operator's CachyOS host via direct local exec.
            tag: [working]
        eval:
            - id: passwordless-sudo-host
              scope: deploy
              command: sudo -n true
              exit_status: 0
              in_container: false
            # The nvidia toolkit + CDI checks are gated on an ACTIVE host NVIDIA
            # driver (/dev/nvidiactl present, or nvidia-smi answers). On a host
            # that binds the GPU to vfio-pci for VM passthrough — or has no NVIDIA
            # GPU at all — the host driver never loads, /dev/nvidia* never appears,
            # and `nvidia-ctk cdi generate` cannot enumerate a device, so
            # /etc/cdi/nvidia.yaml is structurally impossible. In that case these
            # checks are N/A and pass with an explanatory message rather than
            # failing on a correctly-configured passthrough host.
            - id: nvidia-ctk-present
              scope: deploy
              command: |
                if [ -e /dev/nvidiactl ] || nvidia-smi >/dev/null 2>&1; then
                  command -v nvidia-ctk
                else
                  echo "host NVIDIA driver not active (vfio passthrough or no GPU) — toolkit check N/A"
                fi
              exit_status: 0
              in_container: false
            - id: nvidia-cdi-spec
              scope: deploy
              command: |
                if [ -e /dev/nvidiactl ] || nvidia-smi >/dev/null 2>&1; then
                  test -f /etc/cdi/nvidia.yaml
                else
                  echo "host NVIDIA driver not active (vfio passthrough or no GPU) — CDI spec N/A"
                fi
              exit_status: 0
              in_container: false
