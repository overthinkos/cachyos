#  overthinkos/cachyos — the CachyOS image family, split out of the main
#  overthink repo (2026-05). Mounted as a git submodule at image/cachyos.
#
#  SINGLE-FILE config (2026-05 import-namespace cutover): every local entity
#  (the cachyos base + pacstrap family, the cachyos VM, the disposable eval bed,
#  the ov-cachyos operator profile + its kind:local template) is inlined here.
#  This repo VENDORS its cachyos-exclusive layers locally under layers/ (resolved
#  via the discover: block); every shared layer is an `@github.com/...` ref, and
#  the shared build-config + the main repo's base entities arrive via `import:`.
#
#  import: has two shapes —
#    * flat string  → build.yml (shared distro/builder/init vocabulary), merged
#      into this repo's root namespace.
#    * `ov: <ref>`  → the main overthink repo mounted under the `ov` namespace,
#      so `ov.arch` (cachyos-pacstrap-builder's base) + `ov.arch-builder` (the
#      cachyos base's builder) resolve. main imports THIS repo back under the
#      `cachyos` namespace (versa is `base: cachyos.cachyos`) — a mutual import,
#      cycle-broken at load.
#
#  Directly buildable: `ov image build cachyos` (from the parent repo:
#  `ov -C image/cachyos image build cachyos`; anywhere:
#  `ov --repo overthinkos/cachyos image build cachyos`).
version: 2026.144.1443
defaults:
    platform:
        - linux/amd64
    tag: auto
    registry: ghcr.io/overthinkos
    build:
        - pac
    merge:
        auto: false
        max_mb: 128
import:
    # Shared build-config vocabulary (distro/builder/init) — flat root import.
    - '@github.com/overthinkos/overthink/build.yml:v2026.149.1626'
    # Main repo entities under the `ov` namespace — ov.arch (cachyos-pacstrap-
    # builder base) + ov.arch-builder (cachyos base builder). Mutual import with
    # main (main mounts this repo under `cachyos`); cycle-broken at load.
    - ov: '@github.com/overthinkos/overthink:v2026.149.1626'
    - image.yml
    - vm.yml
    - pod.yml
    - k8s.yml
discover:
    # Layers vendored locally by THIS repo — the cachyos-exclusive layers
    # (ghostty, keepassxc-keyring, wheel-nopasswd) relocated out of main's shared
    # layers/. Bare layer names resolve here; every shared layer (yay, chrome,
    # gnupg, keepassxc, nvidia, …) still arrives by @github ref into main.
    layer:
        - path: layers
          recursive: true
eval:
    # Disposable R10 test bed for the cachyos bootstrap VM (kind:eval — the
    # 2026-05 deploy→eval unification moved repo-shipped disposable beds out of
    # deploy.yml). disposable: true is the sole authorization for the unattended
    # destroy+rebuild driven by `ov eval run cachyos-vm-deploy`.
    cachyos-vm-deploy:
        target: vm
        vm: cachyos-vm
        disposable: true
        lifecycle: dev
    # Disposable R10 bed for the FULL NESTED GPU stack:
    #   host (IOMMU on) → cachyos-gpu-vm (VFIO GPU passthrough, nvidia-open
    #   kernel module) → CUDA container (cuda-eval, real device compute).
    # The bed applies the nvidia toolkit + nvidia-driver kernel layer to the
    # guest (the driver layer reboots the guest, via the RebootStep), then the
    # bed runner loads the locally-built cuda-eval image into the guest's podman
    # as localhost/ov-cuda-pod:latest (the `nested: cuda-pod` entry names that
    # image). The deploy-scope checks below run inside the guest over SSH.
    #
    # PORTABLE: every GPU/CUDA check gates on an active in-guest NVIDIA driver
    # and passes with an explanatory N/A when none is present — so the bed runs
    # anywhere. On a host with the cachyos-gpu-vm hostdev block added locally,
    # the same checks assert real GPU compute. See cachyos-gpu-vm in vm.yml.
    eval-cachyos-coder-vm:
        target: vm
        vm: cachyos-gpu-vm
        disposable: true
        lifecycle: dev
        add_layer:
            # Order matters: everything before nvidia-driver, whose reboot: true
            # emits a trailing RebootStep — so the guest reboots ONCE after the
            # whole stack is installed and the enabled workspace.mount + guest
            # agent come back clean on the fresh boot. All packages arrive via
            # these layers (never the VM bootstrap package list).
            - podman
            - '@github.com/overthinkos/overthink/layers/qemu-guest-agent:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/workspace-mount:v2026.149.1626'
            # nodejs + claude-code exercise the cross-host npm builder on a VM:
            # the npm builder runs on the host and the ~/.npm-global artifacts are
            # tarred into the guest home. Proves the AI-CLI stack installs on a VM
            # (the bug that made claude/codex/etc. silently absent) plus the
            # deploy-time {{.Home}} env.d resolution + env.d-sourcing managed block.
            - '@github.com/overthinkos/overthink/layers/nodejs:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/claude-code:v2026.149.1626'
            # Full KDE desktop + GPU display/stream stack — the cachyos-coder
            # functionality under test. kde-desktop (Plasma + SDDM + graphical
            # .target), CachyOS theming, fonts/codecs/dev-gap, the KDE-selkies
            # WebRTC stream (NVENC via the cuda-arch-builder), and the Looking
            # Glass guest. Proven on this disposable bed before the operator VM.
            - '@github.com/overthinkos/overthink/layers/kde-desktop:v2026.149.1626'
            - cachyos-kde-settings
            - '@github.com/overthinkos/overthink/layers/fonts-extended:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/desktop-media:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/cachyos-extras:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/kde-selkies:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/looking-glass-host:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/nvidia:v2026.149.1626'
            - nvidia-driver
        install_opts:
            # with_service gates the systemd unit enable for sddm + the selkies/
            # kde-selkies services (ServicePackagedStep + ServiceCustomStep). The
            # persistent cachyos-coder deploy sets it; the bed must too, or the
            # desktop/stream services install but never enable (the R10 failure).
            with_service: true
            allow_repo_changes: true
            allow_root_tasks: true
            skip_incompatible: true
            verify: true
            # CUDA builder so the cross-host pixi build of pixelflux links real
            # NVENC (the stock arch-builder has no CUDA → NVENC stub).
            builder_image: ghcr.io/overthinkos/cuda-arch-builder:2026.149.1401
        nested:
            # Names the image the bed runner builds on the host and loads into
            # the guest as localhost/ov-cuda-pod:latest. (No managed pod is
            # started in the guest — the CUDA check below runs it transiently.)
            cuda-pod:
                target: pod
                image: cuda-eval
        description:
            feature: R10 bed for nested GPU — CachyOS VM with VFIO GPU passthrough running a CUDA container
            tag: [testing]
        eval:
            - id: gpu-guest-cachyos-kernel
              scope: deploy
              command: pacman -Q linux-cachyos 2>/dev/null && echo CACHYOS-KERNEL
              stdout:
                contains: CACHYOS-KERNEL
            - id: gpu-podman-present
              scope: deploy
              command: command -v podman
              exit_status: 0
            - id: gpu-nvidia-ctk-present
              scope: deploy
              command: command -v nvidia-ctk
              exit_status: 0
            - id: gpu-nouveau-blacklisted
              scope: deploy
              command: |
                if lsmod | grep -q nouveau; then echo NOUVEAU-LOADED; else echo nouveau-blacklisted; fi
              stdout:
                contains: nouveau-blacklisted
            # GPU presence is decided by HARDWARE (sysfs PCI vendor 0x10de = a
            # passed-through NVIDIA device), NOT by whether the driver happens to
            # have initialised yet. When the GPU is present the check WAITS for
            # the driver (bounded readiness poll — the nvidia module loads a few
            # seconds into boot via `nvidia-drm.modeset=1`, and device nodes are
            # created on first `nvidia-smi`), THEN asserts for real. So a GPU host
            # can never silently take the N/A path on a slow driver (a false
            # green), and a no-GPU host returns N/A immediately (no poll penalty).
            - id: gpu-driver-active
              scope: deploy
              command: |
                if ! grep -ql 0x10de /sys/bus/pci/devices/*/vendor 2>/dev/null; then
                  echo "GPU driver N/A: no NVIDIA GPU passed through to this guest"
                else
                  for i in $(seq 1 30); do { [ -e /dev/nvidia0 ] || nvidia-smi >/dev/null 2>&1; } && break; sleep 2; done
                  nvidia-smi -L
                fi
              exit_status: 0
            # The headline check: a CUDA container actually computes on the GPU
            # inside the VM. On a GPU host this DETERMINISTICALLY runs cuda-smoke
            # (whose nonzero exit fails the check if compute is broken); N/A only
            # when no NVIDIA hardware is present, so the bed stays portable.
            - id: gpu-cuda-container
              scope: deploy
              command: |
                if ! grep -ql 0x10de /sys/bus/pci/devices/*/vendor 2>/dev/null; then
                  echo "CUDA-OK (N/A: no NVIDIA GPU passed through to this guest)"
                else
                  for i in $(seq 1 30); do { [ -e /dev/nvidia0 ] || nvidia-smi >/dev/null 2>&1; } && break; sleep 2; done
                  sudo nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml >/dev/null 2>&1 || true
                  sudo podman run --rm --device nvidia.com/gpu=all localhost/ov-cuda-pod:latest cuda-smoke
                fi
              stdout:
                contains: CUDA-OK
            # virtiofs /workspace share + guest-user idmap. The host source is an
            # operator-owned mode-0700 dir, so the guest user can read the marker
            # AND write a probe ONLY when the auto-injected idmap maps
            # guest-uid-1000 → the host operator. The check runs over SSH as the
            # guest user (cachy); under libvirt's DEFAULT (guest-root) idmap this
            # FAILS (root-owned, mode 700) — so it strictly proves D4. Also asserts
            # the share is OWNED by the guest user in-guest (the ownership remap).
            - id: workspace-virtiofs-idmap-rw
              scope: deploy
              command: |
                fstype=$(findmnt -n -o FSTYPE /workspace 2>/dev/null || echo MISSING)
                [ "$fstype" = "virtiofs" ] || { echo "FAIL: /workspace fstype=$fstype (want virtiofs)"; exit 1; }
                owner=$(stat -c %U /workspace 2>/dev/null)
                [ "$owner" = "$(id -un)" ] || { echo "FAIL: /workspace owned by '$owner', not the guest user '$(id -un)' — guest-user idmap not applied (libvirt default maps guest-root)"; exit 1; }
                touch /workspace/.ov-probe 2>/dev/null && rm -f /workspace/.ov-probe && echo WORKSPACE-IDMAP-RW
              stdout:
                contains: WORKSPACE-IDMAP-RW
            # Cross-host npm builder (D3): claude-code installs into the GUEST home
            # via the host-side npm builder + tar transfer. Proves the AI-CLI stack
            # now installs on a VM at all.
            - id: ai-cli-claude-installed
              scope: deploy
              command: |
                test -x "$HOME/.npm-global/bin/claude" || { echo "FAIL: ~/.npm-global/bin/claude missing — cross-host npm builder did not install it"; exit 1; }
                "$HOME/.npm-global/bin/claude" --version >/dev/null 2>&1 && echo CLAUDE-INSTALLED
              stdout:
                contains: CLAUDE-INSTALLED
            # Deploy-time {{.Home}} env.d resolution (D1): the nodejs env.d points
            # at the GUEST home, NOT the host operator's /home/atrawog (the bug).
            - id: envd-guest-home
              scope: deploy
              command: |
                f="$HOME/.config/overthink/env.d/nodejs.env"
                test -f "$f" || { echo "FAIL: $f missing"; exit 1; }
                grep -q "$HOME/.npm-global" "$f" || { echo "FAIL: env.d NPM prefix not the guest home"; cat "$f"; exit 1; }
                grep -q "/home/atrawog" "$f" && { echo "FAIL: env.d baked the HOST operator home (the \$HOME bug)"; cat "$f"; exit 1; }
                echo ENVD-GUEST-HOME
              stdout:
                contains: ENVD-GUEST-HOME
            # env.d-sourcing managed block (D2) — verify it actually TAKES EFFECT
            # in the user's login shell, not merely that the block exists. The
            # env.d aggregator must land where the login shell sources it
            # (~/.bashrc for bash, since a bash login prefers ~/.bash_profile →
            # ~/.bashrc over ~/.profile); a block in ~/.profile silently never
            # loads. The authoritative check: claude (installed under
            # ~/.npm-global/bin via the npm builder) resolves on the PATH of an
            # interactive login shell.
            - id: envd-on-login-path
              scope: deploy
              command: |
                bash -lic 'command -v claude >/dev/null 2>&1' && echo CLAUDE-ON-LOGIN-PATH || { echo "FAIL: claude not on the interactive-login PATH — env.d aggregator not sourced by the login shell"; exit 1; }
              stdout:
                contains: CLAUDE-ON-LOGIN-PATH
            # qemu-guest-agent: full-RPC config present + the service running
            # (so the host can drive guest-exec / guest-fsfreeze over the channel).
            - id: qemu-ga-active
              scope: deploy
              command: |
                test -f /etc/qemu/qemu-ga.conf && systemctl is-active --quiet qemu-guest-agent && echo QGA-ACTIVE
              stdout:
                contains: QGA-ACTIVE
            # KDE Plasma desktop: plasma-desktop pulled the stack, SDDM is the
            # enabled display manager, and the default target is graphical.
            - id: kde-plasma-binaries
              scope: deploy
              command: |
                command -v plasmashell >/dev/null && command -v kwin_wayland >/dev/null && command -v startplasma-wayland >/dev/null && echo KDE-PRESENT
              stdout:
                contains: KDE-PRESENT
            - id: sddm-graphical-default
              scope: deploy
              command: |
                systemctl is-enabled sddm.service >/dev/null 2>&1 && [ "$(systemctl get-default)" = "graphical.target" ] && echo SDDM-GRAPHICAL
              stdout:
                contains: SDDM-GRAPHICAL
            # KDE-selkies stream: NVENC GStreamer element built (GPU encode) +
            # the WebRTC web UI answering on :3000. On a no-GPU host nvh264enc
            # is N/A; the stream port still serves (CPU/VAAPI fallback).
            - id: kde-selkies-nvenc
              scope: deploy
              command: |
                if ! grep -ql 0x10de /sys/bus/pci/devices/*/vendor 2>/dev/null; then
                  echo "NVENC-OK (N/A: no NVIDIA GPU passed through)"
                else
                  for i in $(seq 1 30); do { [ -e /dev/nvidia0 ] || nvidia-smi >/dev/null 2>&1; } && break; sleep 2; done
                  gst-inspect-1.0 nvh264enc >/dev/null 2>&1 && echo NVENC-OK || { echo "FAIL: nvh264enc GStreamer element missing — pixelflux/gst NVENC not built"; exit 1; }
                fi
              stdout:
                contains: NVENC-OK
            - id: kde-selkies-stream-https
              scope: deploy
              command: |
                for i in $(seq 1 30); do curl -ksf https://127.0.0.1:3000/ >/dev/null 2>&1 && break; sleep 2; done
                curl -ksf -o /dev/null -w '%{http_code}' https://127.0.0.1:3000/ | grep -q 200 && echo SELKIES-STREAM-200
              stdout:
                contains: SELKIES-STREAM-200
            # Looking Glass guest: the IVSHMEM region is present (kvmfr node or
            # the /dev/shm fallback) and the capture app is installed.
            - id: looking-glass-guest
              scope: deploy
              command: |
                command -v looking-glass-host >/dev/null || { echo "FAIL: looking-glass-host not installed"; exit 1; }
                { [ -e /dev/kvmfr0 ] || [ -e /dev/shm/looking-glass ]; } && echo LOOKING-GLASS-SHMEM || { echo "FAIL: no IVSHMEM node (/dev/kvmfr0 or /dev/shm/looking-glass)"; exit 1; }
              stdout:
                contains: LOOKING-GLASS-SHMEM
    # Disposable R10 pod beds for the CachyOS GPU image family. Each drives the
    # full `ov eval run` sequence (build → eval image → deploy → eval live →
    # fresh update → tear down) on the cachyos-namespace image of the same name.
    # Host ports are remapped into a dedicated 45xxx range so the beds never
    # collide with an operator's production services on the canonical ports.
    # Deploy- and build-scope eval coverage is inherited from the composed
    # layers (the "lowest level" principle) — the beds carry no eval: of their
    # own. The GPU base (nvidia) and python-ml carry no service, so they are
    # proved by `ov eval image` alone and need no pod bed.
    eval-cachyos-jupyter-ml-pod:
        target: pod
        image: jupyter-ml
        disposable: true
        lifecycle: dev
        port:
            - 45888:8888
        description:
            feature: R10 bed for the CachyOS GPU jupyter-ml image — JupyterLab + ML stack on the Arch CUDA base
            tag: [testing]
    eval-cachyos-ollama-pod:
        target: pod
        image: ollama
        disposable: true
        lifecycle: dev
        port:
            - 45434:11434
        description:
            feature: R10 bed for the CachyOS GPU ollama image — ollama server on the Arch CUDA base
            tag: [testing]
    eval-cachyos-comfyui-pod:
        target: pod
        image: comfyui
        disposable: true
        lifecycle: dev
        port:
            - 45188:8188
        description:
            feature: R10 bed for the CachyOS GPU comfyui image — ComfyUI server on the Arch CUDA base
            tag: [testing]
    eval-cachyos-unsloth-studio-pod:
        target: pod
        image: unsloth-studio
        disposable: true
        lifecycle: dev
        port:
            - 45889:8888
            - 45800:8000
        description:
            feature: R10 bed for the CachyOS GPU unsloth-studio image — fine-tuning notebook + API on the Arch CUDA base
            tag: [testing]
    eval-cachyos-immich-ml-pod:
        target: pod
        image: immich-ml
        disposable: true
        lifecycle: dev
        port:
            - 45283:2283
        description:
            feature: R10 bed for the CachyOS GPU immich-ml image — full Immich + PostgreSQL + VectorChord + Redis + ML stack on the Arch CUDA base
            tag: [testing]
    eval-cachyos-selkies-desktop-nvidia-pod:
        target: pod
        image: selkies-desktop-nvidia
        disposable: true
        lifecycle: dev
        port:
            - 45300:3000
            - 45222:9222
            - 45224:9224
            - 45022:2222
        description:
            feature: R10 bed for the CachyOS GPU selkies-desktop-nvidia image — GPU streaming desktop (HTTPS + CDP + MCP + sshd) on the Arch CUDA base
            tag: [testing]
deploy:
    # ov-cachyos — the operator CachyOS workstation profile (target: local +
    # host: local). NOT a zero-side-effect test bed (it mutates the operator's
    # real machine), so it stays a kind:deploy operator entry, not an eval bed.
    # disposable: operator has authorized this host as a test system, so
    # `ov update ov-cachyos` (full destroy + reinstall via the install ledger)
    # is allowed for strict R10 verification. Shares the name `ov-cachyos` with
    # the kind:local template it applies (cross-kind name reuse).
    ov-cachyos:
        target: local
        local: ov-cachyos
        host: local
        disposable: true
        install_opts:
            with_service: true
            allow_repo_changes: true
            allow_root_tasks: true
        env:
            - EDITOR=nvim
        description:
            feature: Apply ov-cachyos to this workstation
            tag: [testing]
    # cachyos-coder — the PERSISTENT operator GPU workstation VM (target: vm,
    # vm: cachyos-coder). The VM analog of the ov-cachyos local profile, evolved
    # into a full graphical <distro>-coder workstation: the full ov-cachyos dev
    # stack PLUS a complete KDE Plasma desktop synced to the host, provisioned
    # ONCE over SSH into the GPU-passthrough VM (persisted on the guest disk,
    # survives the autostart reboot), plus the VM-only layers — nvidia-driver
    # (kernel module + KDE/Wayland userspace + reboot), qemu-guest-agent (full
    # RPC surface), workspace-mount (/workspace), kde-selkies (remote WebRTC KDE
    # stream, NVENC), and looking-glass-host (local low-latency view).
    # Supersedes the earlier headless ov-cachyos-gpu.
    #
    # NOT disposable: this is a real workstation, not a rebuildable test bed. The
    # full machinery is R10-proven on the disposable eval-cachyos-coder-vm bed;
    # this entry just composes it. builder_image is the cuda-arch-builder so the
    # cross-host pixi build of pixelflux links the real NVENC encoder.
    #
    # The @github layer pins are aligned to the newest main tag by
    # `ov image reconcile` (the new main-repo desktop/stream layers — kde-desktop,
    # fonts-extended, desktop-media, cachyos-extras, kde-selkies, looking-glass
    # -host — resolve only at the post-landing tag).
    cachyos-coder:
        target: vm
        vm: cachyos-coder
        add_layer:
            - wheel-nopasswd
            - '@github.com/overthinkos/overthink/layers/yay:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/dev-tools:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/gh:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/pre-commit:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/tmux:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/direnv:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/gnupg:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/keepassxc:v2026.149.1626'
            - keepassxc-keyring
            - '@github.com/overthinkos/overthink/layers/tailscale:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/tailscale-up:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/build-toolchain:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/golang:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/rust:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/nodejs:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/uv:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/claude-code:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/codex:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/gemini:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/oracle:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/forgecode:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/devops-tools:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/docker-ce:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/kubernetes:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/vscode:v2026.149.1626'
            - ghostty
            - '@github.com/overthinkos/overthink/layers/chrome:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/nvidia:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/ov-full:v2026.149.1626'
            # Full KDE Plasma desktop synced to the host + GPU display/stream
            # stack. kde-desktop pulls the whole Plasma/KF6/Qt stack via
            # plasma-desktop (deps) + SDDM + graphical.target; cachyos-kde-settings
            # (vendored) adds the CachyOS theming; fonts-extended + desktop-media
            # sync the host font/codec set; cachyos-extras fills the dev/CLI gap.
            # kde-selkies streams a nested Plasma over WebRTC (NVENC, :3000);
            # looking-glass-host serves the local low-latency view.
            - '@github.com/overthinkos/overthink/layers/kde-desktop:v2026.149.1626'
            - cachyos-kde-settings
            - '@github.com/overthinkos/overthink/layers/fonts-extended:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/desktop-media:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/cachyos-extras:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/kde-selkies:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/looking-glass-host:v2026.149.1626'
            # VM-only additions. podman for GPU/CUDA containers; the guest agent +
            # workspace mount; nvidia-driver LAST — its reboot: true emits a
            # trailing RebootStep, so the guest reboots ONCE after everything is in
            # place, and the enabled workspace.mount + guest agent come back clean.
            - podman
            - '@github.com/overthinkos/overthink/layers/qemu-guest-agent:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/workspace-mount:v2026.149.1626'
            - nvidia-driver
        install_opts:
            with_service: true
            allow_repo_changes: true
            allow_root_tasks: true
            skip_incompatible: true
            verify: true
            # CUDA builder so the cross-host pixi build of pixelflux links the real
            # NVENC encoder (the stock arch-builder has no CUDA → NVENC stub).
            builder_image: ghcr.io/overthinkos/cuda-arch-builder:2026.149.1401
        env:
            - EDITOR=nvim
            - PAGER=less
        description:
            feature: Persistent GPU CachyOS KDE coder workstation VM (KDE + monitor + Looking Glass + KDE-selkies stream + /workspace + autostart)
            tag: [working]
local:
    #  ov-cachyos — the operator CachyOS workstation profile (kind:local
    #  template). Shared layers are pulled by GITHUB REFERENCE from the main
    #  overthink repo; the cachyos-exclusive layers (ghostty, keepassxc-keyring,
    #  wheel-nopasswd) are vendored locally under layers/. The builder_image is a
    #  published OCI ref (arch-builder), not a layer.
    ov-cachyos:
        layer:
            - wheel-nopasswd
            - '@github.com/overthinkos/overthink/layers/yay:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/dev-tools:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/gh:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/pre-commit:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/tmux:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/direnv:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/gnupg:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/keepassxc:v2026.149.1626'
            - keepassxc-keyring
            - '@github.com/overthinkos/overthink/layers/tailscale:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/tailscale-up:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/build-toolchain:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/golang:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/rust:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/nodejs:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/uv:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/claude-code:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/codex:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/gemini:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/oracle:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/forgecode:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/devops-tools:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/docker-ce:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/kubernetes:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/vscode:v2026.149.1626'
            - ghostty
            - '@github.com/overthinkos/overthink/layers/chrome:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/nvidia:v2026.149.1626'
            - '@github.com/overthinkos/overthink/layers/ov-full:v2026.149.1626'
        install_opts:
            with_service: true
            allow_repo_changes: true
            allow_root_tasks: true
            builder_image: ghcr.io/overthinkos/arch-builder:2026.122.2252
        env:
            - EDITOR=nvim
            - PAGER=less
        description:
            feature: CachyOS Developer Experience profile
            narrative: |
                Kitchen-sink dev workstation: core CLI tools, full Arch build
                toolchain, Go/Rust/Node/Python runtimes, the full AI-coding-agent
                fleet (Claude Code, Codex, Gemini, Oracle, ForgeCode), and
                DevOps/container tooling (docker, kubectl, helm, AWS CLI, jq).
                Targets the operator's CachyOS host via direct local exec.
            tag: [working]
        eval:
            - id: passwordless-sudo-host
              scope: deploy
              command: sudo -n true
              exit_status: 0
              in_container: false
            # The nvidia toolkit + CDI checks are gated on an ACTIVE host NVIDIA
            # driver (/dev/nvidiactl present, or nvidia-smi answers). On a host
            # that binds the GPU to vfio-pci for VM passthrough — or has no NVIDIA
            # GPU at all — the host driver never loads, /dev/nvidia* never appears,
            # and `nvidia-ctk cdi generate` cannot enumerate a device, so
            # /etc/cdi/nvidia.yaml is structurally impossible. In that case these
            # checks are N/A and pass with an explanatory message rather than
            # failing on a correctly-configured passthrough host.
            - id: nvidia-ctk-present
              scope: deploy
              command: |
                if [ -e /dev/nvidiactl ] || nvidia-smi >/dev/null 2>&1; then
                  command -v nvidia-ctk
                else
                  echo "host NVIDIA driver not active (vfio passthrough or no GPU) — toolkit check N/A"
                fi
              exit_status: 0
              in_container: false
            - id: nvidia-cdi-spec
              scope: deploy
              command: |
                if [ -e /dev/nvidiactl ] || nvidia-smi >/dev/null 2>&1; then
                  test -f /etc/cdi/nvidia.yaml
                else
                  echo "host NVIDIA driver not active (vfio passthrough or no GPU) — CDI spec N/A"
                fi
              exit_status: 0
              in_container: false
