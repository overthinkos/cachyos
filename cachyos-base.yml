#  SINGLE SOURCE OF TRUTH for the CachyOS base image (`cachyos`). There is
#  exactly ONE copy of this definition — it was moved OUT of the main repo's
#  image.yml in the 2026-05 CachyOS migration — so there is no duplication.
#
#  Included by BOTH this repo's overthink.yml (locally) AND the main
#  `overthink` repo (remotely, via
#  `include: '@github.com/overthinkos/cachyos/cachyos-base.yml:<tag>'`),
#  because main's `versa` image is `base: cachyos`. This is the deliberate
#  main → cachyos coupling described in README ("main ↔ cachyos coupling").
#
#  The builder: map points pixi/npm/cargo/aur at `arch-builder` (CachyOS is
#  Arch-based and has no builder of its own); arch-builder is resolved from the
#  main repo's arch-base.yml, which this repo also remote-includes and which
#  main provides locally. Downstream consumers (versa, any future
#  base: cachyos image) inherit this map — there is no per-image builder
#  override anywhere. The cachyos base has no layers, so this file carries no
#  github layer refs.
version: 2026.141.1600
image:
    cachyos:
        # Canonical CachyOS base: pulls the upstream-published OCI image from
        # Docker Hub (cachyos-v3 — optimized for modern x86_64_v3 CPUs, matching
        # the operator's host CPU family). The CachyOS project itself uses this
        # approach — see https://github.com/CachyOS/docker for the reference
        # Dockerfile. The pacstrap-from-scratch variant is preserved as
        # `cachyos-pacstrap` (image.yml) for environments where pulling from
        # Docker Hub isn't possible.
        base: docker.io/cachyos/cachyos-v3:latest
        distro:
            - cachyos
            - arch
        build:
            - pac
        builder:
            aur: arch-builder
            cargo: arch-builder
            npm: arch-builder
            pixi: arch-builder
        # Build-scope eval probes — run via `ov eval image cachyos` (disposable
        # container). Assert the upstream OCI base really is CachyOS, pacman is
        # present, and the x86_64_v3 cachyos repos are configured. Inherited by
        # downstream consumers (e.g. main's `versa`) via the base chain.
        eval:
            - id: cachyos-os-release
              command: cat /etc/os-release
              exit_status: 0
              stdout:
                - contains: "ID=cachyos"
            - id: cachyos-pacman
              command: pacman --version
              exit_status: 0
              stdout:
                - contains: "Pacman v"
            - id: cachyos-v3-repo-configured
              command: pacman-conf --repo-list
              exit_status: 0
              stdout:
                - contains: "cachyos-v3"
