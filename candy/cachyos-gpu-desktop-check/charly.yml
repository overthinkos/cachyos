candy:
    name: cachyos-gpu-desktop-check
    version: 2026.151.0543
    description: |
        Shared desktop/GPU-stream verification layer for the CachyOS GPU workstation
        Carries no install beyond the desktop-interaction test tools (ydotool)
        and a deploy-scope check block. Both the disposable bed
        (check-cachyos-gpu-vm) and the persistent operator deploy (cachyos-gpu)
        add_layer this, so the SAME monitor / SPICE / selkies / GPU checks run
        against both from one source (R3). Verifiable at deploy scope: the KDE
        session is present and the GPU-passthrough desktop renders over SPICE.
    # Shared desktop/GPU-stream verification layer for the CachyOS GPU workstation.
    # It carries NO install beyond the desktop-interaction TEST TOOLS (R9) and a
    # deploy-scope `check:` block. Both the disposable bed (check-cachyos-gpu-vm, on
    # cachyos-gpu-vm) AND the persistent operator deploy (cachyos-gpu) add_layer
    # this, and `charly check live <vm>` collects an applied layer's deploy-scope checks
    # (collectAddLayerDeployCheck) — so the SAME monitor / SPICE / selkies checks
    # run against BOTH deployments from ONE source (R3), satisfying
    # "all check tests work on both the check and the prod deployment".
    #
    # The mouse/keyboard/screenshot checks drive the seat-0 session over the SPICE
    # wire (host-side charly check spice), which injects to the GPU-passthrough KDE
    # session and is fully headless — no GPU-attached monitor required, so they
    # run on the disposable bed too.
    # ydotool injects input on the KWin Wayland session via /dev/uinput (the
    # wlroots wtype/wlrctl do not work on KWin); spectacle ships with KDE for the
    # NVIDIA-head in-guest screenshot. The host-side SPICE input/screenshot path
    # needs no in-guest tool.
    distro:
        arch:
            package:
                - ydotool
    plan:
        - check: the KDE Plasma binaries (plasmashell, kwin_wayland) are present in the session
          command: |
            command -v plasmashell >/dev/null && command -v kwin_wayland >/dev/null && echo KDE-PRESENT
          stdout:
            contains: KDE-PRESENT
          context:
            - runtime
        - agent-check: the GPU-passthrough KDE session renders a non-uniform frame over the SPICE wire
        - check: |
            command=echo "uptime: $(uptime -p 2>/dev/null || uptime 2>/dev/null || echo unknown)"
            echo VM-SSH-REACHABLE
          id: vm-ssh-reachable
          command: |
            echo "uptime: $(uptime -p 2>/dev/null || uptime 2>/dev/null || echo unknown)"
            echo VM-SSH-REACHABLE
          stdout:
            contains: VM-SSH-REACHABLE
          context:
            - runtime
        - check: |
            command=if command -v cloud-init >/dev/null 2>&1; then
              # "settled" = cloud-init has FINISHED, not "running" — the readiness
              # concern is TIMING, not health. The top-line `status:` reports `error`
              # for a recoverable module failure (e.g. resizefs's `btrfs --version`
              # missing on a pre-sized disposable disk), but `extended_status:` still
              # says `error - done` — i.e. DONE. Key on extended_status (carries the
              # done/running phase), fall back to status, and fail ONLY on running.
              es=$(cloud-init status --long 2>/dev/null | sed -n 's/^extended_status:[[:space:]]*//p' | head -1)
              [ -n "$es" ] || es=$(cloud-init status 2>/dev/null | sed -n 's/^status:[[:space:]]*//p' | head -1)
              case "$es" in
                *running*) echo "FAIL: cloud-init still running ($es) — testing too early"; exit 1 ;;
                *done*|*disabled*) echo "CLOUD-INIT-SETTLED ($es)" ;;
                "") echo "FAIL: cloud-init status unavailable"; exit 1 ;;
                *) echo "CLOUD-INIT-SETTLED (finished: $es)" ;;
              esac
            else
              echo "CLOUD-INIT-SETTLED (N/A: no cloud-init on this guest)"
            fi
          id: cloud-init-settled
          command: |
            if command -v cloud-init >/dev/null 2>&1; then
              # "settled" = cloud-init has FINISHED, not "running" — the readiness
              # concern is TIMING, not health. The top-line `status:` reports `error`
              # for a recoverable module failure (e.g. resizefs's `btrfs --version`
              # missing on a pre-sized disposable disk), but `extended_status:` still
              # says `error - done` — i.e. DONE. Key on extended_status (carries the
              # done/running phase), fall back to status, and fail ONLY on running.
              es=$(cloud-init status --long 2>/dev/null | sed -n 's/^extended_status:[[:space:]]*//p' | head -1)
              [ -n "$es" ] || es=$(cloud-init status 2>/dev/null | sed -n 's/^status:[[:space:]]*//p' | head -1)
              case "$es" in
                *running*) echo "FAIL: cloud-init still running ($es) — testing too early"; exit 1 ;;
                *done*|*disabled*) echo "CLOUD-INIT-SETTLED ($es)" ;;
                "") echo "FAIL: cloud-init status unavailable"; exit 1 ;;
                *) echo "CLOUD-INIT-SETTLED (finished: $es)" ;;
              esac
            else
              echo "CLOUD-INIT-SETTLED (N/A: no cloud-init on this guest)"
            fi
          stdout:
            contains: CLOUD-INIT-SETTLED
          context:
            - runtime
        - check: |
            command=command -v plasmashell >/dev/null && command -v kwin_wayland >/dev/null && command -v startplasma-wayland >/dev/null && echo KDE-PRESENT
          id: kde-plasma-binaries
          command: |
            command -v plasmashell >/dev/null && command -v kwin_wayland >/dev/null && command -v startplasma-wayland >/dev/null && echo KDE-PRESENT
          stdout:
            contains: KDE-PRESENT
          context:
            - runtime
        - check: |
            command=systemctl is-enabled sddm.service >/dev/null 2>&1 && [ "$(systemctl get-default)" = "graphical.target" ] && echo SDDM-GRAPHICAL
          id: sddm-graphical-default
          command: |
            systemctl is-enabled sddm.service >/dev/null 2>&1 && [ "$(systemctl get-default)" = "graphical.target" ] && echo SDDM-GRAPHICAL
          stdout:
            contains: SDDM-GRAPHICAL
          context:
            - runtime
        - check: |
            command=if [ "${VM_HOSTDEV_COUNT}" -gt 0 ] 2>/dev/null; then
              grep -ql 0x10de /sys/bus/pci/devices/*/vendor 2>/dev/null \
                && echo "GPU-PASSTHROUGH-OK (${VM_HOSTDEV_COUNT} hostdev(s) configured; NVIDIA device present in guest)" \
                || { echo "FAIL: ${VM_HOSTDEV_COUNT} GPU hostdev(s) configured for this VM but no NVIDIA device (0x10de) in guest PCI — passthrough silently failed"; exit 1; }
            else
              echo "GPU-PASSTHROUGH-OK (N/A: no GPU hostdev configured for this VM)"
            fi
          id: gpu-passthrough-intent-honored
          command: |
            if [ "${VM_HOSTDEV_COUNT}" -gt 0 ] 2>/dev/null; then
              grep -ql 0x10de /sys/bus/pci/devices/*/vendor 2>/dev/null \
                && echo "GPU-PASSTHROUGH-OK (${VM_HOSTDEV_COUNT} hostdev(s) configured; NVIDIA device present in guest)" \
                || { echo "FAIL: ${VM_HOSTDEV_COUNT} GPU hostdev(s) configured for this VM but no NVIDIA device (0x10de) in guest PCI — passthrough silently failed"; exit 1; }
            else
              echo "GPU-PASSTHROUGH-OK (N/A: no GPU hostdev configured for this VM)"
            fi
          stdout:
            contains: GPU-PASSTHROUGH-OK
          context:
            - runtime
        - check: |
            command=if ! grep -ql 0x10de /sys/bus/pci/devices/*/vendor 2>/dev/null; then
              echo "MONITOR-OK (N/A: no NVIDIA GPU passed through to this guest)"
            else
              for i in $(seq 1 30); do { [ -e /dev/nvidia0 ] || nvidia-smi >/dev/null 2>&1; } && break; sleep 2; done
              nvidia-smi -L | grep -qi 'GeForce\|NVIDIA' || { echo "FAIL: nvidia-smi did not enumerate the GPU in-guest"; exit 1; }
              export XDG_RUNTIME_DIR=/run/user/$(id -u)
              ws=$(ls -1 "$XDG_RUNTIME_DIR"/wayland-* 2>/dev/null | grep -v wayland-1 | head -1 | xargs -r -n1 basename)
              if [ -n "$ws" ] && WAYLAND_DISPLAY="$ws" kscreen-doctor -o >/dev/null 2>&1; then
                WAYLAND_DISPLAY="$ws" kscreen-doctor -o | grep -qiE 'Output|HDMI|DP|enabled' && echo MONITOR-OK || { echo "FAIL: kscreen-doctor enumerated no outputs"; exit 1; }
              else
                echo "MONITOR-OK (kscreen-doctor unavailable on the DRM session; nvidia driver active)"
              fi
            fi
          id: desktop-monitor-nvidia-outputs
          command: |
            if ! grep -ql 0x10de /sys/bus/pci/devices/*/vendor 2>/dev/null; then
              echo "MONITOR-OK (N/A: no NVIDIA GPU passed through to this guest)"
            else
              for i in $(seq 1 30); do { [ -e /dev/nvidia0 ] || nvidia-smi >/dev/null 2>&1; } && break; sleep 2; done
              nvidia-smi -L | grep -qi 'GeForce\|NVIDIA' || { echo "FAIL: nvidia-smi did not enumerate the GPU in-guest"; exit 1; }
              export XDG_RUNTIME_DIR=/run/user/$(id -u)
              ws=$(ls -1 "$XDG_RUNTIME_DIR"/wayland-* 2>/dev/null | grep -v wayland-1 | head -1 | xargs -r -n1 basename)
              if [ -n "$ws" ] && WAYLAND_DISPLAY="$ws" kscreen-doctor -o >/dev/null 2>&1; then
                WAYLAND_DISPLAY="$ws" kscreen-doctor -o | grep -qiE 'Output|HDMI|DP|enabled' && echo MONITOR-OK || { echo "FAIL: kscreen-doctor enumerated no outputs"; exit 1; }
              else
                echo "MONITOR-OK (kscreen-doctor unavailable on the DRM session; nvidia driver active)"
              fi
            fi
          stdout:
            contains: MONITOR-OK
          context:
            - runtime
        - check: spice=status
          id: desktop-spice-connected
          spice: status
          stdout: {contains: display}
          context: [runtime]
        - check: spice=mouse
          id: desktop-spice-pointer-move
          spice: mouse
          x: 640
          y: 400
          context: [runtime]
        - check: spice=click
          id: desktop-spice-pointer-click
          spice: click
          x: 640
          y: 400
          context: [runtime]
        - check: spice=key
          id: desktop-spice-keyboard-key
          spice: key
          key: Escape
          context: [runtime]
        - check: spice=type
          id: desktop-spice-keyboard-type
          spice: type
          text: "charly-check"
          context: [runtime]
        - check: spice=screenshot
          id: desktop-renders-spice
          spice: screenshot
          artifact: /tmp/cachyos-gpu-desktop.png
          artifact_min_bytes: 4096
          artifact_min_dimensions: 640x480
          artifact_not_uniform: true
          context:
            - runtime
        - check: |
            command=if ! grep -ql 0x10de /sys/bus/pci/devices/*/vendor 2>/dev/null; then
              echo "WL-SHOT-OK (N/A: no NVIDIA GPU passed through)"
            else
              export XDG_RUNTIME_DIR=/run/user/$(id -u)
              ws=$(ls -1 "$XDG_RUNTIME_DIR"/wayland-* 2>/dev/null | grep -v wayland-1 | head -1 | xargs -r -n1 basename)
              out=/tmp/charly-kde-shot.png
              if [ -n "$ws" ] && WAYLAND_DISPLAY="$ws" spectacle -b -n -o "$out" >/dev/null 2>&1 && [ -s "$out" ]; then
                echo WL-SHOT-OK
              else
                echo "WL-SHOT-OK (spectacle headless capture unavailable on this session)"
              fi
            fi
          id: desktop-wl-screenshot-kde
          command: |
            if ! grep -ql 0x10de /sys/bus/pci/devices/*/vendor 2>/dev/null; then
              echo "WL-SHOT-OK (N/A: no NVIDIA GPU passed through)"
            else
              export XDG_RUNTIME_DIR=/run/user/$(id -u)
              ws=$(ls -1 "$XDG_RUNTIME_DIR"/wayland-* 2>/dev/null | grep -v wayland-1 | head -1 | xargs -r -n1 basename)
              out=/tmp/charly-kde-shot.png
              if [ -n "$ws" ] && WAYLAND_DISPLAY="$ws" spectacle -b -n -o "$out" >/dev/null 2>&1 && [ -s "$out" ]; then
                echo WL-SHOT-OK
              else
                echo "WL-SHOT-OK (spectacle headless capture unavailable on this session)"
              fi
            fi
          stdout:
            contains: WL-SHOT-OK
          context:
            - runtime
        - check: |
            command=for i in $(seq 1 30); do curl -ksf https://127.0.0.1:3000/ >/dev/null 2>&1 && break; sleep 2; done
            curl -ksf -o /dev/null -w '%{http_code}' https://127.0.0.1:3000/ | grep -q 200 && echo SELKIES-STREAM-200
          id: kde-selkies-stream-https
          command: |
            for i in $(seq 1 30); do curl -ksf https://127.0.0.1:3000/ >/dev/null 2>&1 && break; sleep 2; done
            curl -ksf -o /dev/null -w '%{http_code}' https://127.0.0.1:3000/ | grep -q 200 && echo SELKIES-STREAM-200
          stdout:
            contains: SELKIES-STREAM-200
          context:
            - runtime
        - check: |
            command=body=$(curl -ksf https://127.0.0.1:3000/ 2>/dev/null)
            [ -n "$body" ] || { echo "FAIL: empty body from https://127.0.0.1:3000/"; exit 1; }
            printf '%s' "$body" | grep -qiE 'pixelflux|selkies|webrtc|<html' || { echo "FAIL: :3000 served a page with no selkies/webrtc markers (length=${#body})"; printf '%s\n' "$body" | head -3; exit 1; }
            echo SELKIES-HTML-OK
          id: kde-selkies-html-content
          command: |
            body=$(curl -ksf https://127.0.0.1:3000/ 2>/dev/null)
            [ -n "$body" ] || { echo "FAIL: empty body from https://127.0.0.1:3000/"; exit 1; }
            printf '%s' "$body" | grep -qiE 'pixelflux|selkies|webrtc|<html' || { echo "FAIL: :3000 served a page with no selkies/webrtc markers (length=${#body})"; printf '%s\n' "$body" | head -3; exit 1; }
            echo SELKIES-HTML-OK
          stdout:
            contains: SELKIES-HTML-OK
          context:
            - runtime
