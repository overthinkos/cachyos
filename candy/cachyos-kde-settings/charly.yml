candy:
    version: 2026.151.0543
    name: cachyos-kde-settings
    description:
        feature: CachyOS desktop look-and-feel — settings, theming, SDDM theme, wallpapers, Plymouth
        narrative: |
            Installs the cachyos-* settings, theming, SDDM theme, wallpapers,
            Plymouth boot theme and shell configs the CachyOS netinstall ships,
            plus SDDM autologin and an all-monitors Plasma panel autostart. Pairs
            with the generic kde-desktop layer to reproduce a stock CachyOS KDE
            workstation. Verifiable: the cachyos settings/theme/wallpaper packages
            install and (at deploy scope) SDDM autologin is configured.
        tag: [working]
    distro:
        arch:
            package:
                # Settings / integration
                - cachyos-settings
                - cachyos-kde-settings
                - cachyos-micro-settings
                - cachyos-hello
                - cachyos-packageinstaller
                - cachyos-fish-config
                - cachyos-zsh-config
                # Theming
                - cachyos-emerald-kde-theme-git
                - cachyos-iridescent-kde
                - cachyos-nord-kde-theme-git
                - cachyos-themes-sddm
                - cachyos-wallpapers
                - char-white
                # Plymouth boot splash
                - cachyos-plymouth-theme
                - cachyos-plymouth-bootanimation
                - plymouth-kcm
                # qt6-tools provides qdbus6 — the Plasma scripting CLI driven by
                # the all-monitors panel autostart below (R9 explicit dep).
                - qt6-tools
    task:
        # SDDM auto-login the deploy user (uid 1000) into the Plasma Wayland
        # session. A headless GPU-passthrough workstation has no keyboard at the
        # greeter; auto-login starts the REAL KDE session so the physical monitor
        # and the SPICE virtual monitor show the desktop (not the SDDM greeter) —
        # and, critically, so the user's graphical-session.target activates, which
        # is what pulls the user-scope desktop session services. $USER is unset in
        # a cmd RUN context, so resolve the deploy user via getent.
        # Plasma 6's Wayland session is plasma.desktop. KWin-Wayland drives a
        # GPU-backed virtual output (kscreen-doctor enumerable) even with no
        # physical monitor attached — an X11 seat falls back to the virtio head
        # (0 GPU outputs) without a forced EDID, so Wayland is the headless choice.
        - command: |
            u="$(getent passwd 1000 | cut -d: -f1)"
            mkdir -p /etc/sddm.conf.d
            printf '[Autologin]\nUser=%s\nSession=plasma.desktop\n' "$u" > /etc/sddm.conf.d/10-charly-autologin.conf
          run_as: root
        # The KDE Plasma panel (menu bar) must appear on EVERY monitor. On a
        # GPU-passthrough workstation the SPICE virtio output owns Plasma screen 0
        # (the 0,0 origin), so the single default panel lands there and is invisible
        # on the physical HDMI/DP monitors. Install an idempotent ensure-script + an
        # XDG autostart entry (KDE phase 2) that adds a bottom panel to any screen
        # lacking one — on every login and after a monitor hotplug.
        - copy: charly-kde-panels-all-screens.sh
          to: /usr/local/bin/charly-kde-panels-all-screens.sh
          mode: "0755"
          run_as: root
        - copy: charly-kde-panels-all-screens.desktop
          to: /etc/xdg/autostart/charly-kde-panels-all-screens.desktop
          mode: "0644"
          run_as: root
        # Headless always-on policy (part 1 of 2): disable the idle screen-LOCKER.
        # A remotely-accessed / GPU-passthrough seat has no local keyboard to type
        # a password, so KDE's default idle auto-lock strands the session behind an
        # unescapable lock screen. /etc/xdg is the system-default KDE config dir
        # (the deploy user has no ~/.config override), so this applies to every
        # Plasma session on the box. Paired with the keepalive service below.
        - write: /etc/xdg/kscreenlockerrc
          run_as: root
          mode: "0644"
          content: |
            [Daemon]
            Autolock=false
            LockOnResume=false
    service:
        # Headless always-on policy (part 2 of 2): inhibit powerdevil's idle
        # screen-OFF / dim / suspend (and the screensaver) for the session lifetime.
        # This is the root-cause fix for "no output on the monitors": on a headless
        # GPU-passthrough seat the physical RTX heads DPMS-off after idle and, with
        # no local input to wake them, stay dark forever. kde-inhibit holds an
        # org.freedesktop.ScreenSaver + PowerManagement inhibit while it runs;
        # restart:always re-holds it. User scope: needs the Plasma session bus.
        - name: charly-display-keepalive
          exec: kde-inhibit --power --screenSaver sleep infinity
          restart: always
          enable: true
          scope: user
          after: [graphical-session.target]
    scenario:
        - name: cachyos-kde-settings-installed
          step:
            - then: the cachyos-settings package is installed
              package: cachyos-settings
              installed: true
            - then: the cachyos-kde-settings package is installed
              package: cachyos-kde-settings
              installed: true
        - name: sddm-autologin-configured
          step:
            - then: SDDM is configured to auto-login into the Plasma Wayland session
              file: /etc/sddm.conf.d/10-charly-autologin.conf
              contains: "Session=plasma.desktop"
              context:
                - runtime
        - name: sddm-autologin-configured
          step:
            - id: sddm-autologin-configured
              file: /etc/sddm.conf.d/10-charly-autologin.conf
              contains: "Session=plasma.desktop"
              context:
                - runtime
        - name: kde-panel-autostart-installed
          step:
            - id: kde-panel-autostart-installed
              command: |
                test -x /usr/local/bin/charly-kde-panels-all-screens.sh || { echo "FAIL: panel ensure-script missing or not executable"; exit 1; }
                test -f /etc/xdg/autostart/charly-kde-panels-all-screens.desktop || { echo "FAIL: panel autostart .desktop missing"; exit 1; }
                echo PANEL-AUTOSTART-INSTALLED
              stdout:
                contains: PANEL-AUTOSTART-INSTALLED
              context:
                - runtime
        - name: kde-panel-on-every-screen
          step:
            - id: kde-panel-on-every-screen
              command: |
                export XDG_RUNTIME_DIR=/run/user/$(id -u)
                export DBUS_SESSION_BUS_ADDRESS="unix:path=$XDG_RUNTIME_DIR/bus"
                QDBUS=qdbus6; command -v qdbus6 >/dev/null 2>&1 || QDBUS=qdbus
                # Drive the deployed ensure-script (idempotent), then assert that no
                # screen is left without a Plasma panel.
                [ -x /usr/local/bin/charly-kde-panels-all-screens.sh ] && /usr/local/bin/charly-kde-panels-all-screens.sh >/dev/null 2>&1
                out=$("$QDBUS" org.kde.plasmashell /PlasmaShell org.kde.PlasmaShell.evaluateScript 'var have={}; panels().forEach(function(p){have[p.screen]=true;}); var missing=[]; for(var s=0;s<screenCount;s++){ if(!have[s]) missing.push(s); } print("screens="+screenCount+" panels="+panels().length+" missing=["+missing.join(",")+"]");' 2>/dev/null)
                echo "$out"
                case "$out" in
                  *"missing=[]"*) echo PANEL-ON-EVERY-SCREEN ;;
                  *) echo "FAIL: some screens have no Plasma panel"; exit 1 ;;
                esac
              stdout:
                contains: PANEL-ON-EVERY-SCREEN
              context:
                - runtime
        - name: cachyos-settings-installed
          step:
            - id: cachyos-settings-installed
              package: cachyos-settings
              installed: true
        - name: cachyos-kde-settings-installed
          step:
            - id: cachyos-kde-settings-installed
              package: cachyos-kde-settings
              installed: true
        - name: cachyos-wallpapers-installed
          step:
            - id: cachyos-wallpapers-installed
              package: cachyos-wallpapers
              installed: true
        - name: cachyos-themes-sddm-installed
          step:
            - id: cachyos-themes-sddm-installed
              package: cachyos-themes-sddm
              installed: true
        - name: kscreenlocker-autolock-disabled
          step:
            # Headless always-on policy is in effect: locker disabled + the idle
            # screen-off/dim/suspend inhibitor running (so the physical heads never
            # blank-and-stay-dark on this input-less passthrough seat).
            - id: kscreenlocker-autolock-disabled
              file: /etc/xdg/kscreenlockerrc
              contains: "Autolock=false"
              context:
                - runtime
        - name: display-keepalive-active
          step:
            - id: display-keepalive-active
              command: |
                pgrep -f 'kde-inhibit .*screenSaver' >/dev/null 2>&1 && echo KEEPALIVE-OK || { echo "FAIL: charly-display-keepalive (kde-inhibit) not running — idle screen-off not inhibited"; exit 1; }
              stdout:
                contains: KEEPALIVE-OK
              context:
                - runtime
