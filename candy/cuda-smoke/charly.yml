candy:
    version: 2026.148.1730
    name: cuda-smoke
    description: |
        Bakes a tiny deterministic CUDA compute smoke test. Compiles a vector-add
        kernel with nvcc at build time into /usr/local/bin/cuda-smoke; at runtime
        the binary allocates device memory, runs the kernel, verifies the result,
        and prints "CUDA-OK devices=<N>" (exit 0) or "CUDA-FAIL: <reason>"
        (exit 1). Composed on top of cachyos.nvidia (which provides nvcc + cudart)
        to form the cuda-eval image — the GPU-passthrough eval runs this inside a
        container in the VM to prove real device compute, not just driver presence.
    distro:
        arch:
            package:
                # CUDA 13.2's nvcc rejects the default gcc 16 (libstdc++ too new);
                # gcc15 (g++-15) is the host compiler the `cuda` package pins to.
                - gcc15
    task:
        - copy: cuda_smoke.cu
          to: /tmp/cuda_smoke.cu
          user: root
        - cmd: |
            # Invoke nvcc from its real CUDA root (/opt/cuda) — the /usr/bin/nvcc
            # symlink makes nvcc detect root=/usr and miss /opt/cuda/include/crt/.
            # Pin the host compiler to g++-15 (CUDA 13.2 doesn't support gcc 16).
            NVCC=/opt/cuda/bin/nvcc
            [ -x "$NVCC" ] || NVCC="$(command -v nvcc)"
            "$NVCC" -ccbin /usr/bin/g++-15 -I/opt/cuda/include -o /usr/local/bin/cuda-smoke /tmp/cuda_smoke.cu
            rm -f /tmp/cuda_smoke.cu
          user: root
    eval:
        - id: cuda-smoke-binary
          file: /usr/local/bin/cuda-smoke
          exists: true
