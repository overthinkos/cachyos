        - run: |
            command=set -eu
            autostart_dir="${HOME}/.config/autostart"
            mkdir -p "$autostart_dir"
            for name in \
                gnome-keyring-secrets \
                gnome-keyring-ssh \
                gnome-keyring-pkcs11 \
                org.kde.kwalletd6 \
                org.kde.kwalletd5 \
                kwalletd \
                kwalletd5 \
                kwalletd6 \
                pam_kwallet_init \
                ksecretd ; do
              src="/etc/xdg/autostart/${name}.desktop"
              dst="${autostart_dir}/${name}.desktop"
              if [ -f "$src" ]; then
                cp "$src" "$dst"
              else
                cat > "$dst" <<EOF
            [Desktop Entry]
            Type=Application
            Name=${name} (disabled by charly keepassxc-keyring)
            Exec=/bin/true
            Hidden=true
            NoDisplay=true
            EOF
              fi
              if grep -q '^Hidden=' "$dst"; then
                sed -i 's/^Hidden=.*/Hidden=true/' "$dst"
              else
                printf 'Hidden=true\n' >> "$dst"
              fi
              if grep -q '^X-GNOME-Autostart-enabled=' "$dst"; then
                sed -i 's/^X-GNOME-Autostart-enabled=.*/X-GNOME-Autostart-enabled=false/' "$dst"
              else
                printf 'X-GNOME-Autostart-enabled=false\n' >> "$dst"
              fi
            done
          command: |
