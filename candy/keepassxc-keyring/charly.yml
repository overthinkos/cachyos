        - run: |
            command=set -eu
            for unit in \
                gnome-keyring-daemon.socket \
                gnome-keyring-daemon.service \
                kwalletd6.service \
                kwalletd5.service \
                org.kde.kwalletd6.service \
                org.kde.kwalletd5.service \
                plasma-kwallet-pam.service \
                ksecretd.service ; do
              if systemctl --user is-enabled "$unit" >/dev/null 2>&1; then
                systemctl --user disable --now "$unit" >/dev/null 2>&1 || true
              fi
              if systemctl --user is-active "$unit" >/dev/null 2>&1; then
                systemctl --user stop "$unit" >/dev/null 2>&1 || true
              fi
            done
            # Stop any currently-running competitor processes — they hold
            # `org.freedesktop.secrets` until killed, blocking KeePassXC from
            # claiming the bus name. PAM relaunches them at next session, but
            # the autostart override above (`pam_kwallet_init`) prevents that.
            for proc in ksecretd kwalletd6 kwalletd5 gnome-keyring-daemon ; do
              pkill -x "$proc" >/dev/null 2>&1 || true
            done
          command: |
