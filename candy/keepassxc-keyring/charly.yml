candy:
    version: 2026.144.1443
    name: keepassxc-keyring
    description: |
        KeePassXC as the freedesktop.org Secret Service provider on a target:local host
        Enables the KeePassXC FdoSecrets plugin, autostarts KeePassXC on login,
        disables competing Secret Service daemons (gnome-keyring + kwallet)
        reversibly, installs the pinentry/libsecret runtime deps, and wires
        gpg-agent + ssh-agent + direnv shell hooks. Verifiable: the keepassxc +
        pinentry-qt + secret-tool binaries exist and (at deploy scope)
        FdoSecrets is enabled in keepassxc.ini.
    # keepassxc, gnupg, direnv stay in main (shared) → pulled by @github ref so
    # this locally-vendored layer's deps still resolve in this repo's namespace.
    require:
        - '@github.com/overthinkos/overthink/candy/keepassxc:v2026.165.0848'
        - '@github.com/overthinkos/overthink/candy/gnupg:v2026.165.0848'
        - '@github.com/overthinkos/overthink/candy/direnv:v2026.165.0848'
    distro:
        arch:
            package:
                - pinentry
                - libsecret
        debian:
            package:
                - pinentry-qt
                - libsecret-tools
        fedora:
            package:
                - pinentry-qt
                - libsecret
        ubuntu:
            package:
                - pinentry-qt
                - libsecret-tools
    # Shell-init exports for KeePassXC-as-Secret-Service-provider. Mirrors
    # what ~/.config/environment.d/ssh-agent.conf already provides for
    # systemd-bootstrapped sessions; this block covers shells that aren't
    # spawned via pam_systemd (tmux from a screen-locked session, ssh-in
    # shells without graphical login, container-spawned shells, scripts).
    # The two paths coexist with no conflict — environment.d wins when
    # systemd is in the loop, the shell-rc lines fill the gap otherwise.
    shell:
        init: |
            # KeePassXC as freedesktop.org Secret Service + ssh-agent host:
            # point SSH_AUTH_SOCK at the systemd-user ssh-agent socket
            # KeePassXC integrates with as a client (no socket of its own).
            if [ -z "${SSH_AUTH_SOCK:-}" ] && [ -S "${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/ssh-agent.socket" ]; then
              export SSH_AUTH_SOCK="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/ssh-agent.socket"
            fi
            # GPG_TTY for the pinentry-qt → libsecret → KeePassXC chain when
            # gpg-agent falls back to TTY mode.
            export GPG_TTY="$(tty 2>/dev/null || echo /dev/tty)"
        fish:
            init: |
                # KeePassXC ssh-agent socket (fish syntax — set/test idiom).
                if test -z "$SSH_AUTH_SOCK"
                    set -l _kpx_sock "$XDG_RUNTIME_DIR/ssh-agent.socket"
                    if test -z "$XDG_RUNTIME_DIR"
                        set _kpx_sock "/run/user/"(id -u)"/ssh-agent.socket"
                    end
                    if test -S "$_kpx_sock"
                        set -gx SSH_AUTH_SOCK "$_kpx_sock"
                    end
                end
                set -gx GPG_TTY (tty 2>/dev/null; or echo /dev/tty)
    plan:
        - run: mkdir=${HOME}/.config/keepassxc
          mkdir: "${HOME}/.config/keepassxc"
          run_as: "${USER}"
        - run: |
            command=set -eu
            python3 - <<'PY'
            import configparser, os
            p = os.path.expanduser("~/.config/keepassxc/keepassxc.ini")
            cp = configparser.ConfigParser()
            cp.optionxform = str  # preserve key case
            if os.path.exists(p):
                cp.read(p)
            for section in ("FdoSecrets", "SSHAgent", "General", "GUI"):
                if section not in cp:
                    cp[section] = {}
            cp["FdoSecrets"].update({
                "Enabled": "true",
                "ShowNotification": "true",
                "ConfirmAccessItem": "false",
                "UnlockBeforeSearch": "true",
            })
            cp["SSHAgent"].update({
                "Enabled": "true",
                "UseOpenSSH": "true",
            })
            cp["General"].update({
                "RememberLastDatabases": "true",
                "OpenPreviousDatabasesOnStartup": "true",
            })
            cp["GUI"].update({
                "MinimizeOnStartup": "false",
                "MinimizeOnClose": "false",
                "ShowTrayIcon": "true",
            })
            os.makedirs(os.path.dirname(p), exist_ok=True)
            with open(p, "w") as f:
                cp.write(f, space_around_delimiters=False)
            PY
          command: |
