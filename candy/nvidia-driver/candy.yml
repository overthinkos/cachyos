candy:
    version: 2026.150.2158
    name: nvidia-driver
    description: |
        NVIDIA kernel driver (open module) + graphical-session userspace for a
        CachyOS VM guest that has a physical GPU passed through via VFIO. The
        KERNEL-side companion to the `nvidia` layer (which installs only the
        userspace container toolkit): it installs the open kernel module,
        blacklists the in-tree nouveau driver so it can't claim the passed-through
        GPU, regenerates the initramfs, and requests a reboot so the module loads
        on a clean boot.

        Also installs the userspace bits a full KDE Plasma WAYLAND session on the
        passthrough GPU needs: egl-wayland (the nvidia EGLStream external-platform
        — without it kwin_wayland/SDDM-wayland fail on nvidia), the OpenCL ICD,
        nvidia-settings, and the VA-API driver (decode + the streaming encode
        path). nvidia-drm modeset=1 (set below) gives KMS so the compositor can
        scan out to the real GPU output (physical monitor).

        Only meaningful on a bare host / VM guest — never inside a container (a
        container shares the host kernel and cannot load modules). The reboot is
        honored by target:vm (reboot guest + wait); skipped at image build and on
        target:local.

        Pins the CachyOS prebuilt module (linux-cachyos-nvidia-open), which is
        version-matched to the linux-cachyos kernel the bootstrap guest runs — no
        dkms build, no kernel-headers, no prebuilt-vs-running skew. Lives in this
        submodule alongside the GPU eval bed.
    distro:
        arch:
            package:
                - linux-cachyos-nvidia-open
                - nvidia-utils
                - egl-wayland
                - opencl-nvidia
                - nvidia-settings
                - libva-nvidia-driver
    task:
        # Runtime module config. The EARLY (initramfs/boot) nouveau blacklist is
        # done via the guest kernel cmdline (`modprobe.blacklist=nouveau` on the
        # kind:vm entity) so no `mkinitcpio -P` regen is needed here — the open
        # module's own pacman hook already rebuilds the base initramfs, and an
        # explicit `mkinitcpio -P` would fail the deploy on the non-fatal
        # kms/sd-vconsole build warnings.
        - write: /etc/modprobe.d/ov-nvidia.conf
          user: root
          mode: "0644"
          content: |
            # Belt-and-suspenders nouveau blacklist (the kernel cmdline does the
            # early one) + enable nvidia KMS.
            blacklist nouveau
            options nvidia-drm modeset=1
        # CDI generation belongs AFTER the driver loads, not at toolkit-install
        # time. The VM bootstrap disables nvidia-container-toolkit's install-time
        # CDI alpm hook (which fails "NVML: Driver Not Loaded" pre-reboot and
        # aborts the deploy); this oneshot regenerates the CDI spec on every boot
        # once the GPU device node exists, so `podman run --device
        # nvidia.com/gpu=all` works post-reboot without any manual step.
        - write: /etc/systemd/system/ov-nvidia-cdi.service
          user: root
          mode: "0644"
          content: |
            [Unit]
            Description=Generate NVIDIA CDI spec once the GPU driver is loaded
            After=multi-user.target

            [Service]
            Type=oneshot
            RemainAfterExit=yes
            # Wait (bounded) for the GPU device node — the open module loads
            # early via nvidia-drm.modeset=1, usually well before this runs.
            ExecStartPre=/bin/sh -c 'for i in $(seq 1 30); do [ -e /dev/nvidia0 ] && exit 0; sleep 1; done; exit 0'
            ExecStart=/usr/bin/nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml

            [Install]
            WantedBy=multi-user.target
        # Enable for boot (runs on the post-reboot boot when the driver is up).
        # NOT --now: pre-reboot the driver isn't loaded yet. Tolerant so an
        # image-build chroot (no systemd) doesn't fail the layer.
        - cmd: |
            systemctl daemon-reload || true
            systemctl enable ov-nvidia-cdi.service || true
          user: root
        # Device-group access for the desktop user's session services. The KDE
        # compositor + pixelflux NVENC run as user-scope services in the deploy
        # user's session; /dev/dri/render* + /dev/nvidia* are video/render-owned,
        # so the deploy user (uid 1000) must be in both or the user-session
        # compositor/encoder can't open the devices.
        - cmd: |
            u="$(getent passwd 1000 | cut -d: -f1)"
            [ -n "$u" ] && usermod -aG video,render "$u" || true
          user: root
    reboot: true
    eval:
        - id: nvidia-modprobe-conf
          file: /etc/modprobe.d/ov-nvidia.conf
          contains: "blacklist nouveau"
        - id: nvidia-cdi-service
          file: /etc/systemd/system/ov-nvidia-cdi.service
          contains: "nvidia-ctk cdi generate"
        - id: egl-wayland-installed
          package: egl-wayland
          installed: true
        - id: opencl-nvidia-installed
          package: opencl-nvidia
          installed: true
