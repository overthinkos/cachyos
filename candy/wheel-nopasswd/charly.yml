candy:
    version: 2026.144.1443
    name: wheel-nopasswd
    description: |
        Passwordless sudo for the wheel group
        Installs sudo, ensures the wheel group exists, adds the uid-1000
        account to wheel, and writes /etc/sudoers.d/20-nopasswd-wheel
        (`%wheel ALL=(ALL:ALL) NOPASSWD: ALL`, mode 0440). Verifiable: sudo is
        installed and `sudo -n -l` shows a NOPASSWD rule for the user.
    package:
        - sudo
    plan:
        - run: write=/etc/sudoers.d/20-nopasswd-wheel
          write: /etc/sudoers.d/20-nopasswd-wheel
          content: |
            %wheel ALL=(ALL:ALL) NOPASSWD: ALL
          mode: "0440"
          run_as: root
        - run: |
            command=set -e
            getent group wheel >/dev/null || groupadd wheel
            account=$(getent passwd 1000 | cut -d: -f1)
            if [ -z "$account" ]; then
              echo "wheel-nopasswd: no uid-1000 account found — refusing to add to wheel" >&2
              exit 1
            fi
            usermod -aG wheel "$account"
            id -nG "$account" | tr ' ' '\n' | grep -qx wheel || {
              echo "wheel-nopasswd: FATAL: $account not in wheel after usermod" >&2
              exit 1
            }
          command: |
            set -e
            getent group wheel >/dev/null || groupadd wheel
            account=$(getent passwd 1000 | cut -d: -f1)
            if [ -z "$account" ]; then
              echo "wheel-nopasswd: no uid-1000 account found — refusing to add to wheel" >&2
              exit 1
            fi
            usermod -aG wheel "$account"
            id -nG "$account" | tr ' ' '\n' | grep -qx wheel || {
              echo "wheel-nopasswd: FATAL: $account not in wheel after usermod" >&2
              exit 1
            }
          run_as: root
        - check: the sudo package is installed
          package: sudo
          installed: true
        - check: the uid-1000 user has a passwordless sudo rule in effect
          command: |
            if [ "$(id -u)" = "0" ]; then
              account=$(getent passwd 1000 | cut -d: -f1)
              runuser -u "$account" -- sudo -n -l
            else
              sudo -n -l
            fi
          exit_status: 0
          stdout:
            - contains: "NOPASSWD"
        - check: package=sudo
          id: sudo-package
          package: sudo
          installed: true
        - check: |
            command=if [ "$(id -u)" = "0" ]; then
              account=$(getent passwd 1000 | cut -d: -f1)
              runuser -u "$account" -- sudo -n -l
            else
              sudo -n -l
            fi
          id: nopasswd-wheel-policy
          command: |
            if [ "$(id -u)" = "0" ]; then
              account=$(getent passwd 1000 | cut -d: -f1)
              runuser -u "$account" -- sudo -n -l
            else
              sudo -n -l
            fi
          exit_status: 0
          stdout:
            - contains: "NOPASSWD"
