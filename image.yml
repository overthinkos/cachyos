#  CachyOS images. The `cachyos` base image lives in cachyos-base.yml (this
#  repo); these two entries are the pacstrap (bootstrap-from-scratch) family.
#  cachyos-pacstrap-builder is `base: arch` — the `arch` base resolves from the
#  main repo's arch-base.yml (remote-included in overthink.yml). Its only layer,
#  pacstrap-builder, is pulled by github reference (it stays in the main repo,
#  shared with arch-pacstrap-builder).
version: 2026.141.1600
image:
    cachyos-pacstrap-builder:
        base: arch
        distro:
            - arch
        build:
            - pac
        layer:
            - '@github.com/overthinkos/overthink/layers/pacstrap-builder:v2026.141.1600'
        # Build-scope eval probes — run via `ov eval image cachyos-pacstrap-builder`
        # (disposable container). Assert the pacstrap toolchain the builder must
        # ship (the pacstrap-builder layer's payload) is actually present.
        eval:
            - id: cpb-pacstrap-binary
              file: /usr/sbin/pacstrap
              exists: true
            - id: cpb-arch-install-scripts
              package: arch-install-scripts
              installed: true
            - id: cpb-grub-install
              file: /usr/sbin/grub-install
              exists: true
            - id: cpb-parted
              file: /usr/sbin/parted
              exists: true
    cachyos-pacstrap:
        # Bootstrap-from-scratch CachyOS rootfs via pacstrap inside a
        # privileged builder container. The canonical `cachyos` base
        # (cachyos-base.yml) pulls the upstream published OCI image from Docker
        # Hub, which is the path the CachyOS project itself recommends. This
        # pacstrap variant is retained for offline / air-gapped builds and as a
        # worked example of the `from: builder:pacstrap` +
        # `bootstrap_builder_image:` pattern. Builds end-to-end as of ov
        # 2026.141.1850: the shared pacstrap pacman.conf renderer
        # (renderPacstrapExtraConf) now emits an `[options] Architecture` line
        # derived from the cachyos-v3 repos' microarch token (so pacman accepts
        # the x86_64_v3 packages like linux-cachyos) AND each repo's SigLevel
        # (so SigLevel=Never repos don't trip GPGME). The Docker-Hub `cachyos`
        # base is still the faster default (no privileged build); this variant
        # is for offline / air-gapped builds.
        from: builder:pacstrap
        bootstrap_builder_image: cachyos-pacstrap-builder
        distro:
            - cachyos
            - arch
        build:
            - pac
