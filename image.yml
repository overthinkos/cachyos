#  Per-kind file for image entries. Sibling of overthink.yml — included via
#  overthink.yml's `includes:` list. The schema kind discriminator is
#  `kind: image` for kind-keyed entries; root-shape map is `image:` (this file).
#  2026-05 kind-files cutover.
version: 2026.144.1443
image:
    cachyos:
        version: 2026.152.2025
        # Canonical CachyOS base: the upstream-published OCI image (cachyos-v3 —
        # x86_64_v3-optimized). The pacstrap-from-scratch variant is preserved as
        # `cachyos-pacstrap` for environments where pulling from Docker Hub isn't
        # possible.
        # Pinned by digest (NO floating tag) — Docker Hub publishes ONLY the
        # rolling tag for cachyos-v3 (no named/dated tags exist), so a digest is
        # the most precise coordinate. Refresh by repinning to a newer digest:
        #   skopeo inspect --no-tags docker://docker.io/cachyos/cachyos-v3 | jq -r .Digest
        base: docker.io/cachyos/cachyos-v3@sha256:c539558e38029fa2a3cddc62aeeefe2a9261e3fa2f3d5a64c43d22033f06e209
        distro:
            - cachyos
            - arch
        build:
            - pac
        # CachyOS is Arch-derived and has no builder of its own; route all four
        # formats to ov.arch-builder (main's arch-builder, via the `ov` import
        # namespace). Builder maps do NOT cross a namespace boundary, so a
        # consumer of this base (e.g. main's versa) declares its own builder map.
        builder:
            aur: ov.arch-builder
            cargo: ov.arch-builder
            npm: ov.arch-builder
            pixi: ov.arch-builder
        produce:
            - pixi
            - npm
            - cargo
            - aur
        # Build-scope eval probes — `ov eval image cachyos`. Inherited by
        # downstream consumers (main's versa) via the base chain.
        eval:
            - id: cachyos-os-release
              command: cat /etc/os-release
              exit_status: 0
              stdout:
                - contains: "ID=cachyos"
            - id: cachyos-pacman
              command: pacman --version
              exit_status: 0
              stdout:
                - contains: "Pacman v"
            - id: cachyos-v3-repo-configured
              command: pacman-conf --repo-list
              exit_status: 0
              stdout:
                - contains: "cachyos-v3"
    cachyos-pacstrap-builder:
        # base: ov.arch — the `arch` base from main's base.yml, via the `ov`
        # import namespace. Its only layer (pacstrap-builder) is pulled by github
        # reference (it stays in the main repo, shared with arch-pacstrap-builder).
        base: ov.arch
        distro:
            - arch
        build:
            - pac
        layer:
            - '@github.com/overthinkos/overthink/layers/pacstrap-builder:v2026.155.1010'
        eval:
            - id: cpb-pacstrap-binary
              file: /usr/sbin/pacstrap
              exists: true
            - id: cpb-arch-install-scripts
              package: arch-install-scripts
              installed: true
            - id: cpb-grub-install
              file: /usr/sbin/grub-install
              exists: true
            - id: cpb-parted
              file: /usr/sbin/parted
              exists: true
    cachyos-pacstrap:
        # Bootstrap-from-scratch CachyOS rootfs via pacstrap inside a privileged
        # builder container. Retained for offline / air-gapped builds; the
        # Docker-Hub `cachyos` base is the faster default.
        # Layerless bootstrap on an external (pacstrap) base — per per-kind
        # versioning, a layerless external-base image needs a dedicated version:.
        version: 2026.144.1443
        from: builder:pacstrap
        bootstrap_builder_image: cachyos-pacstrap-builder
        distro:
            - cachyos
            - arch
        build:
            - pac
    nvidia:
        # CachyOS GPU base — the Arch-derived analogue of the Fedora `nvidia`
        # image. Inherits build:[pac] + builder→ov.arch-builder from the cachyos
        # base (same namespace). The nvidia + cuda layers are multi-distro and
        # install the Arch GPU stack (nvidia-utils, nvidia-container-toolkit,
        # cuda, cudnn, onnxruntime).
        base: cachyos
        platform:
            - linux/amd64
        layer:
            - '@github.com/overthinkos/overthink/layers/agent-forwarding:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/nvidia:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/cuda:v2026.155.1010'
    cuda-eval:
        # GPU compute-smoke image for the VFIO-passthrough eval: cachyos.nvidia
        # (driver libs + nvidia-container-toolkit + CUDA) plus the locally-vendored
        # cuda-smoke layer (a baked nvcc-compiled vector-add that prints CUDA-OK).
        # The eval-cachyos-gpu-vm bed loads this into the GPU VM guest and runs it
        # as a `--device nvidia.com/gpu=all` container to prove real device compute.
        base: nvidia
        platform:
            - linux/amd64
        layer:
            - cuda-smoke
    python-ml:
        base: nvidia
        platform:
            - linux/amd64
        layer:
            - '@github.com/overthinkos/overthink/layers/agent-forwarding:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/python-ml:v2026.155.1010'
    jupyter-ml:
        base: nvidia
        platform:
            - linux/amd64
        layer:
            - '@github.com/overthinkos/overthink/layers/agent-forwarding:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/jupyter-ml:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/notebook-templates:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/dbus:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/ov:v2026.155.1010'
        port:
            - 8888:8888
    ollama:
        base: nvidia
        platform:
            - linux/amd64
        layer:
            - '@github.com/overthinkos/overthink/layers/agent-forwarding:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/ollama:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/dbus:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/ov:v2026.155.1010'
        port:
            - 11434:11434
    comfyui:
        base: nvidia
        platform:
            - linux/amd64
        layer:
            - '@github.com/overthinkos/overthink/layers/agent-forwarding:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/comfyui:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/dbus:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/ov:v2026.155.1010'
        port:
            - 8188:8188
    unsloth-studio:
        base: nvidia
        platform:
            - linux/amd64
        layer:
            - '@github.com/overthinkos/overthink/layers/agent-forwarding:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/unsloth-studio:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/notebook-finetuning:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/dbus:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/ov:v2026.155.1010'
        port:
            - 8888:8888
            - 8000:8000
    immich-ml:
        # CachyOS GPU base already carries cuda. pgvector is AUR-only on Arch, so
        # this image opts into build:[pac, aur] — the arch-builder's yay compiles
        # it (the postgresql layer declares the AUR package).
        base: nvidia
        build:
            - pac
            - aur
        platform:
            - linux/amd64
        layer:
            - '@github.com/overthinkos/overthink/layers/agent-forwarding:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/nodejs:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/python-ml:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/supervisord:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/postgresql:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/vectorchord:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/redis:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/immich:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/immich-ml:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/dbus:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/ov:v2026.155.1010'
        port:
            - 2283:2283
    selkies-kde:
        # Full KDE Plasma selkies flavor on the plain CachyOS base — run as a
        # headless pod (de-SDDM startplasma-wayland nested in pixelflux). Encoder
        # auto-selected at runtime: VAAPI on an AMD/Intel renderD (the selkies layer
        # ships libva-mesa-driver), software x264 otherwise; the -nvidia sibling adds
        # NVENC. Relocated from main's test vehicle (selkies-kde's canonical home).
        # chrome + wlrctl from the AUR → build:[pac, aur].
        base: cachyos
        build:
            - pac
            - aur
        platform:
            - linux/amd64
        layer:
            - '@github.com/overthinkos/overthink/layers/agent-forwarding:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/selkies-kde-desktop:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/dbus:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/ov:v2026.155.1010'
        port:
            - 3000:3000
            - 9222:9222
            - 9224:9224
            - 2222:2222
    selkies-labwc-nvidia:
        # labwc selkies flavor on the CachyOS GPU base (cachyos.nvidia) with REAL
        # NVENC: builder.pixi → ov.cuda-arch-builder, whose nvcc + ffnvcodec NVENC
        # headers let the selkies layer's build.sh compile pixelflux's real nvenc-sys
        # encoder (the stock arch-builder has no CUDA → NVENC stub). chrome + wlrctl
        # from the AUR → build:[pac, aur]. Renamed from selkies-desktop-nvidia.
        base: nvidia
        build:
            - pac
            - aur
        builder:
            pixi: ov.cuda-arch-builder
        platform:
            - linux/amd64
        layer:
            - '@github.com/overthinkos/overthink/layers/agent-forwarding:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/selkies-desktop:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/dbus:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/ov:v2026.155.1010'
        port:
            - 3000:3000
            - 9222:9222
            - 9224:9224
            - 2222:2222
        # Build-scope proof the REAL NvencEncoder was compiled (not the AMD/CPU
        # stub) — the regression-proof eval-coverage for this image's NVENC
        # functionality. NvEncodeAPICreateInstance is the NVENC SDK entry point the
        # nvenc-sys crate binds; the stub build patches nvenc-sys out of pixelflux's
        # Cargo.toml, so the symbol is absent → this check FAILS on a non-NVENC build.
        eval:
            - id: pixelflux-nvenc-compiled
              scope: build
              command: strings ${HOME}/.pixi/envs/default/lib/python3.*/site-packages/pixelflux/pixelflux_wayland*.so | grep -q NvEncodeAPICreateInstance && echo NVENC-COMPILED
              exit_status: 0
              stdout:
                - contains: "NVENC-COMPILED"
    selkies-kde-nvidia:
        # Full KDE Plasma selkies flavor on the CachyOS GPU base (cachyos.nvidia) with
        # REAL NVENC (builder.pixi → ov.cuda-arch-builder, same as selkies-labwc-nvidia).
        # Headless de-SDDM Plasma nested in pixelflux. chrome + wlrctl from the AUR.
        base: nvidia
        build:
            - pac
            - aur
        builder:
            pixi: ov.cuda-arch-builder
        platform:
            - linux/amd64
        layer:
            - '@github.com/overthinkos/overthink/layers/agent-forwarding:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/selkies-kde-desktop:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/dbus:v2026.155.1010'
            - '@github.com/overthinkos/overthink/layers/ov:v2026.155.1010'
        port:
            - 3000:3000
            - 9222:9222
            - 9224:9224
            - 2222:2222
        # Build-scope proof the REAL NvencEncoder was compiled (see selkies-labwc-nvidia).
        eval:
            - id: pixelflux-nvenc-compiled
              scope: build
              command: strings ${HOME}/.pixi/envs/default/lib/python3.*/site-packages/pixelflux/pixelflux_wayland*.so | grep -q NvEncodeAPICreateInstance && echo NVENC-COMPILED
              exit_status: 0
              stdout:
                - contains: "NVENC-COMPILED"
