#  CachyOS images. The `cachyos` base image lives in cachyos-base.yml (this
#  repo); these two entries are the pacstrap (bootstrap-from-scratch) family.
#  cachyos-pacstrap-builder is `base: arch` — the `arch` base resolves from the
#  main repo's arch-base.yml (remote-included in overthink.yml). Its only layer,
#  pacstrap-builder, is pulled by github reference (it stays in the main repo,
#  shared with arch-pacstrap-builder).
version: 2026.141.1600
image:
    cachyos-pacstrap-builder:
        base: arch
        distro:
            - arch
        build:
            - pac
        layer:
            - '@github.com/overthinkos/overthink/layers/pacstrap-builder:v2026.141.1600'
    cachyos-pacstrap:
        # Bootstrap-from-scratch CachyOS rootfs via pacstrap inside a
        # privileged builder container. The canonical `cachyos` base
        # (cachyos-base.yml) pulls the upstream published OCI image from Docker
        # Hub, which is the path the CachyOS project itself recommends. This
        # pacstrap variant is retained for offline / air-gapped builds and as a
        # worked example of the `from: builder:pacstrap` +
        # `bootstrap_builder_image:` pattern. NOTE: known to fail end-to-end
        # under sudo podman + pacman 7.x because of a GPGME context
        # initialization issue inside the privileged container; the install
        # template's keyring init may need environment-specific debugging
        # before this variant is usable.
        from: builder:pacstrap
        bootstrap_builder_image: cachyos-pacstrap-builder
        distro:
            - cachyos
            - arch
        build:
            - pac
