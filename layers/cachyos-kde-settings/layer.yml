layer:
    version: 2026.150.0947
    name: cachyos-kde-settings
    description: |
        CachyOS desktop look-and-feel: the cachyos-* settings, theming, SDDM
        theme, wallpapers, Plymouth boot theme and shell configs that the CachyOS
        Calamares "CachyOS Packages" + KDE-Desktop netinstall groups ship. Pairs
        with the generic kde-desktop layer (Plasma + SDDM) to reproduce a stock
        CachyOS KDE workstation. Vendored in this submodule because every package
        here lives in the CachyOS repo (not generic Arch); the VM bootstrap
        already has the cachyos repos configured.

        Host-specific entries from the netinstall (cachyos-kernel-manager,
        mirrorlists, keyring, hooks, chwd) are intentionally omitted — the VM
        manages its own kernel/repos and those would be inert or conflict.
    distro:
        arch:
            package:
                # Settings / integration
                - cachyos-settings
                - cachyos-kde-settings
                - cachyos-micro-settings
                - cachyos-hello
                - cachyos-packageinstaller
                - cachyos-fish-config
                - cachyos-zsh-config
                # Theming
                - cachyos-emerald-kde-theme-git
                - cachyos-iridescent-kde
                - cachyos-nord-kde-theme-git
                - cachyos-themes-sddm
                - cachyos-wallpapers
                - char-white
                # Plymouth boot splash
                - cachyos-plymouth-theme
                - cachyos-plymouth-bootanimation
                - plymouth-kcm
    task:
        # SDDM auto-login the deploy user (uid 1000) into the Plasma Wayland
        # session. A headless GPU-passthrough workstation has no keyboard at the
        # greeter; auto-login starts the REAL KDE session so the physical monitor,
        # Looking Glass, and the SPICE virtual monitor all show the desktop (not
        # the SDDM greeter) — and, critically, so the user's
        # graphical-session.target activates, which is what pulls the
        # looking-glass-host service (WantedBy=graphical-session.target). $USER is
        # unset in a cmd RUN context, so resolve the deploy user via getent.
        # Plasma 6's Wayland session is plasma.desktop. KWin-Wayland drives a
        # GPU-backed virtual output (kscreen-doctor enumerable) even with no
        # physical monitor attached — an X11 seat falls back to the virtio head
        # (0 GPU outputs) without a forced EDID, so Wayland is the headless choice.
        - cmd: |
            u="$(getent passwd 1000 | cut -d: -f1)"
            mkdir -p /etc/sddm.conf.d
            printf '[Autologin]\nUser=%s\nSession=plasma.desktop\n' "$u" > /etc/sddm.conf.d/10-ov-autologin.conf
          user: root
    eval:
        - id: sddm-autologin-configured
          scope: deploy
          file: /etc/sddm.conf.d/10-ov-autologin.conf
          contains: "Session=plasma.desktop"
        - id: cachyos-settings-installed
          package: cachyos-settings
          installed: true
        - id: cachyos-kde-settings-installed
          package: cachyos-kde-settings
          installed: true
        - id: cachyos-wallpapers-installed
          package: cachyos-wallpapers
          installed: true
        - id: cachyos-themes-sddm-installed
          package: cachyos-themes-sddm
          installed: true
