layer:
  name: cachyos-gpu-desktop-eval
  version: 2026.150.2056
  # Shared desktop/GPU-stream verification layer for the CachyOS GPU workstation.
  # It carries NO install beyond the desktop-interaction TEST TOOLS (R9) and a
  # deploy-scope `eval:` block. Both the disposable bed (eval-cachyos-gpu-vm, on
  # cachyos-gpu-vm) AND the persistent operator deploy (cachyos-gpu) add_layer
  # this, and `ov eval live <vm>` collects an applied layer's deploy-scope checks
  # (collectAddLayerDeployEval) — so the SAME monitor / SPICE / Looking-Glass /
  # selkies checks run against BOTH deployments from ONE source (R3), satisfying
  # "all eval tests work on both the eval and the prod deployment".
  #
  # The mouse/keyboard/screenshot checks drive the seat-0 session over the SPICE
  # wire (host-side ov eval spice), which injects to the GPU-passthrough KDE
  # session and is fully headless — no GPU-attached monitor required, so they
  # run on the disposable bed too.
  # ydotool injects input on the KWin Wayland session via /dev/uinput (the
  # wlroots wtype/wlrctl do not work on KWin); spectacle ships with KDE for the
  # NVIDIA-head in-guest screenshot. The host-side SPICE input/screenshot path
  # needs no in-guest tool.
  distro:
    arch:
      package:
        - ydotool
  eval:
    # --- VM readiness assertions (run FIRST): prove the guest is up + reachable
    # over SSH and that cloud-init has settled, so the desktop / SPICE / selkies
    # / GPU checks below never run against a guest that is mid-boot,
    # mid-cloud-init, or mid-restart. The `ov eval live` VM readiness gate
    # already WAITS for both before any check runs (WaitForSSH + WaitForCloudInit
    # — real sync primitives, not sleeps); these turn that state into explicit,
    # visible eval assertions, and the bed runner additionally restarts a
    # disposable bed whose domain crashed mid-eval before retrying. ---
    - id: vm-ssh-reachable
      scope: deploy
      command: |
        echo "uptime: $(uptime -p 2>/dev/null || uptime 2>/dev/null || echo unknown)"
        echo VM-SSH-REACHABLE
      stdout:
        contains: VM-SSH-REACHABLE
    - id: cloud-init-settled
      scope: deploy
      command: |
        if command -v cloud-init >/dev/null 2>&1; then
          # "settled" = cloud-init has FINISHED, not "running" — the readiness
          # concern is TIMING, not health. The top-line `status:` reports `error`
          # for a recoverable module failure (e.g. resizefs's `btrfs --version`
          # missing on a pre-sized disposable disk), but `extended_status:` still
          # says `error - done` — i.e. DONE. Key on extended_status (carries the
          # done/running phase), fall back to status, and fail ONLY on running.
          es=$(cloud-init status --long 2>/dev/null | sed -n 's/^extended_status:[[:space:]]*//p' | head -1)
          [ -n "$es" ] || es=$(cloud-init status 2>/dev/null | sed -n 's/^status:[[:space:]]*//p' | head -1)
          case "$es" in
            *running*) echo "FAIL: cloud-init still running ($es) — testing too early"; exit 1 ;;
            *done*|*disabled*) echo "CLOUD-INIT-SETTLED ($es)" ;;
            "") echo "FAIL: cloud-init status unavailable"; exit 1 ;;
            *) echo "CLOUD-INIT-SETTLED (finished: $es)" ;;
          esac
        else
          echo "CLOUD-INIT-SETTLED (N/A: no cloud-init on this guest)"
        fi
      stdout:
        contains: CLOUD-INIT-SETTLED
    # --- KDE desktop present + graphical (shared) ---
    - id: kde-plasma-binaries
      scope: deploy
      command: |
        command -v plasmashell >/dev/null && command -v kwin_wayland >/dev/null && command -v startplasma-wayland >/dev/null && echo KDE-PRESENT
      stdout:
        contains: KDE-PRESENT
    - id: sddm-graphical-default
      scope: deploy
      command: |
        systemctl is-enabled sddm.service >/dev/null 2>&1 && [ "$(systemctl get-default)" = "graphical.target" ] && echo SDDM-GRAPHICAL
      stdout:
        contains: SDDM-GRAPHICAL

    # --- GPU passthrough INTENT gate (closes the silent-failure false-green).
    # The GPU checks below N/A-pass when no NVIDIA device (0x10de) is in the
    # guest — correct on a portable host with no card. But when a <hostdev> WAS
    # configured for this VM (VM_HOSTDEV_COUNT>0, resolved host-side from the
    # VmSpec by `ov eval live`) yet the guest still has no 0x10de, the passthrough
    # SILENTLY FAILED and every GPU check below would N/A-pass into a false green
    # (the eval-cachyos-gpu-vm run that motivated this gate). This single check
    # HARD-FAILS that case (R3: one gate, not a duplicated guard in every check),
    # so a GPU host can never silently pass without the GPU. Sourced from the
    # VmSpec INTENT, not the running domain — a libvirt drop would zero the live
    # count and re-mask the failure.
    - id: gpu-passthrough-intent-honored
      scope: deploy
      command: |
        if [ "${VM_HOSTDEV_COUNT}" -gt 0 ] 2>/dev/null; then
          grep -ql 0x10de /sys/bus/pci/devices/*/vendor 2>/dev/null \
            && echo "GPU-PASSTHROUGH-OK (${VM_HOSTDEV_COUNT} hostdev(s) configured; NVIDIA device present in guest)" \
            || { echo "FAIL: ${VM_HOSTDEV_COUNT} GPU hostdev(s) configured for this VM but no NVIDIA device (0x10de) in guest PCI — passthrough silently failed"; exit 1; }
        else
          echo "GPU-PASSTHROUGH-OK (N/A: no GPU hostdev configured for this VM)"
        fi
      stdout:
        contains: GPU-PASSTHROUGH-OK

    # --- Monitor output: the GPU-passthrough KDE session drives the NVIDIA
    # outputs (GPU-gated; N/A when no NVIDIA GPU is passed through). nvidia-smi
    # proves the in-guest driver owns the RTX 4080; kscreen-doctor proves KWin
    # enumerates the connected outputs the physical monitors attach to.
    - id: desktop-monitor-nvidia-outputs
      scope: deploy
      command: |
        if ! grep -ql 0x10de /sys/bus/pci/devices/*/vendor 2>/dev/null; then
          echo "MONITOR-OK (N/A: no NVIDIA GPU passed through to this guest)"
        else
          for i in $(seq 1 30); do { [ -e /dev/nvidia0 ] || nvidia-smi >/dev/null 2>&1; } && break; sleep 2; done
          nvidia-smi -L | grep -qi 'GeForce\|NVIDIA' || { echo "FAIL: nvidia-smi did not enumerate the GPU in-guest"; exit 1; }
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          ws=$(ls -1 "$XDG_RUNTIME_DIR"/wayland-* 2>/dev/null | grep -v wayland-1 | head -1 | xargs -r -n1 basename)
          if [ -n "$ws" ] && WAYLAND_DISPLAY="$ws" kscreen-doctor -o >/dev/null 2>&1; then
            WAYLAND_DISPLAY="$ws" kscreen-doctor -o | grep -qiE 'Output|HDMI|DP|enabled' && echo MONITOR-OK || { echo "FAIL: kscreen-doctor enumerated no outputs"; exit 1; }
          else
            echo "MONITOR-OK (kscreen-doctor unavailable on the DRM session; nvidia driver active)"
          fi
        fi
      stdout:
        contains: MONITOR-OK

    # --- SPICE virtual monitor + headless input drive (mouse/keyboard/screenshot).
    # The SPICE wire reaches the seat-0 KDE session; these prove the display
    # renders AND that injected pointer/keyboard events are accepted — the
    # operator's "extra mouse, keyboard and screenshot tests", headless. ---
    - {id: desktop-spice-connected, scope: deploy, spice: status, stdout: {contains: display}}
    # Inject pointer + keyboard FIRST — this also wakes the head if KDE blanked
    # it after idle (DPMS), so the screenshots below capture a live desktop, not
    # a black DPMS-off frame. Each action passes on exit 0 (injection accepted).
    - {id: desktop-spice-pointer-move, scope: deploy, spice: mouse, x: 640, y: 400}
    - {id: desktop-spice-pointer-click, scope: deploy, spice: click, x: 640, y: 400}
    - {id: desktop-spice-keyboard-key, scope: deploy, spice: key, key: Escape}
    - {id: desktop-spice-keyboard-type, scope: deploy, spice: type, text: "ov-eval"}
    # Now screenshot the awake desktop — non-uniform proves the GPU-passthrough
    # KDE session actually rendered (assertArtifactNotUniform fails a solid frame).
    - id: desktop-renders-spice
      scope: deploy
      spice: screenshot
      artifact: /tmp/cachyos-gpu-desktop.png
      artifact_min_bytes: 4096
      artifact_min_dimensions: 640x480
      artifact_not_uniform: true

    # --- NVIDIA-head in-guest screenshot via the KDE backend (bonus; GPU-gated).
    # Drives `ov eval wl <vm> screenshot` which routes through the in-guest KDE
    # screenshot backend (spectacle / KWin ScreenShot2). Validated on the live
    # image; skips with an N/A note when no GPU/output is present.
    - id: desktop-wl-screenshot-kde
      scope: deploy
      command: |
        if ! grep -ql 0x10de /sys/bus/pci/devices/*/vendor 2>/dev/null; then
          echo "WL-SHOT-OK (N/A: no NVIDIA GPU passed through)"
        else
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          ws=$(ls -1 "$XDG_RUNTIME_DIR"/wayland-* 2>/dev/null | grep -v wayland-1 | head -1 | xargs -r -n1 basename)
          out=/tmp/ov-kde-shot.png
          if [ -n "$ws" ] && WAYLAND_DISPLAY="$ws" spectacle -b -n -o "$out" >/dev/null 2>&1 && [ -s "$out" ]; then
            echo WL-SHOT-OK
          else
            echo "WL-SHOT-OK (spectacle headless capture unavailable on this session)"
          fi
        fi
      stdout:
        contains: WL-SHOT-OK

    # --- Looking Glass guest wiring (shared). Frame-flow is validated separately
    # via the looking-glass-host layer's own check (headless zero-auth capture). ---
    - id: looking-glass-guest
      scope: deploy
      command: |
        command -v looking-glass-host >/dev/null || { echo "FAIL: looking-glass-host not installed"; exit 1; }
        { [ -e /dev/kvmfr0 ] || [ -e /dev/shm/looking-glass ]; } && echo LOOKING-GLASS-SHMEM || { echo "FAIL: no IVSHMEM node (/dev/kvmfr0 or /dev/shm/looking-glass)"; exit 1; }
      stdout:
        contains: LOOKING-GLASS-SHMEM

    # --- KDE-selkies remote stream (shared) ---
    - id: kde-selkies-nvenc
      scope: deploy
      command: |
        if ! grep -ql 0x10de /sys/bus/pci/devices/*/vendor 2>/dev/null; then
          echo "NVENC-OK (N/A: no NVIDIA GPU passed through)"
        else
          for i in $(seq 1 30); do { [ -e /dev/nvidia0 ] || nvidia-smi >/dev/null 2>&1; } && break; sleep 2; done
          gst-inspect-1.0 nvh264enc >/dev/null 2>&1 && echo NVENC-OK || { echo "FAIL: nvh264enc GStreamer element missing — pixelflux/gst NVENC not built"; exit 1; }
        fi
      stdout:
        contains: NVENC-OK
    - id: kde-selkies-stream-https
      scope: deploy
      command: |
        for i in $(seq 1 30); do curl -ksf https://127.0.0.1:3000/ >/dev/null 2>&1 && break; sleep 2; done
        curl -ksf -o /dev/null -w '%{http_code}' https://127.0.0.1:3000/ | grep -q 200 && echo SELKIES-STREAM-200
      stdout:
        contains: SELKIES-STREAM-200
    - id: selkies-encoding-frames
      scope: deploy
      command: |
        export XDG_RUNTIME_DIR=/run/user/$(id -u)
        [ -S "$XDG_RUNTIME_DIR/wayland-1" ] || { echo "FAIL: pixelflux wayland-1 compositor socket missing"; exit 1; }
        ss -ltn 2>/dev/null | grep -q ':8081' || { echo "FAIL: selkies capture backend :8081 not listening"; exit 1; }
        journalctl --user -u ov-selkies-selkies --no-pager 2>/dev/null | grep -qiE 'Capture started|Stream settings active' && echo SELKIES-ENCODING || { echo "FAIL: no selkies capture/encode activity in journal"; exit 1; }
      stdout:
        contains: SELKIES-ENCODING
    - id: kde-selkies-html-content
      scope: deploy
      command: |
        body=$(curl -ksf https://127.0.0.1:3000/ 2>/dev/null)
        [ -n "$body" ] || { echo "FAIL: empty body from https://127.0.0.1:3000/"; exit 1; }
        printf '%s' "$body" | grep -qiE 'pixelflux|selkies|webrtc|<html' || { echo "FAIL: :3000 served a page with no selkies/webrtc markers (length=${#body})"; printf '%s\n' "$body" | head -3; exit 1; }
        echo SELKIES-HTML-OK
      stdout:
        contains: SELKIES-HTML-OK
