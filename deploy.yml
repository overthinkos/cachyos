#  CachyOS deploy beds.
#  - cachyos-vm-deploy: disposable libvirt VM bed (target: vm → cachyos-vm).
#  - ov-cachyos: the operator workstation profile (target: local + host: local)
#    that applies the ov-cachyos kind:local template (local.yml) directly to the
#    current CachyOS machine via ShellExecutor. Moved here from the main repo in
#    the 2026-05 CachyOS migration: run it as `ov -C image/cachyos update
#    ov-cachyos` (or `ov --repo overthinkos/cachyos update ov-cachyos`).
version: 2026.141.1600
deploy:
    cachyos-vm-deploy:
        target: vm
        vm: cachyos-vm
        disposable: true
        lifecycle: dev
    # =================================================================
    # ov-cachyos — this CachyOS workstation, target: local + host: local.
    # ---------------------------------------------------------------
    # Applies the ov-cachyos kind:local template (defined in local.yml)
    # directly to the current machine via ShellExecutor — no SSH, no VM,
    # no container. Marked disposable: operator has authorized this host
    # as a test system, so `ov rebuild ov-cachyos` (full destroy +
    # reinstall via the install ledger) is allowed for strict R10
    # verification.
    #
    # The deployment shares the name `ov-cachyos` with the kind:local
    # template it applies — cross-kind name reuse is permitted as of
    # 2026-05; verbs disambiguate by command context.
    # =================================================================
    ov-cachyos:
        target: local
        local: ov-cachyos
        host: local
        disposable: true
        install_opts:
            with_service: true
            allow_repo_changes: true
            allow_root_tasks: true
        env:
            - EDITOR=nvim
        description:
            feature: Apply ov-cachyos to this workstation
            tag: [testing]
