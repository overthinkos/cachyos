box:
    name: cachyos-pacstrap-builder
    # base: arch.arch — the `arch` base from the overthinkos/arch submodule, via
    # the `arch` import namespace. Its only layer (pacstrap-builder) is pulled by
    # github reference (a main-repo candy, shared with arch-pacstrap-builder).
    base: arch.arch
    distro:
        - arch
    build:
        - pac
    candy:
        - '@github.com/overthinkos/overthink/candy/pacstrap-builder:v2026.160.2017'
    eval:
        - id: cpb-pacstrap-binary
          file: /usr/sbin/pacstrap
          exists: true
        - id: cpb-arch-install-scripts
          package: arch-install-scripts
          installed: true
        - id: cpb-grub-install
          file: /usr/sbin/grub-install
          exists: true
        - id: cpb-parted
          file: /usr/sbin/parted
          exists: true
