box:
    name: cachyos-pacstrap-builder
    # base: charly.arch — the `arch` base from main's base.yml, via the `charly`
    # import namespace. Its only layer (pacstrap-builder) is pulled by github
    # reference (it stays in the main repo, shared with arch-pacstrap-builder).
    base: charly.arch
    distro:
        - arch
    build:
        - pac
    candy:
        - '@github.com/overthinkos/overthink/candy/pacstrap-builder:v2026.160.1105'
    eval:
        - id: cpb-pacstrap-binary
          file: /usr/sbin/pacstrap
          exists: true
        - id: cpb-arch-install-scripts
          package: arch-install-scripts
          installed: true
        - id: cpb-grub-install
          file: /usr/sbin/grub-install
          exists: true
        - id: cpb-parted
          file: /usr/sbin/parted
          exists: true
