box:
    name: cachyos-pacstrap-builder
    # base: arch.arch — the `arch` base from the overthinkos/arch submodule, via
    # the `arch` import namespace. Its only layer (pacstrap-builder) is pulled by
    # github reference (a main-repo candy, shared with arch-pacstrap-builder).
    base: arch.arch
    distro:
        - arch
    build:
        - pac
    candy:
        - '@github.com/overthinkos/overthink/candy/pacstrap-builder:v2026.162.1207'
    # No box-level eval: the pacstrap/arch-install-scripts/grub/parted toolchain
    # checks live on the pacstrap-builder candy, so ONE check covers this box AND
    # arch-pacstrap-builder.
