box:
    name: selkies-labwc
    # CPU streaming desktop on the CachyOS (Arch) base — pixi build of selkies
    # (pixelflux Rust) + AUR google-chrome/wlrctl + labwc/waybar/swaync/etc.
    base: cachyos
    builder:
        pixi: arch.arch-builder
        npm: arch.arch-builder
        cargo: arch.arch-builder
        aur: arch.arch-builder
    build:
        - pac
        - aur
    platform:
        - linux/amd64
    candy:
        - '@github.com/overthinkos/overthink/candy/agent-forwarding:v2026.162.0856'
        - '@github.com/overthinkos/overthink/candy/selkies-desktop:v2026.162.0856'
        - '@github.com/overthinkos/overthink/candy/dbus:v2026.162.0856'
    eval:
        - command: test -x /usr/bin/labwc && test -x /usr/bin/google-chrome-stable && test -x /usr/local/bin/traefik && test -x /usr/sbin/sshd
          id: selkies-labwc-binaries
          exit_status: 0
        - addr: 127.0.0.1:${HOST_PORT:9224}
          id: selkies-labwc-chrome-devtools-mcp-port
          timeout: 5s
          scope: deploy
          reachable: true
