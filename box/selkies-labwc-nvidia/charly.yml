box:
    name: selkies-labwc-nvidia
    # labwc selkies flavor on the CachyOS GPU base (cachyos.nvidia) with REAL
    # NVENC: builder.pixi → charly.cuda-arch-builder, whose nvcc + ffnvcodec NVENC
    # headers let the selkies layer's build.sh compile pixelflux's real nvenc-sys
    # encoder (the stock arch-builder has no CUDA → NVENC stub). chrome + wlrctl
    # from the AUR → build:[pac, aur]. Renamed from selkies-desktop-nvidia.
    base: nvidia
    build:
        - pac
        - aur
    builder:
        pixi: charly.cuda-arch-builder
    platform:
        - linux/amd64
    candy:
        - '@github.com/overthinkos/overthink/candy/agent-forwarding:v2026.160.1105'
        - '@github.com/overthinkos/overthink/candy/selkies-desktop:v2026.160.1105'
        - '@github.com/overthinkos/overthink/candy/dbus:v2026.160.1105'
    port:
        - 3000:3000
        - 9222:9222
        - 9224:9224
        - 2222:2222
    # Build-scope proof the REAL NvencEncoder was compiled (not the AMD/CPU
    # stub) — the regression-proof eval-coverage for this image's NVENC
    # functionality. NvEncodeAPICreateInstance is the NVENC SDK entry point the
    # nvenc-sys crate binds; the stub build patches nvenc-sys out of pixelflux's
    # Cargo.toml, so the symbol is absent → this check FAILS on a non-NVENC build.
    eval:
        - id: pixelflux-nvenc-compiled
          scope: build
          command: strings ${HOME}/.pixi/envs/default/lib/python3.*/site-packages/pixelflux/pixelflux_wayland*.so | grep -q NvEncodeAPICreateInstance && echo NVENC-COMPILED
          exit_status: 0
          stdout:
            - contains: "NVENC-COMPILED"
