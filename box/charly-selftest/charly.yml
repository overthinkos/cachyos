box:
    # charly self-test image — the full charly toolchain on a CachyOS base. Backs the
    # eval-charly-selftest-pod kind:eval bed, which exercises EVERY charly command group
    # (version/status/doctor/settings/box list+inspect+validate/clean/migrate/
    # secrets/vm/deploy/eval/mcp/feature) in-container. Full charly arrives via charly-mcp
    # (now the full toolchain: binary + virtualization + gocryptfs + socat) so the
    # vm/libvirt commands resolve; container-nesting enables nested `charly deploy`;
    # claude-code is the driver for the charly-cli-surface AI score.
    name: charly-selftest
    base: cachyos
    build:
        - pac
        - aur
    candy:
        - '@github.com/overthinkos/overthink/candy/charly-mcp:v2026.162.1442'
        - '@github.com/overthinkos/overthink/candy/container-nesting:v2026.162.1442'
        - '@github.com/overthinkos/overthink/candy/claude-code:v2026.162.1442'
