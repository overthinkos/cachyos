box:
    name: selkies-kde-nvidia
    # Full KDE Plasma selkies flavor on the CachyOS GPU base (cachyos.nvidia) with
    # REAL NVENC (builder.pixi → arch.cuda-arch-builder, same as selkies-labwc-nvidia).
    # Headless de-SDDM Plasma nested in pixelflux. chrome + wlrctl from the AUR.
    base: nvidia
    build:
        - pac
        - aur
    builder:
        pixi: arch.cuda-arch-builder
    platform:
        - linux/amd64
    candy:
        - '@github.com/overthinkos/overthink/candy/agent-forwarding:v2026.165.2208'
        - '@github.com/overthinkos/overthink/candy/selkies-kde-desktop:v2026.165.2208'
        - '@github.com/overthinkos/overthink/candy/dbus:v2026.165.2208'
    plan:
        - check: command=strings ${HOME}/.pixi/envs/default/lib/python3.*/site-packages/pixelflux/pixelflux_wayland*.so | grep -q NvEncodeAPICreateInstance && echo NVENC-COMPILED
          id: pixelflux-nvenc-compiled
          command: strings ${HOME}/.pixi/envs/default/lib/python3.*/site-packages/pixelflux/pixelflux_wayland*.so | grep -q NvEncodeAPICreateInstance && echo NVENC-COMPILED
          exit_status: 0
          stdout:
            - contains: "NVENC-COMPILED"
          context:
            - build
