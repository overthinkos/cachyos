#  ov-cachyos — the operator CachyOS workstation profile (kind:local template).
#  Moved here from the main repo in the 2026-05 CachyOS migration. Applied to
#  the operator's host via the ov-cachyos deploy entry (deploy.yml):
#  `ov -C image/cachyos update ov-cachyos`.
#
#  Every layer is pulled by GITHUB REFERENCE from the main overthink repo (the
#  layers themselves never moved) — nothing is vendored. The builder_image is a
#  published OCI ref (arch-builder), not a layer.
version: 2026.141.1600

local:
  ov-cachyos:
    layer:
      # Establish passwordless wheel sudo before any other root task runs.
      # Idempotent on the existing host; self-healing regression guard.
      - '@github.com/overthinkos/overthink/layers/wheel-nopasswd:v2026.141.1600'
      # yay AUR helper — required by pkg/arch/PKGBUILD's mandatory AUR deps
      # (cloudflared-bin, gvisor-tap-vsock); install drives `yay -Bi pkg/arch`.
      - '@github.com/overthinkos/overthink/layers/yay:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/dev-tools:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/gh:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/pre-commit:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/tmux:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/direnv:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/gnupg:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/keepassxc:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/keepassxc-keyring:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/tailscale:v2026.141.1600'
      # Runtime wiring for target:local: sets --operator (non-root
      # `tailscale serve` for ExecStartPost in pod tunnel quadlets) and keeps
      # the tailnet device name in sync with `hostname -s`. Self-gates on
      # `systemctl is-active tailscaled` so it's a no-op when the daemon is down.
      - '@github.com/overthinkos/overthink/layers/tailscale-up:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/build-toolchain:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/golang:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/rust:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/nodejs:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/uv:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/claude-code:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/codex:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/gemini:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/oracle:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/forgecode:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/devops-tools:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/docker-ce:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/kubernetes:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/vscode:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/ghostty:v2026.141.1600'
      - '@github.com/overthinkos/overthink/layers/chrome:v2026.141.1600'
      # nvidia-container-toolkit registers /etc/cdi/nvidia.yaml via the pacman
      # post-install hook (driver loaded → hook succeeds). Required so podman can
      # resolve AddDevice=nvidia.com/gpu=all on every GPU-using container.
      - '@github.com/overthinkos/overthink/layers/nvidia:v2026.141.1600'
      # ov-full provides the full ov toolchain for BOTH host and container
      # targets (mixed service: schema; the host-specific sibling was deleted in
      # the 2026-05 init-system-polymorphism cutover).
      - '@github.com/overthinkos/overthink/layers/ov-full:v2026.141.1600'

    install_opts:
      with_service: true
      allow_repo_changes: true
      allow_root_tasks: true
      # Use the locally-cached arch-builder for cargo/npm/pixi steps. FQDN form
      # bypasses podman unqualified-search-registries config; arch-builder is the
      # right builder for an Arch/CachyOS host (vs the project default
      # fedora-builder).
      builder_image: ghcr.io/overthinkos/arch-builder:2026.122.2252

    env:
      - EDITOR=nvim
      - PAGER=less

    description:
      feature: CachyOS Developer Experience profile
      narrative: |
        Kitchen-sink dev workstation: core CLI tools, full Arch build
        toolchain, Go/Rust/Node/Python runtimes, the full AI-coding-agent
        fleet (Claude Code, Codex, Gemini, Oracle, ForgeCode), and
        DevOps/container tooling (docker, kubectl, helm, AWS CLI, jq).
        Targets the operator's CachyOS host via direct local exec.
      tag: [working]

    # Deploy-scope eval probes. The wheel-nopasswd layer (first above)
    # declaratively writes /etc/sudoers.d/20-nopasswd-wheel and adds the
    # uid-1000 account to wheel, so passwordless sudo is established by the
    # deploy itself. These catch regressions BETWEEN deploys before the next
    # `ov rebuild ov-cachyos` aborts mid-flight on a sudo prompt.
    eval:
      - id: passwordless-sudo-host
        scope: deploy
        command: sudo -n true
        exit_status: 0
        in_container: false

      - id: nvidia-ctk-present
        scope: deploy
        command: command -v nvidia-ctk
        exit_status: 0
        in_container: false

      - id: nvidia-cdi-spec
        scope: deploy
        file: /etc/cdi/nvidia.yaml
        in_container: false
